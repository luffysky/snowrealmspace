# ── 記錄與給自己 ──────────────────────────
- id: p-reflect-001
  text: 寫一句話給一年後打開這個空間的自己。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-002
  text: 記下今天腦中閃過、但沒說出口的一個想法。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-003
  text: 寫下今天讓你嘴角動了一下的一件小事。
  tags: [reflect, gratitude]
  estimatedMinutes: 3
- id: p-reflect-004
  text: 給累壞的自己寫一張只有一句話的請假單。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-005
  text: 記下一個你最近重複想起的畫面，不用說為什麼。
  tags: [reflect, memory]
  estimatedMinutes: 5
- id: p-reflect-006
  text: 寫下今天你對自己說過最溫柔的一句話。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-007
  text: 列出三件此刻沒有壞掉的東西，哪怕很小。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-008
  text: 寫給五年前的自己一句你現在才懂的話。
  tags: [reflect, memory]
  estimatedMinutes: 5
- id: p-reflect-009
  text: 記下今天一個你想留住、但會忘記的細節。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-010
  text: 幫今天下一個標題，像一集影集那樣。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-011
  text: 寫下一件你今天替自己做到的小事。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-012
  text: 記下現在窗外的樣子，當作寄給未來的一張明信片。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-013
  text: 寫下一個你想再去一次的地方，和一個原因。
  tags: [reflect, memory]
  estimatedMinutes: 4
- id: p-reflect-014
  text: 給今天的心情打個分數，再寫一行為什麼。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-015
  text: 寫下一個你一直沒告訴任何人的小願望。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-016
  text: 記下今天有誰讓你覺得被理解，哪怕只是一瞬間。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-017
  text: 寫一句話，讓明天早上的自己會想笑。
  tags: [reflect, future_self, self_care]
  estimatedMinutes: 3
- id: p-reflect-018
  text: 記下今天你放下的一件事，不管有沒有完成。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-019
  text: 寫下一段最近常在腦中重播的對話。
  tags: [reflect, memory]
  estimatedMinutes: 5
- id: p-reflect-020
  text: 列出三個此刻圍繞著你的聲音。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-021
  text: 寫給下週某個累的自己，一句提前的安慰。
  tags: [reflect, future_self, self_care]
  estimatedMinutes: 4
- id: p-reflect-022
  text: 記下一個你今天學到、但很小的事。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-023
  text: 寫下你現在身上最放鬆的那個部位。
  tags: [reflect, self_care]
  estimatedMinutes: 2
- id: p-reflect-024
  text: 記下一句今天聽到、想收進口袋的話。
  tags: [reflect, memory]
  estimatedMinutes: 3
- id: p-reflect-025
  text: 寫下一個你希望明年還記得的今天的感覺。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-026
  text: 列出三件今天雖然普通、但你其實喜歡的事。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-027
  text: 給還沒睡的自己寫一句晚安。
  tags: [reflect, self_care]
  estimatedMinutes: 2
- id: p-reflect-028
  text: 記下一個今天讓你分心很久的念頭。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-029
  text: 寫下童年一個突然想起的味道或聲音。
  tags: [reflect, memory]
  estimatedMinutes: 5
- id: p-reflect-030
  text: 幫此刻的自己拍一張心情自拍，只用文字描述。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-031
  text: 寫下一件你想在這個空間慢慢養大的東西。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-032
  text: 記下今天你的身體最想要的一件事。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-033
  text: 寫下一個你最近沒說謝謝、但想謝的對象。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-034
  text: 記下今天最安靜的那一分鐘，你在哪裡。
  tags: [reflect, memory]
  estimatedMinutes: 4
- id: p-reflect-035
  text: 寫一句只給自己看、不必好聽的真心話。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-036
  text: 列出三個你想在這一季試試看的小念頭。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-037
  text: 記下今天一個你差點忽略的好運。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-038
  text: 寫下你現在最想靠近、和最想遠離的一樣東西。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-039
  text: 記下一段最近讓你安心的日常片刻。
  tags: [reflect, memory, gratitude]
  estimatedMinutes: 4
- id: p-reflect-040
  text: 寫給生日那天的自己一句話，不管還有多久。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-041
  text: 今天很低能量的話，就只寫一個字形容它。
  tags: [reflect, self_care]
  estimatedMinutes: 2
- id: p-reflect-042
  text: 記下一個你一直想做、卻總是延後的小事。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-043
  text: 寫下今天窗外的天空，用來對照未來某天。
  tags: [reflect, future_self, memory]
  estimatedMinutes: 4
- id: p-reflect-044
  text: 列出三樣今天陪著你的東西，向它們道個謝。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-045
  text: 記下一個你今天忍住沒做、後來慶幸的決定。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-046
  text: 寫下一句想在難過時翻出來看的話。
  tags: [reflect, self_care, future_self]
  estimatedMinutes: 4
- id: p-reflect-047
  text: 記下最近一次你笑到出聲是為了什麼。
  tags: [reflect, memory, gratitude]
  estimatedMinutes: 4
- id: p-reflect-048
  text: 寫下今天你最想按下暫停的那一刻。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-049
  text: 給正在讀這行字的自己，寫一句肯定。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-050
  text: 記下一個你想帶進明天的心情或念頭。
  tags: [reflect, future_self]
  estimatedMinutes: 3
- id: p-reflect-051
  text: 寫下最近讓你覺得「還好有它」的一樣東西。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-052
  text: 記下今天你身邊光線最好的那個角落。
  tags: [reflect, memory]
  estimatedMinutes: 3
- id: p-reflect-053
  text: 寫一段給未來某個失眠夜的自己的話。
  tags: [reflect, future_self, self_care]
  estimatedMinutes: 5
- id: p-reflect-054
  text: 列出三件你今天原諒了自己的事。
  tags: [reflect, self_care]
  estimatedMinutes: 4
- id: p-reflect-055
  text: 記下一個最近反覆出現在夢裡的東西。
  tags: [reflect, memory]
  estimatedMinutes: 4
- id: p-reflect-056
  text: 寫下今天一句你脫口而出、自己也意外的話。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-057
  text: 幫這一週選一個代表色，寫下原因。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-058
  text: 記下一件你今天為別人做、卻沒說的小事。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-059
  text: 寫下你希望半年後的自己已經放下的一件事。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-060
  text: 記下此刻手邊最順手、最常用的一樣東西。
  tags: [reflect, journaling, memory]
  estimatedMinutes: 3
- id: p-reflect-061
  text: 寫一句今天想對身體說的道歉或謝謝。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-062
  text: 記下一個你今天路過、卻停下來看的東西。
  tags: [reflect, memory]
  estimatedMinutes: 3
- id: p-reflect-063
  text: 寫下你現在最想被誰抱一下，不必寄出去。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-064
  text: 列出三個此刻讓你安心的小小確定。
  tags: [reflect, gratitude, self_care]
  estimatedMinutes: 4
- id: p-reflect-065
  text: 記下一段你希望以後翻到會鼻酸的今天。
  tags: [reflect, future_self, memory]
  estimatedMinutes: 5
- id: p-reflect-066
  text: 寫下今天你最想重來一次的三十秒。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-067
  text: 幫今天的自己寫一句四個字的評語。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-068
  text: 記下最近一次你覺得時間過得剛剛好的時候。
  tags: [reflect, memory, gratitude]
  estimatedMinutes: 4
- id: p-reflect-069
  text: 寫給明年今天的自己一個小小的預言。
  tags: [reflect, future_self]
  estimatedMinutes: 4
- id: p-reflect-070
  text: 記下你現在正穿的衣服，未來會想起這一天嗎。
  tags: [reflect, memory]
  estimatedMinutes: 3
- id: p-reflect-071
  text: 寫下一個你今天沒力氣做、也沒關係的事。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-072
  text: 記下今天最像你的一個瞬間。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-073
  text: 寫下三件你今天沒有做、但很想做的事。
  tags: [reflect, journaling, future_self]
  estimatedMinutes: 4
- id: p-reflect-074
  text: 記下一段你想珍藏的、關於某個人的小細節。
  tags: [reflect, memory, gratitude]
  estimatedMinutes: 5
- id: p-reflect-075
  text: 寫一句話，替今天畫下句點。
  tags: [reflect, journaling]
  estimatedMinutes: 3
- id: p-reflect-076
  text: 記下此刻你最想喝的一杯什麼，去泡一杯也行。
  tags: [reflect, self_care]
  estimatedMinutes: 5
- id: p-reflect-077
  text: 寫下一個你想在這裡慢慢說給自己聽的故事開頭。
  tags: [reflect, journaling, future_self]
  estimatedMinutes: 6
- id: p-reflect-078
  text: 記下今天讓你分不清是累還是滿足的那個時刻。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-079
  text: 列出三個你今天用到、卻視為理所當然的能力。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-080
  text: 寫下你希望未來的自己別忘記的一種味道。
  tags: [reflect, future_self, memory]
  estimatedMinutes: 4
- id: p-reflect-081
  text: 記下今天你替自己爭取到的一點點時間。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-082
  text: 寫下一句你最近很想聽別人對你說的話。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-083
  text: 記下一個你今天覺得世界還算溫柔的瞬間。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-084
  text: 寫給正在改變中的自己一句不催促的話。
  tags: [reflect, self_care, future_self]
  estimatedMinutes: 4
- id: p-reflect-085
  text: 記下今天你眼睛停留最久的一個東西。
  tags: [reflect, memory]
  estimatedMinutes: 3
- id: p-reflect-086
  text: 寫下一件你想在心裡替自己鼓掌的小事。
  tags: [reflect, self_care, gratitude]
  estimatedMinutes: 3
- id: p-reflect-087
  text: 記下一個今天沒發生、但你很慶幸沒發生的事。
  tags: [reflect, gratitude]
  estimatedMinutes: 4
- id: p-reflect-088
  text: 寫下你此刻對「家」這個字的第一個畫面。
  tags: [reflect, memory]
  estimatedMinutes: 4
- id: p-reflect-089
  text: 記下今天你花最多時間的一件事，值得嗎。
  tags: [reflect, journaling]
  estimatedMinutes: 4
- id: p-reflect-090
  text: 寫一句你想留給下一個生日的自己的話。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-091
  text: 記下今天一個你其實過得去、沒那麼糟的時刻。
  tags: [reflect, self_care]
  estimatedMinutes: 3
- id: p-reflect-092
  text: 寫下最近一次你替自己感到驕傲，是為了什麼。
  tags: [reflect, gratitude, self_care]
  estimatedMinutes: 4
- id: p-reflect-093
  text: 記下此刻房間裡最舊的一樣東西和它的故事。
  tags: [reflect, memory]
  estimatedMinutes: 5
- id: p-reflect-094
  text: 寫下你希望這個空間長大後，第一個記得的今天。
  tags: [reflect, future_self]
  estimatedMinutes: 5
- id: p-reflect-095
  text: 記下今天你想對自己說的最後一句話，然後休息。
  tags: [reflect, self_care, journaling]
  estimatedMinutes: 3
