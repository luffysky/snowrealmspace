# 每日創作提示 — 「實驗與玩」＋「記錄與給自己」
# 繁體中文（台灣用語）。允許低能量的日子。
# play 類：p-play-NNN；reflect 類：p-reflect-NNN

# ── 實驗與玩 ──────────────────────────────
- id: p-play-001
  text: 把今天聽到的一首歌，用一個顏色代表它。
  tags: [play, synesthesia]
  estimatedMinutes: 5
- id: p-play-002
  text: 把三個不相關的東西放在同一張畫面上，不用解釋。
  tags: [play, collage, random]
  estimatedMinutes: 8
- id: p-play-003
  text: 閉上眼睛，用手指在紙上亂畫十秒，再看看它像什麼。
  tags: [play, experiment]
  estimatedMinutes: 3
- id: p-play-004
  text: 幫現在的心情調一杯不存在的飲料，寫下它的顏色和味道。
  tags: [play, synesthesia]
  estimatedMinutes: 6
- id: p-play-005
  text: 隨手拍一張你平常不會拍的醜東西，就這樣留著。
  tags: [play, random]
  estimatedMinutes: 3
- id: p-play-006
  text: 把窗外的聲音想像成一種質地，是粗的還是滑的？
  tags: [play, synesthesia]
  estimatedMinutes: 4
- id: p-play-007
  text: 用手邊五樣東西排出一個表情，拍下來。
  tags: [play, collage]
  estimatedMinutes: 7
- id: p-play-008
  text: 隨機翻開一本書，指一個字，用它造一句沒道理的話。
  tags: [play, random, experiment]
  estimatedMinutes: 5
- id: p-play-009
  text: 幫今天取一個顏色的名字，像油漆罐上那種。
  tags: [play, synesthesia]
  estimatedMinutes: 4
- id: p-play-010
  text: 把一個日常動作放慢十倍去做，感覺哪裡不一樣。
  tags: [play, experiment]
  estimatedMinutes: 5
- id: p-play-011
  text: 收集三種不同的白色，並排看它們其實不一樣。
