# 每日創作提示 — 人物與角色
# 主題：畫角色、命名與故事、表情練習、把自己畫成角色、路人速寫
# 允許低能量的日子，看了就知道怎麼做。

- id: p-character-001
  text: 畫一個角色，只給它一個表情，讓人猜它在想什麼。
  tags: [character, expression]
  estimatedMinutes: 20

- id: p-character-002
  text: 幫今天遇到的一個路人畫速寫，只抓三筆最像的線條。
  tags: [sketch, portrait]
  estimatedMinutes: 10

- id: p-character-003
  text: 把自己畫成一個奇幻角色，給它一件你現實中沒有的能力。
