  text: 從你手機桌布取三色，看你每天在看什麼顏色。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-129
  text: 用單色分五階，畫一座由近到遠的山。
  tags: [color, monochrome]
  estimatedMinutes: 25

- id: p-color-130
  text: 把三個顏色排成漸層，再打亂重排一次。
  tags: [color, harmony, palette]
  estimatedMinutes: 15

- id: p-color-131
  text: 只用兩色畫一朵雲，其他留白。
  tags: [color, limited, mood]
  estimatedMinutes: 15

- id: p-color-132
  text: 從調味料罐（醬油、辣椒、抹茶）取一組食物色。
  tags: [color, extraction, palette]
  estimatedMinutes: 10

- id: p-color-133
  text: 選一個顏色，做出它最柔和與最強烈的兩端。
  tags: [color, monochrome, contrast]
  estimatedMinutes: 15

- id: p-color-134
  text: 為「賴床的週末」配一組慵懶的顏色。
  tags: [color, mood, palette]
  estimatedMinutes: 10

- id: p-color-135
  text: 從一張截圖只取黑白，看它的構圖還成立嗎。
  tags: [color, monochrome, extraction]
  estimatedMinutes: 15

- id: p-color-136
  text: 用四色以內，畫一個熱氣蒸騰的鍋。
  tags: [color, limited, mood]
  estimatedMinutes: 25

- id: p-color-137
  text: 挑三個顏色，讓它們像同一個人穿的搭配。
  tags: [color, palette, harmony]
  estimatedMinutes: 15

- id: p-color-138
  text: 從書架上的書背，橫掃出一整排的顏色。
  tags: [color, extraction, palette]
  estimatedMinutes: 10

- id: p-color-139
  text: 只用一色，用點的密度做出漸層。
  tags: [color, monochrome]
  estimatedMinutes: 20

- id: p-color-140
  text: 把兩個對比色，各縮成一小點放在灰底上。
  tags: [color, contrast, mood]
  estimatedMinutes: 15

- id: p-color-141
  text: 為「第一次見面的緊張」配一組顏色。
  tags: [color, mood]
  estimatedMinutes: 15

- id: p-color-142
  text: 從一顆石頭或磚牆取三個低調的顏色。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-143
  text: 用一個綠色，做出「嫩芽、苔、松」三種綠。
  tags: [color, monochrome, harmony]
  estimatedMinutes: 15

- id: p-color-144
  text: 選一組五色，刻意讓它們不和諧，記下感覺。
  tags: [color, contrast, palette]
  estimatedMinutes: 20

- id: p-color-145
  text: 幫「陰天」配一組不悲傷的灰色系。
  tags: [color, mood, palette]
  estimatedMinutes: 15

- id: p-color-146
  text: 從一碗麵或飯的配料取一組暖色盤。
  tags: [color, extraction, palette]
  estimatedMinutes: 10

- id: p-color-147
  text: 只用兩色畫一隻動物的側臉。
  tags: [color, limited]
  estimatedMinutes: 20

- id: p-color-148
  text: 用一個色相，畫同一顆蘋果在三種光下的樣子。
  tags: [color, monochrome, mood]
  estimatedMinutes: 25

- id: p-color-149
  text: 選三色，讓最小面積的那色最搶眼。
  tags: [color, contrast, palette]
  estimatedMinutes: 15

- id: p-color-150
  text: 從電影海報取四色，猜它想給人的情緒。
  tags: [color, extraction, mood]
  estimatedMinutes: 15

- id: p-color-151
  text: 用黑白灰，畫一張你今天看到的臉。
  tags: [color, monochrome]
  estimatedMinutes: 25

- id: p-color-152
  text: 把冷暖各一色，放在同一朵花上。
  tags: [color, contrast]
  estimatedMinutes: 20

- id: p-color-153
  text: 為「等一個人」配一組顏色。
  tags: [color, mood]
  estimatedMinutes: 15

- id: p-color-154
  text: 從你今天的購物袋或收據取色，做一組意外配色。
  tags: [color, extraction, palette]
  estimatedMinutes: 10

- id: p-color-155
  text: 用一色，靠留白多寡做出五種明度。
  tags: [color, monochrome, limited]
  estimatedMinutes: 15

- id: p-color-156
  text: 選一組相鄰的四色，畫一片漸層的黃昏。
  tags: [color, harmony, mood]
  estimatedMinutes: 20

- id: p-color-157
  text: 只用三色，重現一張你最愛的照片的氣氛。
  tags: [color, limited, extraction]
  estimatedMinutes: 25

- id: p-color-158
  text: 幫「一整天沒說話」配一組安靜的顏色。
  tags: [color, mood, palette]
  estimatedMinutes: 15

- id: p-color-159
  text: 從一根蠟燭的火光取三個顏色。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-160
  text: 用一個粉紅，做出從櫻花到桃子的五階。
  tags: [color, monochrome, harmony]
  estimatedMinutes: 15

- id: p-color-161
  text: 把兩個對比色互換位置，看主客易位的效果。
  tags: [color, contrast]
  estimatedMinutes: 15

- id: p-color-162
  text: 為「大掃除後」配一組清爽的顏色。
  tags: [color, mood, palette]
  estimatedMinutes: 15

- id: p-color-163
  text: 從一張夜景照取色，找出黑裡藏著的顏色。
  tags: [color, extraction, mood]
  estimatedMinutes: 15

- id: p-color-164
  text: 只用一色，畫一段從實到虛的漸隱。
  tags: [color, monochrome]
  estimatedMinutes: 15

- id: p-color-165
  text: 選五色，把它們的比例分成大中小三種面積。
  tags: [color, palette, harmony]
  estimatedMinutes: 20

- id: p-color-166
  text: 幫「小時候的暑假」配一組顏色。
  tags: [color, mood]
  estimatedMinutes: 15

- id: p-color-167
  text: 從一件毛衣或圍巾的織紋取三色。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-168
  text: 用兩色，畫一張只有影子的圖。
  tags: [color, limited, monochrome]
  estimatedMinutes: 20

- id: p-color-169
  text: 選一個顏色，找出它「加一點就毀掉」的搭檔色。
  tags: [color, contrast, harmony]
  estimatedMinutes: 15

- id: p-color-170
  text: 為「終於下班」配一組放鬆的顏色。
  tags: [color, mood, palette]
  estimatedMinutes: 10

- id: p-color-171
  text: 從一杯拿鐵的拉花取棕與白兩色的層次。
  tags: [color, extraction, monochrome]
  estimatedMinutes: 10

- id: p-color-172
  text: 用四色，把「春夏秋冬」各配一色。
  tags: [color, palette, mood]
  estimatedMinutes: 15

- id: p-color-173
  text: 只用一色的深淺，畫窗簾透光的樣子。
  tags: [color, monochrome, mood]
  estimatedMinutes: 20

- id: p-color-174
  text: 從一張隨手拍的失敗照片裡，找出三個好看的顏色。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-175
  text: 選兩個顏色，讓它們在中間漸層出第三個新色。
  tags: [color, harmony, contrast]
  estimatedMinutes: 15

- id: p-color-176
  text: 累的話，只挑一個今天最順眼的顏色，記下來就好。
  tags: [color, mood]
  estimatedMinutes: 5

- id: p-color-177
  text: 沒力氣就從一張現成照片按三下取色，存起來。
  tags: [color, extraction]
  estimatedMinutes: 5

- id: p-color-178
  text: 低能量版：用一枝筆隨便塗一塊，感受它的顏色。
  tags: [color, monochrome]
  estimatedMinutes: 5

- id: p-color-179
  text: 幫「今天」選一個顏色，不用理由，放進收藏。
  tags: [color, mood]
  estimatedMinutes: 5

- id: p-color-180
  text: 只想輕鬆的話，把兩個喜歡的顏色並排看一分鐘。
  tags: [color, contrast]
  estimatedMinutes: 5
