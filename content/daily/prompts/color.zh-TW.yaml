# 每日創作提示：顏色實驗
# 主題涵蓋配色練習、限制色數、取色、單色、對比色、情緒配色、色彩調和
# id 格式 p-color-NNN；text 6-80 中文字；tags 2-3 個；estimatedMinutes 5-40

- id: p-color-001
  text: 從今天拍的一張照片取三個顏色，只用這三個做一張圖。
  tags: [color, extraction, limited]
  estimatedMinutes: 20

- id: p-color-002
  text: 只用黑與白兩色，畫此刻窗外的天空。
  tags: [color, monochrome]
  estimatedMinutes: 15

- id: p-color-003
  text: 挑一件今天穿的衣服，抓出它的兩個主色，配成一組。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-004
  text: 選你最不喜歡的顏色，只用它的深淺變化畫一個小東西。
  tags: [color, monochrome]
  estimatedMinutes: 20

- id: p-color-005
  text: 把藍色和橘色放在一起，看它們互相撐起彼此。
  tags: [color, contrast]
  estimatedMinutes: 15

- id: p-color-006
  text: 從冰箱裡拿出最有顏色的三樣食物，記下它們的色票。
  tags: [color, extraction, palette]
  estimatedMinutes: 10

- id: p-color-007
  text: 用一個顏色加白色，做出五階由淺到深的階梯。
  tags: [color, monochrome, harmony]
  estimatedMinutes: 15

- id: p-color-008
  text: 幫「今天的心情」配一組三色，不用管好不好看。
  tags: [color, mood]
  estimatedMinutes: 10

- id: p-color-009
  text: 只用房間裡找得到的顏色，湊出一組五色調色盤。
