  estimatedMinutes: 20

- id: p-color-010
  text: 挑兩枝手邊的筆，只用這兩色畫完一張塗鴉。
  tags: [color, limited]
  estimatedMinutes: 15

- id: p-color-011
  text: 從一朵花或一片葉子取色，做一個小色卡。
  tags: [color, extraction]
  estimatedMinutes: 10

- id: p-color-012
  text: 選一首正在聽的歌，替它配一組顏色。
