  estimatedMinutes: 3
- id: p-diary-039
  text: 今天有一個瞬間你想暫停，把它寫下來。
  tags: [diary, moment]
  estimatedMinutes: 5
- id: p-diary-040
  text: 畫今天窗外的一棵樹或一株植物，五筆之內。
