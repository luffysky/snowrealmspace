# 每日創作提示 — 視覺日記與日常紀錄
# 主題：記錄今天、把一天畫成一張、收集今天的一個畫面、每天一格、生活素材庫
# 允許低能量的日子。具體、可動手做。

- id: p-diary-001
  text: 用一個畫面記錄今天，之後你會想起來的那個。
  tags: [diary, moment]
  estimatedMinutes: 10
- id: p-diary-002
  text: 拍下你今天喝的第一杯飲料，連杯子一起入鏡。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-003
  text: 把今天最占空間的一件事，畫成一個簡單的形狀。
  tags: [diary, one_frame]
  estimatedMinutes: 8
- id: p-diary-004
  text: 記下你今天走過、平常不會多看一眼的一段路。
  tags: [diary, everyday]
  estimatedMinutes: 5
- id: p-diary-005
  text: 拍你此刻的桌面，原封不動，不用整理。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-006
  text: 今天聽到的一句話，抄下來，不解釋。
  tags: [diary, journal]
  estimatedMinutes: 4
- id: p-diary-007
  text: 把今天的天空拍下來，就現在窗外那片。
  tags: [diary, one_frame]
  estimatedMinutes: 3
- id: p-diary-008
  text: 畫一個小格子，塞進今天最想記住的顏色。
  tags: [diary, everyday]
  estimatedMinutes: 6
- id: p-diary-009
  text: 記錄你今天第一次笑出來是因為什麼。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-010
  text: 拍下你現在腳邊、桌下或身旁的地面。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-011
  text: 把今天的心情選一個天氣符號代表，畫下來。
  tags: [diary, one_frame]
  estimatedMinutes: 5
- id: p-diary-012
  text: 記下你今天吃的午餐，哪怕只是一行字。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-013
  text: 拍一張今天讓你停下腳步三秒的東西。
  tags: [diary, moment]
  estimatedMinutes: 4
- id: p-diary-014
  text: 用三個詞總結今天到現在為止，寫下來。
  tags: [diary, journal]
  estimatedMinutes: 4
- id: p-diary-015
  text: 收集今天出現在你面前的一個數字，拍或寫都行。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-016
  text: 畫下你今天穿的鞋，站著低頭看的那個角度。
  tags: [diary, one_frame]
  estimatedMinutes: 8
- id: p-diary-017
  text: 記下今天有誰讓你覺得被在乎，一句就好。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-018
  text: 拍你手邊正在用的一個舊物，說它幾歲了。
  tags: [diary, archive]
  estimatedMinutes: 5
- id: p-diary-019
  text: 把今天窗外的光畫成一塊顏色就好，不必像。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-020
  text: 記下你今天說出口最多次的那個字或詞。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-021
  text: 拍下今天你手機裡最後一張照片的續集，補一張。
