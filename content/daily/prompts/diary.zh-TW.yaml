  estimatedMinutes: 3
- id: p-diary-034
  text: 收集今天路上的一個招牌字，拍或抄下來。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-035
  text: 用一句話寫下今天的天氣，像跟朋友報告那樣。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-036
  text: 畫一格今天的早餐，就算只是一個圈也算。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-037
  text: 記下今天你花最多錢的一筆，買了什麼。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-038
  text: 拍下你今天用過最多次的那個按鈕或開關。
