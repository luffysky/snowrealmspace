  text: 拍你今天穿的襪子，就低頭那個角度。
  tags: [diary, everyday]
  estimatedMinutes: 3
- id: p-diary-131
  text: 畫今天你窗台或桌邊的一個小擺設。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-132
  text: 記下今天你最想跟過去的自己說的一句話。
  tags: [diary, journal]
  estimatedMinutes: 6
- id: p-diary-133
  text: 收集今天一個好看的光影，拍下它落在哪。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-134
  text: 把今天的忙與閒切成兩塊，畫出誰比較大。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-135
  text: 記下今天你花最久盯著看的一個畫面。
  tags: [diary, moment]
  estimatedMinutes: 5
- id: p-diary-136
  text: 拍你今天喝完的那個瓶子或罐子。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-137
  text: 今天你原諒了自己什麼，寫一句就好。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-138
  text: 畫一格今天的鑰匙、卡片或悠遊卡。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-139
  text: 記下今天你最想按下重播的一段聲音。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-140
  text: 收集今天一張你路過的海報或告示，拍下。
  tags: [diary, archive]
  estimatedMinutes: 3
- id: p-diary-141
  text: 把今天的自己畫成一隻動物，配一個表情。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-142
  text: 記下今天你最先聞到的早晨氣味。
  tags: [diary, moment]
  estimatedMinutes: 4
- id: p-diary-143
  text: 拍你此刻右手能碰到的第一個東西。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-144
  text: 記下今天你想收藏的一句廣告詞或標語。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-145
  text: 畫今天窗外最高的那個東西的頂端。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-146
  text: 記下今天有什麼比昨天好了一點點。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-147
  text: 收集今天你桌上的三樣東西，拍成一排。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-148
  text: 把今天的溫度和心情各畫一格，並排放。
  tags: [diary, one_frame]
  estimatedMinutes: 8
- id: p-diary-149
  text: 記下今天你最想留給明天的一件事。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-150
  text: 拍你今天用手機拍的第一張照片旁邊的東西。
  tags: [diary, everyday]
  estimatedMinutes: 3
- id: p-diary-151
  text: 畫一格今天的雨傘、外套或圍巾。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-152
  text: 記下今天你聽到最溫柔的一句話。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-153
  text: 收集今天一個你想再訪的地方，記下名字。
  tags: [diary, archive]
  estimatedMinutes: 4
- id: p-diary-154
  text: 拍你今天路過的一面牆，磚、漆或塗鴉。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-155
  text: 把今天畫成一格漫畫，一句對白就夠。
  tags: [diary, one_frame]
  estimatedMinutes: 9
- id: p-diary-156
  text: 記下今天讓你鬆一口氣的那一刻。
  tags: [diary, moment]
  estimatedMinutes: 4
- id: p-diary-157
  text: 收集今天你看到的一個時鐘畫面，記下時間。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-158
  text: 拍你今天坐過的椅子，離開後的樣子。
  tags: [diary, everyday]
  estimatedMinutes: 3
- id: p-diary-159
  text: 畫今天你窗外的一條電線或欄杆的線條。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-160
  text: 記下今天你最想擁抱誰。
  tags: [diary, journal]
  estimatedMinutes: 4
- id: p-diary-161
  text: 收集今天一個好聽的地名或店名，寫下來。
  tags: [diary, archive]
  estimatedMinutes: 3
- id: p-diary-162
  text: 拍此刻你眼前最亮和最暗的兩個地方。
  tags: [diary, moment]
  estimatedMinutes: 4
- id: p-diary-163
  text: 把今天的力氣分成早中晚，畫三根高低不同的柱。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-164
  text: 記下今天你想謝謝身體哪個部位。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-165
  text: 收集今天你經過的一朵花或一片草，拍下。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-166
  text: 畫一格今天的碗、盤子或便當盒。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-167
  text: 記下今天你最想收進口袋的一個字。
  tags: [diary, everyday]
  estimatedMinutes: 4
- id: p-diary-168
  text: 拍你今天窗外的黃昏或夜色，就現在。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-169
  text: 收集今天一個讓你安靜下來的畫面，存起來。
  tags: [diary, archive]
  estimatedMinutes: 4
- id: p-diary-170
  text: 把今天的天氣和身體感覺畫成同一格。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-171
  text: 記下今天你想給自己的一個小獎勵。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-172
  text: 拍你今天最靠近的一盞燈的光。
  tags: [diary, collect]
  estimatedMinutes: 3
- id: p-diary-173
  text: 記下今天你錯過卻沒關係的一件事。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-174
  text: 畫一格今天的手機或電腦，螢幕上什麼都行。
  tags: [diary, one_frame]
  estimatedMinutes: 6
- id: p-diary-175
  text: 收集今天你想記得的一個溫度，冷飲或暖手。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-176
  text: 拍你今天走進的第一扇門的門口。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-177
  text: 把今天用一個標點符號代表，畫大大的它。
  tags: [diary, one_frame]
  estimatedMinutes: 5
- id: p-diary-178
  text: 記下今天你最想跟明天的自己約定的事。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-179
  text: 收集今天一段你哼過的旋律，寫下歌詞一句。
  tags: [diary, archive]
  estimatedMinutes: 4
- id: p-diary-180
  text: 拍你此刻的手，正在做的最後一件事。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-181
  text: 畫今天你窗外看到的一個人的剪影。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-182
  text: 記下今天最小但真實的一個快樂。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-183
  text: 收集今天一個你想留下的味道，寫下它的名字。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-184
  text: 把今天畫成一張，只要一個你記得的畫面。
  tags: [diary, one_frame]
  estimatedMinutes: 8
- id: p-diary-185
  text: 記下今天你最想對這一天說的一句話。
  tags: [diary, journal]
  estimatedMinutes: 5
