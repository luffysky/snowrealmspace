  estimatedMinutes: 7
- id: p-diary-041
  text: 記下你今天最想跟誰說話，還沒說也沒關係。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-042
  text: 收集今天你桌上出現的一張紙，拍下正面。
  tags: [diary, archive]
  estimatedMinutes: 3
- id: p-diary-043
  text: 把今天的忙碌程度畫成一條線，直的或波浪。
