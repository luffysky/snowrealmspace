  estimatedMinutes: 3
- id: p-diary-022
  text: 今天有一件事你原本不想做卻做了，記下它。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-023
  text: 畫一格四方框，只放今天的一個小物件。
  tags: [diary, one_frame]
  estimatedMinutes: 7
- id: p-diary-024
  text: 拍你現在坐的地方，讓未來的你認得出來。
  tags: [diary, moment]
  estimatedMinutes: 3
- id: p-diary-025
  text: 記下今天讓你分心最久的一件事，不評價。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-026
  text: 收集一片今天的葉子、票根或包裝，拍下來存著。
  tags: [diary, archive]
  estimatedMinutes: 4
- id: p-diary-027
  text: 把今天的溫度用一個顏色記錄，冷或暖你決定。
  tags: [diary, one_frame]
  estimatedMinutes: 5
- id: p-diary-028
  text: 記下你今天到現在喝了幾杯水，誠實就好。
  tags: [diary, everyday]
  estimatedMinutes: 3
- id: p-diary-029
  text: 拍下今天你經過最喜歡的一扇窗或一道門。
  tags: [diary, collect]
  estimatedMinutes: 4
- id: p-diary-030
  text: 今天你聽了什麼歌，寫下歌名和當下在做什麼。
  tags: [diary, journal]
  estimatedMinutes: 4
- id: p-diary-031
  text: 畫你今天手裡拿最久的那個東西的輪廓。
  tags: [diary, one_frame]
  estimatedMinutes: 8
- id: p-diary-032
  text: 記下今天的一個氣味，它讓你想到什麼。
  tags: [diary, journal]
  estimatedMinutes: 5
- id: p-diary-033
  text: 拍你今天的影子，地上、牆上，哪個都行。
