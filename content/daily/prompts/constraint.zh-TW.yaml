- id: p-constraint-001
  text: 只用圓形，做一張構圖。
  tags: [constraint, shape, composition]
  estimatedMinutes: 20
- id: p-constraint-002
  text: 用三種顏色重做你最近一張設計。少一種顏色，多一點決定。
  tags: [constraint, color]
  estimatedMinutes: 25
- id: p-constraint-003
  text: 限時十分鐘做一張海報，時間到就停，不管完成度。
  tags: [constraint, time_limit]
  estimatedMinutes: 10
- id: p-constraint-004
  text: 整張畫面只用黑與白，不准出現任何灰階。
  tags: [constraint, minimal, color]
  estimatedMinutes: 20
- id: p-constraint-005
  text: 只用直線畫一個你眼前的物件，一條曲線都不行。
  tags: [constraint, shape]
  estimatedMinutes: 15
- id: p-constraint-006
  text: 今天的作品不准用橡皮擦，也不准撤銷，錯了就順著走。
  tags: [constraint, rules, challenge]
  estimatedMinutes: 20
- id: p-constraint-007
  text: 用一種顏色的深淺變化，畫出一顆水果。
  tags: [constraint, color, minimal]
  estimatedMinutes: 25
- id: p-constraint-008
  text: 只用三角形拼出一隻動物的樣子。
  tags: [constraint, shape, composition]
  estimatedMinutes: 20
- id: p-constraint-009
  text: 不准用主色，把平常最少用的顏色當主角，做一張圖。
  tags: [constraint, color, challenge]
  estimatedMinutes: 25
- id: p-constraint-010
  text: 限時五分鐘，畫五個不同表情，一個一分鐘。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 10
- id: p-constraint-011
  text: 整個畫面只准出現一個形狀，重複它、旋轉它、縮放它。
  tags: [constraint, shape, composition]
  estimatedMinutes: 20
- id: p-constraint-012
  text: 用你的非慣用手，寫下今天的一句話並裝飾它。
  tags: [constraint, challenge, rules]
  estimatedMinutes: 15
- id: p-constraint-013
  text: 不准用文字，只用符號和圖形表達今天的心情。
  tags: [constraint, minimal, rules]
  estimatedMinutes: 20
- id: p-constraint-014
  text: 只用正方形，設計一個 app 的首頁畫面。
  tags: [constraint, shape, composition]
  estimatedMinutes: 30
- id: p-constraint-015
  text: 今天只准用一支筆、一種粗細，完成一張線稿。
  tags: [constraint, minimal, limitation]
  estimatedMinutes: 25
- id: p-constraint-016
  text: 把畫面切成九宮格，每一格只能放一個元素。
  tags: [constraint, composition, rules]
  estimatedMinutes: 20
- id: p-constraint-017
  text: 用兩種對比色，做一張不需要文字就看得懂的告示。
  tags: [constraint, color, composition]
  estimatedMinutes: 25
- id: p-constraint-018
  text: 限時十五分鐘，畫完窗外你看到的一切。
  tags: [constraint, time_limit]
  estimatedMinutes: 15
- id: p-constraint-019
  text: 整張圖不准出現任何直角，全部都要圓潤。
  tags: [constraint, shape, rules]
  estimatedMinutes: 20
- id: p-constraint-020
  text: 只用點，不用線也不用面，堆出一張肖像。
  tags: [constraint, minimal, challenge]
  estimatedMinutes: 30
- id: p-constraint-021
  text: 用灰色的五個階調，畫出一個空間的層次。
  tags: [constraint, color, minimal]
  estimatedMinutes: 30
- id: p-constraint-022
  text: 今天的作品只能用一張紙的正反面，不准第二張。
  tags: [constraint, limitation, rules]
  estimatedMinutes: 25
- id: p-constraint-023
  text: 不准用黑色描邊，讓形狀靠顏色自己分開。
  tags: [constraint, color, rules]
  estimatedMinutes: 25
- id: p-constraint-024
  text: 只用重複的橫線，做出深淺與明暗。
  tags: [constraint, shape, minimal]
  estimatedMinutes: 20
- id: p-constraint-025
  text: 限時三分鐘，用最少的筆畫抓住一個人的姿態。
  tags: [constraint, time_limit, minimal]
  estimatedMinutes: 10
- id: p-constraint-026
  text: 只用暖色，畫出一個明明很冷的場景。
  tags: [constraint, color, challenge]
  estimatedMinutes: 25
- id: p-constraint-027
  text: 整張構圖只用大中小三個圓，決定它們的位置就好。
  tags: [constraint, shape, composition]
  estimatedMinutes: 20
- id: p-constraint-028
  text: 不准用尺，徒手畫十條盡量筆直的線。
  tags: [constraint, challenge, rules]
  estimatedMinutes: 10
- id: p-constraint-029
  text: 用冷色調，設計一張夏日活動的海報。
  tags: [constraint, color, composition]
  estimatedMinutes: 30
- id: p-constraint-030
  text: 只用文字排版，不放任何圖，做一張封面。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 30
- id: p-constraint-031
  text: 今天只能用剪刀和紙，不准畫，拼出一個圖案。
  tags: [constraint, limitation, challenge]
  estimatedMinutes: 25
- id: p-constraint-032
  text: 限時二十分鐘，重畫一張你以前不滿意的舊作。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 20
- id: p-constraint-033
  text: 整張圖只准用兩個字級大小，把層次做出來。
  tags: [constraint, rules, composition]
  estimatedMinutes: 25
- id: p-constraint-034
  text: 只用半透明的圖層，靠重疊產生第三種顏色。
  tags: [constraint, color, minimal]
  estimatedMinutes: 25
- id: p-constraint-035
  text: 不准用曲線工具，全部用直線段拼出一個圓。
  tags: [constraint, shape, challenge]
  estimatedMinutes: 20
- id: p-constraint-036
  text: 用一個正方形和它的分割，做出九種不同版面。
  tags: [constraint, shape, composition]
  estimatedMinutes: 30
- id: p-constraint-037
  text: 限時一分鐘，畫一個你此刻最想吃的東西。
  tags: [constraint, time_limit, minimal]
  estimatedMinutes: 10
- id: p-constraint-038
  text: 只用單色線條，畫滿整張紙不留白。
  tags: [constraint, minimal, challenge]
  estimatedMinutes: 30
- id: p-constraint-039
  text: 不准用漸層，只用純色的塊面做出立體感。
  tags: [constraint, color, rules]
  estimatedMinutes: 25
- id: p-constraint-040
  text: 整個作品只能有一個焦點，其他全部退到背景。
  tags: [constraint, composition, minimal]
  estimatedMinutes: 20
- id: p-constraint-041
  text: 用三種顏色，設計一個你最愛品牌的替代 logo。
  tags: [constraint, color, challenge]
  estimatedMinutes: 30
- id: p-constraint-042
  text: 只用圓角矩形，畫出一整組介面圖示。
  tags: [constraint, shape, composition]
  estimatedMinutes: 30
- id: p-constraint-043
  text: 限時十分鐘，畫五個版本的同一顆蘋果。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 10
- id: p-constraint-044
  text: 不准填色，只用輪廓線讓人看懂是什麼。
  tags: [constraint, minimal, rules]
  estimatedMinutes: 20
- id: p-constraint-045
  text: 用同一個形狀重複一百次，讓它變成質感。
  tags: [constraint, shape, minimal]
  estimatedMinutes: 30
- id: p-constraint-046
  text: 只用兩種顏色，畫一張日出。
  tags: [constraint, color, minimal]
  estimatedMinutes: 20
- id: p-constraint-047
  text: 今天的字全部手寫，不准用任何字型。
  tags: [constraint, rules, challenge]
  estimatedMinutes: 25
- id: p-constraint-048
  text: 整張畫面只用左半邊，右半邊留白。
  tags: [constraint, composition, minimal]
  estimatedMinutes: 20
- id: p-constraint-049
  text: 用一條不斷開的線，畫完一張臉。
  tags: [constraint, minimal, challenge]
  estimatedMinutes: 15
- id: p-constraint-050
  text: 只准用你手邊三種現成材料，拼一張圖。
  tags: [constraint, limitation, challenge]
  estimatedMinutes: 25
- id: p-constraint-051
  text: 限時三十分鐘，把一個房間畫成一個角色。
