  estimatedMinutes: 25
- id: p-constraint-128
  text: 不准畫細節，只用大塊面抓住一個場景的氣氛。
  tags: [constraint, minimal, challenge]
  estimatedMinutes: 20
- id: p-constraint-129
  text: 限時二十分鐘，用一個表情包重畫一幅名畫。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 20
- id: p-constraint-130
  text: 只用垂直的元素，排一張很高很瘦的長圖。
  tags: [constraint, composition, rules]
  estimatedMinutes: 25
- id: p-constraint-131
  text: 用一種顏色的線，纏繞出一個立體的球感。
  tags: [constraint, color, shape]
  estimatedMinutes: 25
- id: p-constraint-132
  text: 不准用電腦，全程手作完成今天的練習。
  tags: [constraint, limitation, challenge]
  estimatedMinutes: 30
- id: p-constraint-133
  text: 只用三個圓角矩形，排一張名片。
  tags: [constraint, shape, composition]
  estimatedMinutes: 20
- id: p-constraint-134
  text: 限時十分鐘，替一個沒有名字的顏色取名並畫它。
  tags: [constraint, time_limit, color]
  estimatedMinutes: 10
- id: p-constraint-135
  text: 不准用陰影，只靠形狀重疊表現前後關係。
  tags: [constraint, composition, rules]
  estimatedMinutes: 25
- id: p-constraint-136
  text: 用黑紙白筆，反過來畫一張平常的素描。
  tags: [constraint, color, challenge]
  estimatedMinutes: 30
- id: p-constraint-137
  text: 只用一半的畫面，剩下一半當作故意的空。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 20
- id: p-constraint-138
  text: 不准用超過三種粗細的線，畫一張建築立面。
  tags: [constraint, rules, composition]
  estimatedMinutes: 30
- id: p-constraint-139
  text: 用一個問號的形狀，長出一整張插畫。
  tags: [constraint, shape, challenge]
  estimatedMinutes: 25
- id: p-constraint-140
  text: 限時五分鐘，畫下你閉眼時看到的顏色。
  tags: [constraint, time_limit, color]
  estimatedMinutes: 10
- id: p-constraint-141
  text: 只用手邊的一種食物，排一張有設計感的照片。
  tags: [constraint, limitation, composition]
  estimatedMinutes: 20
- id: p-constraint-142
  text: 不准用滿的顏色，全部降到最淡，畫一張輕的圖。
  tags: [constraint, color, minimal]
  estimatedMinutes: 25
- id: p-constraint-143
  text: 用五個相同的三角形，排出一個會轉的錯覺。
  tags: [constraint, shape, composition]
  estimatedMinutes: 25
- id: p-constraint-144
  text: 今天只准用一個動作重複的筆觸，做一整面質感。
  tags: [constraint, minimal, rules]
  estimatedMinutes: 25
- id: p-constraint-145
  text: 限時三十分鐘，把一個字拆解重組成新的字符。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 30
- id: p-constraint-146
  text: 不准用背景，讓主體漂在純白裡也站得住。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 20
- id: p-constraint-147
  text: 用兩個顏色輪流，畫一條漸變的長條。
  tags: [constraint, color, minimal]
  estimatedMinutes: 15
- id: p-constraint-148
  text: 只用圓形和一條線，做一個時鐘的圖示。
  tags: [constraint, shape, minimal]
  estimatedMinutes: 15
- id: p-constraint-149
  text: 不准用現成筆刷，自己做一個再畫五分鐘。
  tags: [constraint, limitation, challenge]
  estimatedMinutes: 20
- id: p-constraint-150
  text: 用單色，畫一張讓人感覺很吵的圖。
  tags: [constraint, color, challenge]
  estimatedMinutes: 25
- id: p-constraint-151
  text: 限時十分鐘，把一個聲音畫成一條線。
  tags: [constraint, time_limit, minimal]
  estimatedMinutes: 10
- id: p-constraint-152
  text: 只准用一個方向的斜線，鋪出整張陰影。
  tags: [constraint, minimal, rules]
  estimatedMinutes: 20
- id: p-constraint-153
  text: 不准用超過五個字，設計一張活動主視覺。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 30
- id: p-constraint-154
  text: 用一個六邊形，鋪滿整張紙不留縫。
  tags: [constraint, shape, rules]
  estimatedMinutes: 20
- id: p-constraint-155
  text: 限時二十五分鐘，把一種味道畫成一張抽象圖。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 25
- id: p-constraint-156
  text: 不准用手繪，只用現成幾何圖形拼出一張臉。
  tags: [constraint, shape, limitation]
  estimatedMinutes: 25
- id: p-constraint-157
  text: 用三種顏色，畫一張只給色盲也看得懂的圖表。
  tags: [constraint, color, challenge]
  estimatedMinutes: 30
- id: p-constraint-158
  text: 只用一種形狀的陰影，暗示整個光線方向。
  tags: [constraint, shape, composition]
  estimatedMinutes: 25
- id: p-constraint-159
  text: 限時五分鐘，畫一個你今天路過但忘了細看的東西。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 10
- id: p-constraint-160
  text: 不准用超過兩個圖層，完成一張數位插畫。
  tags: [constraint, limitation, challenge]
  estimatedMinutes: 30
- id: p-constraint-161
  text: 用純線稿，不上色，講完一個晚上的故事。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 30
- id: p-constraint-162
  text: 只用四方連續的重複單位，設計一張包裝紙。
  tags: [constraint, rules, composition]
  estimatedMinutes: 30
- id: p-constraint-163
  text: 不准把主角放中間，故意擠到角落找張力。
  tags: [constraint, composition, challenge]
  estimatedMinutes: 20
- id: p-constraint-164
  text: 用一個顏色加黑白，畫一張老照片的感覺。
  tags: [constraint, color, minimal]
  estimatedMinutes: 25
- id: p-constraint-165
  text: 限時十分鐘，替一個抽象詞畫一個具體符號。
  tags: [constraint, time_limit, minimal]
  estimatedMinutes: 10
- id: p-constraint-166
  text: 只用同一個字重複排列，做出一張圖像。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 25
- id: p-constraint-167
  text: 不准用超過三個顏色，重新配一張你喜歡的截圖。
  tags: [constraint, color, challenge]
  estimatedMinutes: 25
- id: p-constraint-168
  text: 用弧線和直線各一種，畫一座橋。
  tags: [constraint, shape, minimal]
  estimatedMinutes: 20
- id: p-constraint-169
  text: 限時十五分鐘，把一個夢的片段畫成一格。
  tags: [constraint, time_limit, challenge]
  estimatedMinutes: 15
- id: p-constraint-170
  text: 不准用飽和色，只用灰濁的顏色畫一個熱鬧場景。
  tags: [constraint, color, challenge]
  estimatedMinutes: 30
- id: p-constraint-171
  text: 只用畫面的四個角落，中間全部留空。
  tags: [constraint, composition, minimal]
  estimatedMinutes: 20
- id: p-constraint-172
  text: 用一個橢圓，變出十個不同的日常物件。
  tags: [constraint, shape, challenge]
  estimatedMinutes: 25
- id: p-constraint-173
  text: 不准用尺標與參考線，徒手排一張對稱版面。
  tags: [constraint, rules, challenge]
  estimatedMinutes: 25
- id: p-constraint-174
  text: 限時三分鐘，只用五個色塊拼出今天的心情。
  tags: [constraint, time_limit, color]
  estimatedMinutes: 10
- id: p-constraint-175
  text: 只用單一線寬，畫一張有輕重層次的地圖。
  tags: [constraint, minimal, composition]
  estimatedMinutes: 30
- id: p-constraint-176
  text: 不准用具象的東西，只用抽象形狀表達安靜。
  tags: [constraint, minimal, challenge]
  estimatedMinutes: 25
- id: p-constraint-177
  text: 用三個相同大小的方塊，做出九種平衡的排法。
  tags: [constraint, shape, composition]
  estimatedMinutes: 25
- id: p-constraint-178
  text: 低能量的一天，就用一個顏色塗滿一張紙，這樣就好。
  tags: [constraint, color, minimal]
  estimatedMinutes: 10
