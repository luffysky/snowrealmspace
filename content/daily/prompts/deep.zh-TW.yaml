  estimatedMinutes: 20

- id: p-deep-028
  text: 把系列作的下一集開個檔，寫一行標題就算數。
  tags: [deep, series]
  estimatedMinutes: 10

- id: p-deep-029
  text: 挑專案裡一段舊的東西重做，看看你進步了多少。
