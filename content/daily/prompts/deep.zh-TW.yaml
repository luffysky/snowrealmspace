# 每日創作提示 — 深度專案的一小步
# 主題：把大專案切成今天就能動手的小步驟
# 每則獨一無二；允許低能量的日子；不空泛、不製造罪惡感、不假倒數。

- id: p-deep-001
  text: 挑一個你擱著的大計畫，只做它最小的下一步，做完就停。
  tags: [deep, next_step]
  estimatedMinutes: 25

- id: p-deep-002
  text: 把你最想完成的大目標，寫成一句「今天可以做的一件事」。
  tags: [deep, breaking_down]
  estimatedMinutes: 10

- id: p-deep-003
  text: 打開那個一直沒動的檔案，看五分鐘就好，不用改任何東西。
  tags: [deep, momentum]
  estimatedMinutes: 10

- id: p-deep-004
  text: 把大專案拆成三個階段，只寫標題，先不管細節。
  tags: [deep, breaking_down]
  estimatedMinutes: 15

- id: p-deep-005
  text: 為你的長期計畫建一個資料夾，把散落的東西丟進去。
  tags: [deep, project]
  estimatedMinutes: 20

- id: p-deep-006
  text: 寫下這個專案卡住的那一步，光是說清楚就往前一點。
  tags: [deep, breaking_down]
  estimatedMinutes: 15

- id: p-deep-007
  text: 挑系列作的下一集，只列出它要有的三個元素。
  tags: [deep, series]
  estimatedMinutes: 15

- id: p-deep-008
  text: 今天只做「準備工作」：把工具擺好，明天的你會謝謝你。
  tags: [deep, momentum]
  estimatedMinutes: 15

- id: p-deep-009
  text: 把大目標的完成畫面寫成三句話，貼在看得到的地方。
  tags: [deep, long_term]
  estimatedMinutes: 15

- id: p-deep-010
  text: 找出專案裡最小、最無聊、最好完成的一項，先把它解決。
  tags: [deep, next_step]
  estimatedMinutes: 20

- id: p-deep-011
  text: 低能量的日子，就只把昨天做的重讀一遍，什麼都不加。
  tags: [deep, momentum]
  estimatedMinutes: 10

- id: p-deep-012
  text: 為擱置的計畫寫一份「重啟說明」，給幾週後回來的自己。
  tags: [deep, long_term]
  estimatedMinutes: 20

- id: p-deep-013
  text: 把專案的下一步拆到「不可能失敗」的大小，然後做掉。
  tags: [deep, breaking_down]
  estimatedMinutes: 15

- id: p-deep-014
  text: 列出這個大專案需要學的一件事，今天只查它是什麼。
  tags: [deep, next_step]
  estimatedMinutes: 20

- id: p-deep-015
  text: 幫系列作想一個共同的視覺或聲音記號，讓每一集都認得出。
  tags: [deep, series]
  estimatedMinutes: 20

- id: p-deep-016
  text: 把「有一天要做」的計畫，改寫成「這個月的一小步」。
  tags: [deep, long_term]
  estimatedMinutes: 15

- id: p-deep-017
  text: 為專案設一個超低的今日目標，達成後允許自己收工。
  tags: [deep, progress]
  estimatedMinutes: 15

- id: p-deep-018
  text: 打開草稿，只修一個句子或一個線條，不求多。
