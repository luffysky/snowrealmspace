  estimatedMinutes: 20

- id: p-deep-022
  text: 把卡住的地方跳過去，先做它後面那一步。
  tags: [deep, next_step]
  estimatedMinutes: 25

- id: p-deep-023
  text: 幫系列作開一個編號清單，把已完成和未完成分開。
  tags: [deep, series]
  estimatedMinutes: 15

- id: p-deep-024
  text: 今天只清理專案的工作區，讓明天更好開始。
  tags: [deep, momentum]
  estimatedMinutes: 15

- id: p-deep-025
  text: 把一個模糊的大想法，寫成一頁能給別人看的說明。
  tags: [deep, breaking_down]
  estimatedMinutes: 30

- id: p-deep-026
  text: 找出專案裡你一直在拖的那一步，只做它的前三分鐘。
