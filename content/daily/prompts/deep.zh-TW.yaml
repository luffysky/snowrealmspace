  estimatedMinutes: 30

- id: p-deep-020
  text: 寫下三個「做完會很爽」的小任務，挑一個動手。
  tags: [deep, next_step]
  estimatedMinutes: 25

- id: p-deep-021
  text: 為長期計畫畫一條時間線，只標出下一個里程碑。
