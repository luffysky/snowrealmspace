# 每日創作提示 — 觀察練習
# 主題：引導觀察生活、顏色、光影、細節、周遭
# 全部繁體中文（台灣用語）。每一則獨一無二。

- id: p-observe-001
  text: 把今天看到的一個顏色記下來。不用馬上用。
  tags: [observation, color, low_effort]
  estimatedMinutes: 2

- id: p-observe-002
  text: 找一個你每天經過但沒仔細看過的東西，看三十秒。
  tags: [observation, everyday, noticing]
  estimatedMinutes: 2

- id: p-observe-003
  text: 記錄今天光線最好的一個時刻，拍下來或寫下來。
  tags: [observation, light, everyday]
  estimatedMinutes: 3

- id: p-observe-004
  text: 看看你手邊的杯子，描述它的三個細節。
  tags: [observation, detail, low_effort]
  estimatedMinutes: 3

- id: p-observe-005
  text: 抬頭看天空一分鐘，記下雲的形狀或天空的顏色。
  tags: [observation, color, light]
  estimatedMinutes: 2

- id: p-observe-006
  text: 找出房間裡最舊的一樣東西，看看它磨損的地方。
  tags: [observation, detail, texture]
  estimatedMinutes: 4

- id: p-observe-007
  text: 閉上眼睛一分鐘，記下你聽到的三種聲音。
