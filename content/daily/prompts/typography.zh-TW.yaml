# 每日創作提示 — 字體與排版練習
# 主題：換字體、字級對比、行距、對齊、只用文字做設計、標題練習
# 每則獨一無二；允許低能量的日子；不空泛、不製造罪惡感。

- id: p-typography-001
  text: 同一句話，用三種字體各排一次，看差別。
  tags: [typography, comparison]
  estimatedMinutes: 15

- id: p-typography-002
  text: 把今天的心情寫成一個字，放大到整個畫面。
  tags: [title, text_only]
  estimatedMinutes: 10

- id: p-typography-003
  text: 找一段舊訊息，重排它的行距，讀起來更舒服為止。
  tags: [spacing, layout]
  estimatedMinutes: 15

- id: p-typography-004
  text: 用一個標題和一行小字，做出主從關係。
  tags: [hierarchy, title]
  estimatedMinutes: 12

- id: p-typography-005
  text: 只用文字，不放任何圖，做一張生日卡的版面。
  tags: [text_only, layout]
  estimatedMinutes: 20

- id: p-typography-006
  text: 把一個詞左對齊、置中、右對齊各排一次，選你最喜歡的。
