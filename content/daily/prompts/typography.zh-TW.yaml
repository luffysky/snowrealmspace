  text: 用一個粗字體和一個手寫字體，排一句對比。
  tags: [font, hierarchy]
  estimatedMinutes: 12

- id: p-typography-127
  text: 把一個問句放大，答案用小字放它下方。
  tags: [hierarchy, text_only]
  estimatedMinutes: 12

- id: p-typography-128
  text: 用純文字排一張活動海報，含時間地點。
  tags: [text_only, layout]
  estimatedMinutes: 30

- id: p-typography-129
  text: 讓三行字置中，每行長度不同，看是否平衡。
  tags: [alignment, layout]
  estimatedMinutes: 12

- id: p-typography-130
  text: 挑一個字體，把它的粗體當標題、細體當內文。
  tags: [font, hierarchy]
  estimatedMinutes: 15

- id: p-typography-131
  text: 累的話，只把一段文字整體縮小一點，留出邊界。
  tags: [spacing, layout]
  estimatedMinutes: 5

- id: p-typography-132
  text: 把一句話排成兩行，讓斷點落在最有力的字前。
  tags: [layout, text_only]
  estimatedMinutes: 10

- id: p-typography-133
  text: 用文字排一張倒數牌，只有一個大數字。
  tags: [title, text_only]
  estimatedMinutes: 10

- id: p-typography-134
  text: 讓標題右對齊、內文左對齊，做出張力。
  tags: [alignment, hierarchy]
  estimatedMinutes: 15

- id: p-typography-135
  text: 把一段文字換成襯線字體，再換無襯線，比可讀性。
  tags: [font, comparison]
  estimatedMinutes: 12

- id: p-typography-136
  text: 用一句話當唯一內容，練習它在畫面裡的位置。
  tags: [layout, text_only]
  estimatedMinutes: 12

- id: p-typography-137
  text: 讓標題的字距寬鬆，內文緊湊，做出氣質差。
  tags: [spacing, hierarchy]
  estimatedMinutes: 15

- id: p-typography-138
  text: 用文字排一張咖啡店的價目表。
  tags: [text_only, alignment]
  estimatedMinutes: 25

- id: p-typography-139
  text: 把一個字體的所有粗細，從細到粗排成色階。
  tags: [font, comparison]
  estimatedMinutes: 15

- id: p-typography-140
  text: 低能量日：把一句話置中，換個喜歡的字體。
  tags: [font, alignment]
  estimatedMinutes: 5

- id: p-typography-141
  text: 讓一段文字的段首用一個特別大的字帶頭。
  tags: [hierarchy, layout]
  estimatedMinutes: 12

- id: p-typography-142
  text: 把兩句話一左一右對齊在畫面兩邊。
  tags: [alignment, layout]
  estimatedMinutes: 12

- id: p-typography-143
  text: 用文字排一張電子邀請函的標題區。
  tags: [text_only, title]
  estimatedMinutes: 20

- id: p-typography-144
  text: 讓行距等於字高的一點五倍，感受標準間距。
  tags: [spacing, layout]
  estimatedMinutes: 10

- id: p-typography-145
  text: 用一個字體排嚴肅版，另一個排可愛版，同句話。
  tags: [font, comparison]
  estimatedMinutes: 15

- id: p-typography-146
  text: 把一段文字排成一個正方形的區塊。
  tags: [layout, alignment]
  estimatedMinutes: 15

- id: p-typography-147
  text: 讓標題用超大字，其他資訊縮到角落。
  tags: [hierarchy, title]
  estimatedMinutes: 12

- id: p-typography-148
  text: 用純文字排一張唱片封面的字樣。
  tags: [text_only, title]
  estimatedMinutes: 25

- id: p-typography-149
  text: 把一句話的每個字都換一種顏色深淺，做層次。
  tags: [hierarchy, text_only]
  estimatedMinutes: 12

- id: p-typography-150
  text: 累的話，只調整一段文字的對齊方式，看差別。
  tags: [alignment, comparison]
  estimatedMinutes: 5

- id: p-typography-151
  text: 用文字排一張機票登機證的版面。
  tags: [text_only, layout]
  estimatedMinutes: 30

- id: p-typography-152
  text: 讓標題和副標之間，留出一整行空白的距離。
  tags: [spacing, hierarchy]
  estimatedMinutes: 10

- id: p-typography-153
  text: 挑一個很有個性的字體，只寫一個字。
  tags: [font, title]
  estimatedMinutes: 8

- id: p-typography-154
  text: 把一段文字兩端對齊，處理最後一行的收尾。
  tags: [alignment, layout]
  estimatedMinutes: 15

- id: p-typography-155
  text: 用大中小三級字，排一張假的地址標籤。
  tags: [hierarchy, text_only]
  estimatedMinutes: 15

- id: p-typography-156
  text: 讓一句話重複三次，每次換一種字體。
  tags: [font, comparison]
  estimatedMinutes: 12

- id: p-typography-157
  text: 用文字排一張「小心地滑」的警示牌。
  tags: [text_only, title]
  estimatedMinutes: 12

- id: p-typography-158
  text: 把一段文字的行距故意調到很擠，體會壓迫感。
  tags: [spacing, comparison]
  estimatedMinutes: 10

- id: p-typography-159
  text: 讓標題橫排，副標直排，練習方向對比。
  tags: [layout, hierarchy]
  estimatedMinutes: 15

- id: p-typography-160
  text: 用一個字體排完一段話，圈出你最喜歡的一個字。
  tags: [font, text_only]
  estimatedMinutes: 10

- id: p-typography-161
  text: 把一句話置中在畫面正中，四周留大量空白。
  tags: [alignment, spacing]
  estimatedMinutes: 10

- id: p-typography-162
  text: 用文字排一張新年賀卡，只有四個字。
  tags: [text_only, title]
  estimatedMinutes: 12

- id: p-typography-163
  text: 讓一段文字用三個字級，做出明顯的視覺順序。
  tags: [hierarchy, layout]
  estimatedMinutes: 18

- id: p-typography-164
  text: 低能量日：把一個字放到最大，其餘不管。
  tags: [title, text_only]
  estimatedMinutes: 5

- id: p-typography-165
  text: 用兩種行距排同一段，讓上半緊、下半鬆。
  tags: [spacing, layout]
  estimatedMinutes: 12

- id: p-typography-166
  text: 挑一個字體，觀察它的標點長什麼樣子。
  tags: [font, comparison]
  estimatedMinutes: 8

- id: p-typography-167
  text: 把一句話的關鍵字換成不同字體，其餘不變。
  tags: [font, hierarchy]
  estimatedMinutes: 12

- id: p-typography-168
  text: 用純文字排一張電影片尾的工作人員字幕。
  tags: [text_only, alignment]
  estimatedMinutes: 25

- id: p-typography-169
  text: 讓標題貼齊左邊，內文靠右，練習反差對齊。
  tags: [alignment, hierarchy]
  estimatedMinutes: 15

- id: p-typography-170
  text: 把一段文字的每一段前後都留出相等空白。
  tags: [spacing, layout]
  estimatedMinutes: 12

- id: p-typography-171
  text: 用一個字體做白天版，再用同字體加粗做夜晚版。
  tags: [font, comparison]
  estimatedMinutes: 12

- id: p-typography-172
  text: 讓一句短語佔滿寬度，字被拉到剛好貼齊兩邊。
  tags: [alignment, title]
  estimatedMinutes: 12

- id: p-typography-173
  text: 用文字排一張圖書館的分類指示牌。
  tags: [text_only, layout]
  estimatedMinutes: 20

- id: p-typography-174
  text: 把標題放大、內文縮小，比例調到你覺得剛好。
  tags: [hierarchy, comparison]
  estimatedMinutes: 15

- id: p-typography-175
  text: 累的話，只把一段文字換行位置改順一點。
  tags: [layout, text_only]
  estimatedMinutes: 5

- id: p-typography-176
  text: 用三種字體寫同一個標題，貼在牆上遠看比較。
  tags: [font, title]
  estimatedMinutes: 15

- id: p-typography-177
  text: 讓一段文字置中對齊，觀察每行收尾的形狀。
  tags: [alignment, layout]
  estimatedMinutes: 12

- id: p-typography-178
  text: 把行距和段距都放大，做出很透氣的長文。
  tags: [spacing, layout]
  estimatedMinutes: 15

- id: p-typography-179
  text: 用純文字排一張致謝名單的版面。
  tags: [text_only, alignment]
  estimatedMinutes: 20

- id: p-typography-180
  text: 讓一個標題用細字體，反而顯得更高級，試試看。
  tags: [font, title]
  estimatedMinutes: 12

- id: p-typography-181
  text: 把一段文字分成問句和答句，用兩個字級分開。
  tags: [hierarchy, text_only]
  estimatedMinutes: 12

- id: p-typography-182
  text: 用文字排一張「寄存中」的號碼牌。
  tags: [text_only, title]
  estimatedMinutes: 10

- id: p-typography-183
  text: 讓標題左對齊、日期右對齊，同一條基線上。
  tags: [alignment, layout]
  estimatedMinutes: 12

- id: p-typography-184
  text: 把一句話用最小字體排一次，再用最大排一次。
  tags: [hierarchy, comparison]
  estimatedMinutes: 10

- id: p-typography-185
  text: 低能量日：挑一個字體存起來，明天再用。
  tags: [font, comparison]
  estimatedMinutes: 5
