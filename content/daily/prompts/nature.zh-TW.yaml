# 每日創作提示 — 自然與戶外觀察
# 主題：走出去看、天空/植物/光、季節變化、把自然帶進作品、戶外速寫
# 允許低能量的日子，具體可動手做。

- id: p-nature-001
  text: 出門看一次天空，把此刻的顏色用三個詞寫下來。
  tags: [nature, sky, observation]
  estimatedMinutes: 5
- id: p-nature-002
  text: 找一片離你最近的葉子，描出它的邊緣線條。
  tags: [plant, sketch]
  estimatedMinutes: 10
- id: p-nature-003
  text: 站在窗邊三分鐘，只聽戶外的聲音，記下你聽到幾種。
  tags: [nature, observation]
  estimatedMinutes: 3
- id: p-nature-004
  text: 觀察此刻光線從哪個方向來，在紙上畫一個箭頭標出角度。
  tags: [light, observation]
  estimatedMinutes: 5
- id: p-nature-005
  text: 走到戶外，撿一樣自然的小東西帶回來放在桌上。
  tags: [nature, outdoor]
  estimatedMinutes: 8
- id: p-nature-006
  text: 拍一張今天雲的照片，明天再拍一張，比較兩者。
