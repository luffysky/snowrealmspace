  tags: [recovery, patience]
- id: q-rest-175
  text: 讓今天，成為一個溫柔的空白。
  tags: [rest, gentle]
- id: q-rest-176
  text: 你不欠自己一個完美的今天。
  tags: [permission, self_compassion]
- id: q-rest-177
  text: 累了，就把世界調成靜音。
  tags: [rest, low_energy]
- id: q-rest-178
  text: 恢復的每一天，都算數。
  tags: [recovery, patience]
