# 每日語錄 — 完美主義與放過自己
# 主題：不必一次到位、降低標準也是一種能力、卡住往往因為想太完美、允許粗糙
# 語氣：具體、溫柔、不說教、允許低能量的日子

- id: q-perfectionism-001
  text: 想一次到位，常常是卡住的原因。
  tags: [perfectionism, stuck]
- id: q-perfectionism-002
  text: 先做出一個醜的版本，它比完美的空白有用。
  tags: [rough, good_enough]
- id: q-perfectionism-003
  text: 降低標準不是偷懶，有時是讓事情能開始的唯一方法。
  tags: [lowering_bar, permission]
- id: q-perfectionism-004
  text: 你不是不會做，你只是被「要很好」這件事嚇住了。
  tags: [perfectionism, stuck]
- id: q-perfectionism-005
  text: 今天只要有東西被寫下來，就算數。
  tags: [good_enough, permission]
- id: q-perfectionism-006
  text: 允許自己交出一份七十分的作品，剩下的三十分可以慢慢補。
  tags: [good_enough, imperfection]
- id: q-perfectionism-007
  text: 卡住的時候，問自己：我是不是在等一個不存在的完美時機？
  tags: [stuck, perfectionism]
- id: q-perfectionism-008
  text: 粗糙的第一步，好過精緻的原地踏步。
  tags: [rough, stuck]
- id: q-perfectionism-009
  text: 低能量的日子，能維持就已經很好，不用前進。
  tags: [self_compassion, permission]
- id: q-perfectionism-010
  text: 沒有人在完成的那一刻回頭數，你當初改了幾次。
  tags: [imperfection, good_enough]
- id: q-perfectionism-011
  text: 你可以先隨便畫一條線，再決定它要不要是直的。
  tags: [rough, permission]
- id: q-perfectionism-012
  text: 完美是個很晚才需要登場的角色，別讓它太早進場。
  tags: [perfectionism, stuck]
- id: q-perfectionism-013
  text: 把「還不夠好」先收進抽屜，今天只做「有做」。
  tags: [good_enough, lowering_bar]
- id: q-perfectionism-014
  text: 卡住不是你的錯，是你把門檻設得太高了。
  tags: [stuck, self_compassion]
- id: q-perfectionism-015
  text: 一份能被修改的草稿，比一個完美的念頭實在。
  tags: [rough, good_enough]
- id: q-perfectionism-016
  text: 允許粗糙，是給自己一條能走下去的路。
  tags: [rough, permission]
- id: q-perfectionism-017
  text: 你今天不必成為最好的自己，及格的自己也很值得。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-018
  text: 想太完美的時候，手會停下來，這很正常。
  tags: [perfectionism, stuck]
- id: q-perfectionism-019
  text: 先讓它存在，再讓它變好。順序不能顛倒。
  tags: [rough, good_enough]
- id: q-perfectionism-020
  text: 那些你覺得不夠好的作品，別人可能剛好需要。
  tags: [imperfection, good_enough]
- id: q-perfectionism-021
  text: 把標準調低一格，往往就能動起來。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-022
  text: 完成一件普通的事，也是完成。
  tags: [good_enough, permission]
- id: q-perfectionism-023
  text: 你不欠這個世界一個完美版本。
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-024
  text: 有些日子，把自己照顧好就是最大的產出。
  tags: [self_compassion, permission]
- id: q-perfectionism-025
  text: 草稿的醜，是它正在活著的證據。
  tags: [rough, imperfection]
- id: q-perfectionism-026
  text: 你可以先做一半，另一半改天再說。
  tags: [permission, good_enough]
- id: q-perfectionism-027
  text: 太在意細節時，退一步看看整體是不是已經夠了。
  tags: [perfectionism, good_enough]
- id: q-perfectionism-028
  text: 允許自己重來，也允許自己不重來。
  tags: [permission, self_compassion]
- id: q-perfectionism-029
  text: 卡住時，把要求砍一半，看看還剩什麼。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-030
  text: 不完美的東西，才有讓人親近的縫隙。
  tags: [imperfection, self_compassion]
- id: q-perfectionism-031
  text: 今天做得少，不代表你這個人變小。
  tags: [self_compassion, permission]
- id: q-perfectionism-032
  text: 先求有，再求好，這不是妥協，是策略。
  tags: [good_enough, lowering_bar]
- id: q-perfectionism-033
  text: 你腦中那個完美版本，永遠追不上，也不必追。
  tags: [perfectionism, permission]
- id: q-perfectionism-034
  text: 讓筆先動，想法會在動的過程中慢慢清楚。
  tags: [rough, stuck]
- id: q-perfectionism-035
  text: 把「一定要」換成「先試試」，肩膀會鬆一點。
  tags: [permission, lowering_bar]
- id: q-perfectionism-036
  text: 沒力氣的日子，做一點點就好，別跟自己過不去。
  tags: [self_compassion, permission]
- id: q-perfectionism-037
  text: 完美主義最大的謊言，是「等準備好」。
  tags: [perfectionism, stuck]
- id: q-perfectionism-038
  text: 一個粗糙的開始，勝過一百個完美的計畫。
  tags: [rough, stuck]
- id: q-perfectionism-039
  text: 你允許自己犯的錯越多，能做的事就越多。
  tags: [imperfection, permission]
- id: q-perfectionism-040
  text: 不是每一筆都要對，錯的那些也在幫你找方向。
  tags: [imperfection, good_enough]
- id: q-perfectionism-041
  text: 標準是給作品的，不是給你的存在的。
  tags: [self_compassion, perfectionism]
- id: q-perfectionism-042
  text: 交出去之前，它永遠不夠好，這很正常，還是交吧。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-043
  text: 慢一點沒關係，停下來看看也沒關係。
  tags: [self_compassion, permission]
- id: q-perfectionism-044
  text: 把今天的目標縮到最小，小到不可能失敗。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-045
  text: 你不必每次都全力以赴，有時六成力就夠走完。
  tags: [lowering_bar, self_compassion]
- id: q-perfectionism-046
  text: 完成比完美溫柔，因為它不會一直追著你跑。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-047
  text: 先把想法丟出來，醜歸醜，至少看得見了。
  tags: [rough, stuck]
- id: q-perfectionism-048
  text: 允許自己做出不喜歡的東西，那是變好的必經路。
  tags: [imperfection, permission]
- id: q-perfectionism-049
  text: 你不是拖延，你是被過高的期待壓住了。
  tags: [stuck, perfectionism]
- id: q-perfectionism-050
  text: 今天只要打開檔案，就是勝利。
  tags: [lowering_bar, permission]
- id: q-perfectionism-051
  text: 沒有一個大師的第一版是好的，包括他們自己。
  tags: [rough, imperfection]
- id: q-perfectionism-052
  text: 把「做到最好」暫時改成「做到能收工」。
  tags: [good_enough, lowering_bar]
- id: q-perfectionism-053
  text: 你的價值不會因為今天做得粗糙而打折。
  tags: [self_compassion, imperfection]
- id: q-perfectionism-054
  text: 卡太久的時候，往往是問題不對，不是你不夠好。
  tags: [stuck, self_compassion]
- id: q-perfectionism-055
  text: 讓它先難看地存在著，明天的你會感謝今天的你。
  tags: [rough, good_enough]
- id: q-perfectionism-056
  text: 完美是遠方的燈，不是腳下的路。
  tags: [perfectionism, permission]
- id: q-perfectionism-057
  text: 允許自己休息，不是放棄，是換氣。
  tags: [self_compassion, permission]
- id: q-perfectionism-058
  text: 把要求放低一點，創意反而有空間跑出來。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-059
  text: 你可以邊做邊調整，不必一開始就想清楚全部。
  tags: [rough, permission]
- id: q-perfectionism-060
  text: 不夠好的初稿，是通往夠好成品的唯一入口。
  tags: [rough, good_enough]
- id: q-perfectionism-061
  text: 今天做不動，就讓它擱著，明天不一定會這麼難。
  tags: [self_compassion, permission]
- id: q-perfectionism-062
  text: 想把每個字都寫對，會讓你一個字都寫不出來。
  tags: [perfectionism, stuck]
- id: q-perfectionism-063
  text: 把「這樣可以嗎」換成「先這樣」，往前走一步。
  tags: [good_enough, permission]
- id: q-perfectionism-064
  text: 允許粗糙，是允許自己還在學。
  tags: [rough, self_compassion]
- id: q-perfectionism-065
  text: 你不必贏過昨天的自己，並肩站著也很好。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-066
  text: 完美的計畫敵不過已經開始的粗胚。
  tags: [rough, stuck]
- id: q-perfectionism-067
  text: 把門檻降到能跨過去，跨過去才有下一步。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-068
  text: 那些瑕疵，之後會變成你認得出自己的記號。
  tags: [imperfection, self_compassion]
- id: q-perfectionism-069
  text: 交出去的六十分，比留在手裡的完美更有力量。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-070
  text: 你可以先亂寫，反正沒人規定草稿要好看。
  tags: [rough, permission]
- id: q-perfectionism-071
  text: 卡住時，別再想結果，只想下一個最小的動作。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-072
  text: 今天允許自己只做到一半，這也是一種完成。
  tags: [permission, good_enough]
- id: q-perfectionism-073
  text: 追求完美會讓時間停住，允許粗糙會讓它流動。
  tags: [perfectionism, rough]
- id: q-perfectionism-074
  text: 你做出來的東西不必讓所有人滿意，先讓自己過關。
  tags: [good_enough, self_compassion]
- id: q-perfectionism-075
  text: 沒靈感的日子，把顏料擠出來也算數。
  tags: [rough, permission]
- id: q-perfectionism-076
  text: 標準太高時，先問：這是必要的，還是我在為難自己？
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-077
  text: 允許自己做得比想像中差，才有力氣開始。
  tags: [imperfection, stuck]
- id: q-perfectionism-078
  text: 完成度七成就送出，剩下三成留給下一個作品。
  tags: [good_enough, lowering_bar]
- id: q-perfectionism-079
  text: 你不是懶，你只是把「開始」的代價算得太重。
  tags: [stuck, perfectionism]
- id: q-perfectionism-080
  text: 今天的粗糙，是為了讓明天有東西可以修。
  tags: [rough, good_enough]
- id: q-perfectionism-081
  text: 把「完美」放一邊，先跟「完成」交個朋友。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-082
  text: 允許自己畫壞，橡皮擦是後來才用的。
  tags: [rough, permission]
- id: q-perfectionism-083
  text: 沒有力氣的時候，降低標準是照顧，不是放縱。
  tags: [lowering_bar, self_compassion]
- id: q-perfectionism-084
  text: 你的作品不必完美，它只要真誠就夠動人。
  tags: [imperfection, good_enough]
- id: q-perfectionism-085
  text: 卡住的時候，把「做好」拆成「做一點」。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-086
  text: 允許自己不在狀態，狀態本來就會來來去去。
  tags: [self_compassion, permission]
- id: q-perfectionism-087
  text: 完美主義最會做的，是把一件小事變成一座山。
  tags: [perfectionism, stuck]
- id: q-perfectionism-088
  text: 先隨手記下來，好不好之後再說。
  tags: [rough, permission]
- id: q-perfectionism-089
  text: 你可以慢慢變好，不必今天就到位。
  tags: [good_enough, self_compassion]
- id: q-perfectionism-090
  text: 那個你想丟掉的版本，其實已經比空白前進很多。
  tags: [rough, good_enough]
- id: q-perfectionism-091
  text: 把力氣留一半給明天，不必今天燒光。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-092
  text: 允許自己交出「還可以」的東西，世界不會塌。
  tags: [good_enough, permission]
- id: q-perfectionism-093
  text: 想太完美的時候，其實是害怕被看見不夠好。
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-094
  text: 粗糙的版本會告訴你，下一步該往哪走。
  tags: [rough, stuck]
- id: q-perfectionism-095
  text: 今天只要不放棄，就不算停下來。
  tags: [permission, self_compassion]
- id: q-perfectionism-096
  text: 把標準當工具，不要把它當鞭子。
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-097
  text: 允許自己重複、笨拙、繞遠路，那都算走過。
  tags: [imperfection, permission]
- id: q-perfectionism-098
  text: 完成一件粗糙的事，比計畫一件完美的事更接近終點。
  tags: [rough, good_enough]
- id: q-perfectionism-099
  text: 你不是卡在能力，是卡在「必須很好」的念頭。
  tags: [stuck, perfectionism]
- id: q-perfectionism-100
  text: 降低今天的期待，明天才不會什麼都不想碰。
  tags: [lowering_bar, self_compassion]
- id: q-perfectionism-101
  text: 讓草稿醜著，它有它自己要長成的樣子。
  tags: [rough, imperfection]
- id: q-perfectionism-102
  text: 你可以做得剛剛好就好，剛剛好也是一種本事。
  tags: [good_enough, lowering_bar]
- id: q-perfectionism-103
  text: 允許自己在低谷裡只做低谷能做的事。
  tags: [self_compassion, permission]
- id: q-perfectionism-104
  text: 完美是把作品越修越遠的那隻手，適時放開它。
  tags: [perfectionism, good_enough]
- id: q-perfectionism-105
  text: 先把架子搭起來，好不好看之後再裝潢。
  tags: [rough, stuck]
- id: q-perfectionism-106
  text: 你不必每天都有進度，有呼吸就已經在了。
  tags: [self_compassion, permission]
- id: q-perfectionism-107
  text: 把「我做不好」換成「我先做做看」。
  tags: [permission, stuck]
- id: q-perfectionism-108
  text: 那些不完美的地方，往往是別人記得你的地方。
  tags: [imperfection, self_compassion]
- id: q-perfectionism-109
  text: 卡住時，允許自己先做最不重要的那部分。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-110
  text: 今天做得糊，明天再抹平，這就是過程。
  tags: [rough, good_enough]
- id: q-perfectionism-111
  text: 你的第一版本來就該讓你臉紅，那代表你在成長。
  tags: [rough, imperfection]
- id: q-perfectionism-112
  text: 把「還沒準備好」翻譯成「其實已經可以開始」。
  tags: [stuck, permission]
- id: q-perfectionism-113
  text: 允許自己普通，不是每一天都要發光。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-114
  text: 完成的東西會回過頭來教你，完美的空想不會。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-115
  text: 先寫壞的句子，好句子躲在壞句子後面。
  tags: [rough, stuck]
- id: q-perfectionism-116
  text: 你可以今天只前進一公分，一公分也是方向。
  tags: [lowering_bar, permission]
- id: q-perfectionism-117
  text: 允許自己交作業，而不是交傑作。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-118
  text: 想把每個細節都顧好，會讓你顧不了完成。
  tags: [perfectionism, stuck]
- id: q-perfectionism-119
  text: 粗糙不是失敗的樣子，是還在進行的樣子。
  tags: [rough, imperfection]
- id: q-perfectionism-120
  text: 沒電的日子，允許自己只把插頭插回去。
  tags: [self_compassion, permission]
- id: q-perfectionism-121
  text: 把標準砍到你今天做得到，明天再慢慢加回去。
  tags: [lowering_bar, self_compassion]
- id: q-perfectionism-122
  text: 你不必修到無可挑剔，修到你願意放手就好。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-123
  text: 允許自己邊做邊犯錯，那比不做安全多了。
  tags: [imperfection, permission]
- id: q-perfectionism-124
  text: 卡住不是終點，是提醒你把要求放輕一點。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-125
  text: 今天畫一筆，明天再一筆，不必一次畫完整幅。
  tags: [rough, permission]
- id: q-perfectionism-126
  text: 完美主義讓你只看見缺口，別忘了看已經完成的部分。
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-127
  text: 先讓它會動，再讓它漂亮。
  tags: [rough, good_enough]
- id: q-perfectionism-128
  text: 允許自己說「這樣就好」，那是成熟，不是妥協。
  tags: [good_enough, permission]
- id: q-perfectionism-129
  text: 你今天的粗糙，是給未來的自己一個好起點。
  tags: [rough, self_compassion]
- id: q-perfectionism-130
  text: 把「一定要完美」放下，才騰得出手把它完成。
  tags: [perfectionism, good_enough]
- id: q-perfectionism-131
  text: 允許自己在疲憊時把標準調到最低。
  tags: [lowering_bar, self_compassion]
- id: q-perfectionism-132
  text: 沒有草稿的醜，就沒有成品的好。
  tags: [rough, good_enough]
- id: q-perfectionism-133
  text: 你可以先做出來，再決定要不要在意它的瑕疵。
  tags: [imperfection, permission]
- id: q-perfectionism-134
  text: 卡住時，把目標從山頂搬到下一級階梯。
  tags: [stuck, lowering_bar]
- id: q-perfectionism-135
  text: 今天做得不理想，不影響你明天重新來過的資格。
  tags: [self_compassion, permission]
- id: q-perfectionism-136
  text: 完美是別人套在你身上的尺，你可以拿掉它。
  tags: [perfectionism, permission]
- id: q-perfectionism-137
  text: 允許自己先亂做一通，秩序會慢慢從裡面浮出來。
  tags: [rough, stuck]
- id: q-perfectionism-138
  text: 你的作品有一點缺陷，反而比無瑕更有溫度。
  tags: [imperfection, good_enough]
- id: q-perfectionism-139
  text: 把「今天要做很多」換成「今天做一件就好」。
  tags: [lowering_bar, permission]
- id: q-perfectionism-140
  text: 想太完美時，深呼吸，提醒自己這只是初稿。
  tags: [perfectionism, rough]
- id: q-perfectionism-141
  text: 允許自己不喜歡今天的成果，明天再看可能不一樣。
  tags: [self_compassion, imperfection]
- id: q-perfectionism-142
  text: 完成度不高沒關係，有完成就有可以修的東西。
  tags: [good_enough, rough]
- id: q-perfectionism-143
  text: 你不欠任何人一個沒有破綻的自己。
  tags: [imperfection, self_compassion]
- id: q-perfectionism-144
  text: 卡住的時候，把「怎麼做才對」先換成「先做了再說」。
  tags: [stuck, permission]
- id: q-perfectionism-145
  text: 今天只要留下一點痕跡，就不算白過。
  tags: [lowering_bar, permission]
- id: q-perfectionism-146
  text: 完美主義最狠的地方，是讓你連開始都不敢。
  tags: [perfectionism, stuck]
- id: q-perfectionism-147
  text: 允許粗糙，你才會發現自己其實走得比想像遠。
  tags: [rough, self_compassion]
- id: q-perfectionism-148
  text: 把標準當地板，不要當天花板，先站上去再說。
  tags: [lowering_bar, good_enough]
- id: q-perfectionism-149
  text: 你可以今天只做到「不倒退」，那也是一種守成。
  tags: [self_compassion, permission]
- id: q-perfectionism-150
  text: 那些沒修完的地方，是留給時間去回答的。
  tags: [imperfection, good_enough]
- id: q-perfectionism-151
  text: 先做完再說好不好，順序對了才走得動。
  tags: [rough, good_enough]
- id: q-perfectionism-152
  text: 允許自己在狀態不好時，只維持不加碼。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-153
  text: 想一次到位的念頭，常常讓你原地站了一整天。
  tags: [perfectionism, stuck]
- id: q-perfectionism-154
  text: 你的粗胚有它的可愛，別急著把它磨光。
  tags: [rough, imperfection]
- id: q-perfectionism-155
  text: 把今天的門檻降到「打開來看看」，其他順其自然。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-156
  text: 允許自己交出不完美，是對自己最實際的溫柔。
  tags: [good_enough, self_compassion]
- id: q-perfectionism-157
  text: 完成一件小事，比想著那件完美的大事更療癒。
  tags: [good_enough, permission]
- id: q-perfectionism-158
  text: 你不必今天就把它做對，做出來就已經在路上了。
  tags: [rough, permission]
- id: q-perfectionism-159
  text: 卡住時，允許自己先做爛的那一版，之後有得改。
  tags: [stuck, rough]
- id: q-perfectionism-160
  text: 降低標準的那一刻，你才終於能動手。
  tags: [lowering_bar, stuck]
- id: q-perfectionism-161
  text: 允許自己今天什麼大事都不做，只留住一點點。
  tags: [self_compassion, permission]
- id: q-perfectionism-162
  text: 完美是永遠差一步的幻覺，完成才是真的抵達。
  tags: [perfectionism, good_enough]
- id: q-perfectionism-163
  text: 你做的不完美版本，已經比腦中那個好，因為它存在。
  tags: [imperfection, good_enough]
- id: q-perfectionism-164
  text: 把「必須」全部劃掉，換成「試試」，會鬆很多。
  tags: [permission, perfectionism]
- id: q-perfectionism-165
  text: 允許自己粗手粗腳，熟練是後來的事。
  tags: [rough, self_compassion]
- id: q-perfectionism-166
  text: 今天沒做到最好，你還是把時間好好地過了。
  tags: [self_compassion, good_enough]
- id: q-perfectionism-167
  text: 卡住往往因為你想得太完美，動手往往因為你放過自己。
  tags: [stuck, perfectionism]
- id: q-perfectionism-168
  text: 先把它做出來，哪怕歪歪的，歪的也能站著。
  tags: [rough, permission]
- id: q-perfectionism-169
  text: 允許自己降速，快慢都會抵達，只是路上風景不同。
  tags: [self_compassion, lowering_bar]
- id: q-perfectionism-170
  text: 那些你嫌不夠好的，正是你還在認真的證明。
  tags: [imperfection, self_compassion]
- id: q-perfectionism-171
  text: 把完美留到最後一刻，前面全部允許粗糙。
  tags: [rough, good_enough]
- id: q-perfectionism-172
  text: 你可以只做百分之十，剩下的明天不會消失。
  tags: [lowering_bar, permission]
- id: q-perfectionism-173
  text: 允許自己交出一個「先這樣」，它會替你打開下一步。
  tags: [good_enough, stuck]
- id: q-perfectionism-174
  text: 想太完美，是把還沒發生的失望先借來今天用。
  tags: [perfectionism, self_compassion]
- id: q-perfectionism-175
  text: 今天做得粗糙，明天做得溫柔，都算你有在做。
  tags: [rough, permission]
- id: q-perfectionism-176
  text: 把標準放低不是背叛理想，是讓理想有機會落地。
  tags: [lowering_bar, good_enough]
- id: q-perfectionism-177
  text: 允許自己還沒到位，到位是一段路，不是一個開關。
  tags: [good_enough, self_compassion]
- id: q-perfectionism-178
  text: 你不必修到滿分才交，修到你安心就可以放手。
  tags: [good_enough, perfectionism]
- id: q-perfectionism-179
  text: 卡住的日子，做一點點也是對自己的信任。
  tags: [stuck, self_compassion]
- id: q-perfectionism-180
  text: 允許粗糙，允許慢，允許今天的你就是這樣，這樣很好。
  tags: [rough, self_compassion]
