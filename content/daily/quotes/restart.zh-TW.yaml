  tags: [returning, resume]
- id: q-restart-160
  text: 你不用一次做完，接上就是進步。
  tags: [continuing, no_blame]
- id: q-restart-161
  text: 撿回中途的夢，讓它繼續做下去。
  tags: [pick_up, again]
- id: q-restart-162
  text: 停過再回來的人，腳步更踏實。
  tags: [gap, returning]
- id: q-restart-163
  text: 今天願意開始，就已經翻過最難那頁。
  tags: [restart, again]
- id: q-restart-164
  text: 你收著的作品，今天透透氣也好。
  tags: [pick_up, returning]
- id: q-restart-165
  text: 接著上次收尾的地方，往下走一小段。
  tags: [continuing, resume]
- id: q-restart-166
  text: 回來不是補課，是回到你喜歡的事上。
  tags: [returning, no_blame]
- id: q-restart-167
  text: 空檔沉澱下來的，都會成為養分。
  tags: [gap, resume]
- id: q-restart-168
  text: 重新起步，帶上這陣子多懂的自己。
  tags: [restart, again]
- id: q-restart-169
  text: 你手感的火沒熄，撥一下就再亮。
  tags: [resume, returning]
- id: q-restart-170
  text: 今天做一點，把中斷輕輕縫合。
  tags: [continuing, pick_up]
- id: q-restart-171
  text: 停下來過沒關係，你依然是創作的人。
  tags: [gap, no_blame]
- id: q-restart-172
  text: 拾起那個一直惦記的計畫，動它第一步。
  tags: [pick_up, restart]
- id: q-restart-173
  text: 回來的今天，就從最小的地方接起。
  tags: [returning, resume]
- id: q-restart-174
  text: 你不欠進度，你只欠自己一次溫柔的重啟。
  tags: [restart, no_blame]
- id: q-restart-175
  text: 接續下去，讓上次的你不至於白費。
  tags: [continuing, resume]
- id: q-restart-176
  text: 空白期教會你的，會寫進下一個作品。
  tags: [gap, again]
- id: q-restart-177
  text: 今天回到這裡，慢慢的，一切都還來得及。
  tags: [returning, no_blame]
- id: q-restart-178
  text: 撿起放下的那條路，走兩步就熟了。
  tags: [pick_up, continuing]
- id: q-restart-179
  text: 重新開始，其實只是把喜歡的事再握緊。
  tags: [restart, resume]
- id: q-restart-180
  text: 你回來的每一步，都算數，都值得。
  tags: [returning, no_blame]
