  tags: [play, joy]
- id: q-joy-177
  text: 你的喜歡，值得被好好做出來。
  tags: [love, satisfaction]
- id: q-joy-178
  text: 做東西的樂趣，藏在指尖，不在結果。
  tags: [enjoyment, fun]
- id: q-joy-179
  text: 今天輕輕做一點，就很剛好。
  tags: [lightness, love]
- id: q-joy-180
  text: 完成一件喜歡的事，是給自己的好日子。
  tags: [satisfaction, joy]
