- id: q-body-160
  text: 身體累了，先餵它、暖它、讓它躺。
  tags: [body, physical]
- id: q-body-161
  text: 硬撐的日子做的，多半明天要修。
  tags: [condition, rest]
- id: q-body-162
  text: 你的節奏由你定，別讓別人替你按快轉。
  tags: [rhythm, timing]
- id: q-body-163
  text: 眼睛痛就閉起來，世界會等你。
  tags: [body, rest]
- id: q-body-164
  text: 沒精神的時候，散步比逼稿有用。
  tags: [energy, physical]
- id: q-body-165
  text: 睡好覺，是最不起眼的創作準備。
  tags: [sleep, rest]
- id: q-body-166
  text: 你不必在最累的時候證明什麼。
  tags: [condition, energy]
- id: q-body-167
  text: 選在你頭腦最清的時候做決定。
  tags: [timing, condition]
- id: q-body-168
  text: 身體是你走這條路的腳，別磨到走不動。
  tags: [body, physical]
- id: q-body-169
  text: 累了就慢下來，路不會因此消失。
  tags: [rest, rhythm]
- id: q-body-170
  text: 今天只有一點點力氣，那就用在最想做的事上。
  tags: [energy, timing]
- id: q-body-171
  text: 睡飽的腦子，連挑錯字都更準。
  tags: [sleep, condition]
- id: q-body-172
  text: 你的高峰時段是天賦，別總是拿去救火。
  tags: [timing, energy]
- id: q-body-173
  text: 身體先安頓好，心思才回得來。
  tags: [body, condition]
- id: q-body-174
  text: 允許自己今天只是活著，不必產出。
  tags: [rest, condition]
- id: q-body-175
  text: 熬到最後的那點成果，常常撐不過隔天的檢視。
  tags: [sleep, condition]
- id: q-body-176
  text: 節奏卡住時，換件家事做，腦子會自己整理。
  tags: [rhythm, body]
- id: q-body-177
  text: 疲倦不是缺點，是身體在誠實記帳。
  tags: [condition, physical]
- id: q-body-178
  text: 你最清醒的那段光陰，值得留給最珍惜的事。
  tags: [timing, energy]
- id: q-body-179
  text: 睡飽這件小事，撐住了你其他所有事。
  tags: [sleep, rest]
- id: q-body-180
  text: 身體舒展了，句子也跟著鬆開來。
  tags: [body, rhythm]
