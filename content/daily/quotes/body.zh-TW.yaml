# 每日語錄 — 身體與節奏
# 主題：睡飽再做、精神狀態影響創作、找到自己的時段、身體是工具、休息是一部分、別硬撐
# 繁體中文（台灣用語）

- id: q-body-001
  text: 睡不夠的時候，先別急著怪自己沒靈感。
  tags: [body, sleep]
- id: q-body-002
  text: 精神好的那半小時，抵得過硬撐的一整天。
  tags: [energy, condition]
- id: q-body-003
  text: 身體累了會誠實地說，只是你常常沒在聽。
  tags: [body, condition]
- id: q-body-004
  text: 有些人早上最清醒，有些人半夜才醒過來，你是哪一種？
  tags: [timing, rhythm]
- id: q-body-005
  text: 休息不是創作的暫停，它本來就在裡面。
  tags: [rest, rhythm]
- id: q-body-006
  text: 今天低能量，那就做低能量能做的事。
  tags: [energy, condition]
- id: q-body-007
  text: 眼睛痠了就閉一下，畫面不會跑掉。
