# 每日語錄 — 專注與心流
# 主題：進入狀態、排除干擾、深度工作、一次做一件事、沉浸
- id: q-focus-001
  text: 專心不是逼自己，是把其他東西先放遠一點。
  tags: [focus, flow]
- id: q-focus-002
  text: 你不用一次做完，只要先做進去就好。
