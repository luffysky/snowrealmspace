  tags: [immersion, flow]
- id: q-focus-156
  text: 把干擾當背景音，別讓它變成主角。
  tags: [distraction, focus]
- id: q-focus-157
  text: 今天做不到深潛，浮潛看看風景也好。
  tags: [presence, immersion]
- id: q-focus-158
  text: 注意力放這裡，這裡就慢慢亮起來。
  tags: [attention, presence]
- id: q-focus-159
  text: 深度工作是給自己一段不用回覆誰的時間。
  tags: [deep_work, distraction]
- id: q-focus-160
  text: 開始之後，別問還要多久，先享受在裡面。
  tags: [flow, immersion]
- id: q-focus-161
  text: 專注是溫柔地拒絕，先不碰別的，只留這個。
  tags: [focus, single_task]
- id: q-focus-162
  text: 心亂就先做手邊最小的那一件，心會跟上。
  tags: [presence, focus]
- id: q-focus-163
  text: 一次只抱一件事，手才空得出來把它做好。
  tags: [single_task, attention]
- id: q-focus-164
  text: 沉浸需要安全感，先把會打斷你的都關上。
  tags: [immersion, distraction]
- id: q-focus-165
  text: 今天願意坐下來，就已經是一種專注。
  tags: [presence, focus]
- id: q-focus-166
  text: 把注意力從螢幕邊角，慢慢移回正中央。
  tags: [attention, focus]
- id: q-focus-167
  text: 深度來自重複回到同一件事，不是一次做完。
  tags: [deep_work, single_task]
- id: q-focus-168
  text: 心流像順水，你只要別一直逆著划就好。
  tags: [flow, presence]
- id: q-focus-169
  text: 干擾切掉一半，專注就多長出一倍。
  tags: [distraction, focus]
- id: q-focus-170
  text: 今天能量低，就把標準放低，把自己放過。
  tags: [presence, focus]
- id: q-focus-171
  text: 一件事，一段時間，一份心，就夠了。
  tags: [single_task, immersion]
- id: q-focus-172
  text: 專注不是不分心，是分心後還願意回來。
  tags: [attention, distraction]
- id: q-focus-173
  text: 沉進去的時候，連呼吸都變得剛剛好。
  tags: [immersion, flow]
- id: q-focus-174
  text: 進入狀態前，先把桌面、心情都留白一點。
  tags: [flow, presence]
- id: q-focus-175
  text: 深度工作不必轟轟烈烈，安靜地做就很好。
  tags: [deep_work, presence]
- id: q-focus-176
  text: 把「等有空」改成「就現在這五分鐘」。
  tags: [focus, single_task]
- id: q-focus-177
  text: 注意力是你最私人的資源，慢慢學會守著它。
  tags: [attention, distraction]
- id: q-focus-178
  text: 今天只推進一點點，那一點點就是心流的起點。
  tags: [flow, presence]
- id: q-focus-179
  text: 一次一件，是對作品也是對自己的溫柔。
  tags: [single_task, presence]
- id: q-focus-180
  text: 沉浸過後，記得抬頭喝口水，再決定要不要繼續。
  tags: [immersion, presence]
