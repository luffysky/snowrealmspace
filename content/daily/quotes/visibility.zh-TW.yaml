# 每日語錄 — 被看見與回饋
# 主題：分享作品、面對評論、不為讚而做、找到對的觀眾、自己先喜歡、回饋的取捨
# tags: visibility, feedback, audience, sharing, criticism, validation, self_first, reception

- id: q-visibility-001
  text: 先自己喜歡，再管別人怎麼看。
  tags: [visibility, self_first]

- id: q-visibility-002
  text: 按讚數不會告訴你，這件作品對你自己的意義。
  tags: [validation, self_first]

- id: q-visibility-003
  text: 把作品放出去那一刻，你已經比昨天勇敢一點了。
  tags: [sharing, visibility]

- id: q-visibility-004
  text: 沒人回應，不代表沒人看見；有時候它只是靜靜留在某人心裡。
  tags: [reception, visibility]

- id: q-visibility-005
  text: 一句真誠的回饋，比一百個順手的讚更值得收下。
  tags: [feedback, reception]

- id: q-visibility-006
  text: 你不需要為每個人而做，只需要為對的那幾個人。
  tags: [audience, self_first]

- id: q-visibility-007
  text: 今天不想分享也沒關係，作品可以先陪你一個人待著。
  tags: [sharing, self_first]

- id: q-visibility-008
  text: 批評裡有沙也有金，你有權慢慢挑，不必全吞。
  tags: [criticism, feedback]

- id: q-visibility-009
  text: 對的觀眾會懂你沒說出口的那部分。
  tags: [audience, reception]

- id: q-visibility-010
  text: 讚是別人的心情，你的作品是你的事。
  tags: [validation, self_first]

- id: q-visibility-011
  text: 分享不是求認可，是把一點自己放到世界上。
  tags: [sharing, validation]

- id: q-visibility-012
  text: 有人看不懂，不等於你做錯了什麼。
  tags: [reception, criticism]

- id: q-visibility-013
  text: 先問這句話說得對不對，再問它是誰說的。
  tags: [feedback, criticism]

- id: q-visibility-014
  text: 你不欠任何人一個完美的自己。
  tags: [self_first, validation]

- id: q-visibility-015
  text: 被看見很好，不被看見的那些日子也算數。
  tags: [visibility, self_first]

- id: q-visibility-016
  text: 願意收回饋的人，本來就比多數人更誠實。
  tags: [feedback, reception]

- id: q-visibility-017
  text: 你可以只把作品給一個信任的人看，那也是分享。
  tags: [sharing, audience]

- id: q-visibility-018
  text: 惡意的評論，說的往往是他自己，不是你。
  tags: [criticism, reception]

- id: q-visibility-019
  text: 找到懂你的人之前，先當自己第一個讀者。
  tags: [self_first, audience]

- id: q-visibility-020
  text: 數字會起伏，你對這件事的在乎不會。
  tags: [validation, self_first]

- id: q-visibility-021
  text: 沉默的觀眾也是觀眾，他們只是不擅長出聲。
  tags: [audience, reception]

- id: q-visibility-022
  text: 有些回饋值得你改，有些只值得你笑一笑放下。
  tags: [feedback, criticism]

- id: q-visibility-023
  text: 為讚而做，做著做著就不像自己了。
  tags: [validation, self_first]

- id: q-visibility-024
  text: 你今天願意讓別人看見，這件事本身就很難得。
  tags: [visibility, sharing]

- id: q-visibility-025
  text: 一件作品被誤解，不會抹掉它原本的樣子。
  tags: [reception, criticism]

- id: q-visibility-026
  text: 不必說服每個人喜歡你，那從來不是你的工作。
  tags: [audience, self_first]

- id: q-visibility-027
  text: 回饋是禮物，但你有權決定要不要拆開。
  tags: [feedback, reception]

- id: q-visibility-028
  text: 你先看重的東西，別人才會跟著看重。
  tags: [self_first, validation]

- id: q-visibility-029
  text: 沒有掌聲的時候，作品還在，那就夠了。
  tags: [validation, self_first]

- id: q-visibility-030
  text: 對的觀眾不是最多的，是最合的。
  tags: [audience, reception]

- id: q-visibility-031
  text: 分享出去會怕，是因為那真的是你在乎的東西。
  tags: [sharing, self_first]

- id: q-visibility-032
  text: 一句「這裡我不太懂」，比「很棒」更能幫你進步。
  tags: [feedback, criticism]

- id: q-visibility-033
  text: 你不是為了被討論才創作，被討論只是路過。
  tags: [visibility, self_first]

- id: q-visibility-034
  text: 低能量的日子，就把作品收好，明天再說。
  tags: [self_first, sharing]

- id: q-visibility-035
  text: 別人的期待很吵，你自己的聲音要記得聽。
  tags: [self_first, audience]

- id: q-visibility-036
  text: 被少數人真心喜歡，勝過被多數人隨手滑過。
  tags: [audience, validation]

- id: q-visibility-037
  text: 你可以感謝一個評論，同時決定不採納它。
  tags: [feedback, criticism]

- id: q-visibility-038
  text: 作品出門那刻起，它有它自己的旅程，你不用一路護送。
  tags: [reception, sharing]

- id: q-visibility-039
  text: 先讓自己滿意一次，那個標準會慢慢長出來。
  tags: [self_first, validation]

- id: q-visibility-040
  text: 沒被看見不是失敗，只是時候還沒到，或人還沒到。
  tags: [visibility, reception]

- id: q-visibility-041
  text: 你不必回應每一則留言，你的安靜也是一種立場。
  tags: [reception, self_first]

- id: q-visibility-042
  text: 對你重要的人給的一句話，抵得過陌生人一串讚。
  tags: [feedback, audience]

- id: q-visibility-043
  text: 為自己做的東西，別人喜不喜歡都是額外的。
  tags: [self_first, validation]

- id: q-visibility-044
  text: 把作品分享出去，是相信有人會接住它。
  tags: [sharing, reception]

- id: q-visibility-045
  text: 尖銳的話裡若有道理，撿走道理就好，別撿走刺。
  tags: [criticism, feedback]

- id: q-visibility-046
  text: 你不是內容，你是做內容的那個人，兩者不一樣。
  tags: [criticism, self_first]

- id: q-visibility-047
  text: 找觀眾像找朋友，勉強不來，但會遇到。
  tags: [audience, reception]

- id: q-visibility-048
  text: 今天只想默默做，不想被看見，這樣完全可以。
  tags: [visibility, self_first]

- id: q-visibility-049
  text: 讚多的時候別飄，讚少的時候也別塌。
  tags: [validation, self_first]

- id: q-visibility-050
  text: 有人願意花時間給你認真的意見，那是一種在乎。
  tags: [feedback, reception]

- id: q-visibility-051
  text: 你的作品不需要解釋給不想懂的人聽。
  tags: [audience, reception]

- id: q-visibility-052
  text: 先把喜歡留給自己一點，別全給了留言區。
  tags: [self_first, validation]

- id: q-visibility-053
  text: 分享的勇氣，不會因為反應冷淡而白費。
  tags: [sharing, reception]

- id: q-visibility-054
  text: 每個評論都有它的位置，但那個位置不一定在你心上。
  tags: [criticism, feedback]

- id: q-visibility-055
  text: 被看見是結果，喜歡自己在做的事才是起點。
  tags: [visibility, self_first]

- id: q-visibility-056
  text: 你可以又想被看見，又害怕被看見，這不矛盾。
  tags: [visibility, sharing]

- id: q-visibility-057
  text: 對的人會回頭再看第二次，那才是真的看見。
  tags: [audience, reception]

- id: q-visibility-058
  text: 意見收進來過一夜再回覆，通常會更清楚。
  tags: [feedback, criticism]

- id: q-visibility-059
  text: 沒有回音的日子，不代表你做的沒有價值。
  tags: [reception, validation]

- id: q-visibility-060
  text: 你的標準比讚數更值得守護。
  tags: [self_first, validation]

- id: q-visibility-061
  text: 把作品給一個人看，也是把心打開一條縫。
  tags: [sharing, audience]

- id: q-visibility-062
  text: 學會分辨：這是要我更好，還是只是要我難過。
  tags: [criticism, feedback]

- id: q-visibility-063
  text: 你不是為了讓所有人點頭而存在。
  tags: [audience, self_first]

- id: q-visibility-064
  text: 被喜歡很甜，但被理解更暖。
  tags: [reception, validation]

- id: q-visibility-065
  text: 今天做的東西只給自己看，也是一種完整。
  tags: [self_first, sharing]

- id: q-visibility-066
  text: 一則刺人的留言，不該蓋過一百個安靜的看見。
  tags: [criticism, reception]

- id: q-visibility-067
  text: 你可以選擇聽誰的意見，這個選擇權一直在你手上。
  tags: [feedback, self_first]

- id: q-visibility-068
  text: 沒被轉發不是被否定，只是這次沒對上眼。
  tags: [visibility, reception]

- id: q-visibility-069
  text: 先問自己滿不滿意，再問世界。
  tags: [self_first, validation]

- id: q-visibility-070
  text: 對的觀眾，會在你最想放棄的地方留下來。
  tags: [audience, reception]

- id: q-visibility-071
  text: 分享不是把自己攤開讓人評分。
  tags: [sharing, validation]

- id: q-visibility-072
  text: 有些話不必反駁，時間會替你證明。
  tags: [criticism, reception]

- id: q-visibility-073
  text: 你不用把每個讚都當成必須維持的承諾。
  tags: [validation, self_first]

- id: q-visibility-074
  text: 被看見的前提，是你先讓某個東西誠實地存在。
  tags: [visibility, self_first]

- id: q-visibility-075
  text: 冷淡的反應會過去，你對這件事的喜歡會留下。
  tags: [reception, self_first]

- id: q-visibility-076
  text: 好的回饋讓你看見盲點，壞的回饋只讓你看見對方。
  tags: [feedback, criticism]

- id: q-visibility-077
  text: 不是每個人都是你的觀眾，這是好消息不是壞消息。
  tags: [audience, reception]

- id: q-visibility-078
  text: 你可以在無人注意的時候，把一件事做得很好。
  tags: [visibility, self_first]

- id: q-visibility-079
  text: 把作品交出去，剩下的評價就不全歸你管了。
  tags: [reception, sharing]

- id: q-visibility-080
  text: 別讓一個陌生人的一句話，決定你今天的樣子。
  tags: [criticism, self_first]

- id: q-visibility-081
  text: 願意被看見的人，都帶著一點誠實的脆弱。
  tags: [visibility, sharing]

- id: q-visibility-082
  text: 你在乎的回饋，通常來自你在乎的人。
  tags: [feedback, audience]

- id: q-visibility-083
  text: 為自己喜歡而做的東西，最耐得住冷場。
  tags: [self_first, reception]

- id: q-visibility-084
  text: 沒有立刻的掌聲，不代表沒有慢慢的迴響。
  tags: [reception, validation]

- id: q-visibility-085
  text: 你不必成為所有人的口味，成為自己的就好。
  tags: [audience, self_first]

- id: q-visibility-086
  text: 收下讚美時記得，你本來就值得。
  tags: [validation, reception]

- id: q-visibility-087
  text: 分享一次，就多一個被理解的機會。
  tags: [sharing, reception]

- id: q-visibility-088
  text: 面對評論，先深呼吸，再決定要不要在意。
  tags: [criticism, feedback]

- id: q-visibility-089
  text: 你今天沒力氣回應世界，那就先照顧自己。
  tags: [self_first, reception]

- id: q-visibility-090
  text: 對的人不用你追，你把作品做好，他會走過來。
  tags: [audience, self_first]

- id: q-visibility-091
  text: 讚是路上的風景，不是目的地。
  tags: [validation, self_first]

- id: q-visibility-092
  text: 一個真正看懂的人，會讓所有沉默都值得。
  tags: [audience, reception]

- id: q-visibility-093
  text: 你可以把批評當參考，而不是判決。
  tags: [criticism, feedback]

- id: q-visibility-094
  text: 被看見之前，你已經和自己完成了一次對話。
  tags: [visibility, self_first]

- id: q-visibility-095
  text: 不是每則回饋都要立刻消化，有些可以先放著。
  tags: [feedback, reception]

- id: q-visibility-096
  text: 你分享的不是完美，是此刻真實的自己。
  tags: [sharing, self_first]

- id: q-visibility-097
  text: 沒人按讚的作品，也可能是你日後最喜歡的一件。
  tags: [validation, self_first]

- id: q-visibility-098
  text: 觀眾會來會走，你和作品的關係一直都在。
  tags: [audience, self_first]

- id: q-visibility-099
  text: 有些評論值得回信，有些只值得已讀。
  tags: [criticism, feedback]

- id: q-visibility-100
  text: 你不需要被很多人看見，只需要被對的人記得。
  tags: [visibility, audience]

- id: q-visibility-101
  text: 把喜歡建立在自己身上，風吹來也不容易倒。
  tags: [self_first, validation]

- id: q-visibility-102
  text: 分享作品像遞出一杯茶，喝不喝是對方的事。
  tags: [sharing, reception]

- id: q-visibility-103
  text: 尖銳的回饋若有幾分道理，收那幾分就好。
  tags: [feedback, criticism]

- id: q-visibility-104
  text: 你可以不紅，也可以很好。
  tags: [visibility, self_first]

- id: q-visibility-105
  text: 對的觀眾，是那個會問你「後來呢」的人。
  tags: [audience, reception]

- id: q-visibility-106
  text: 不為讚而做，讚來了會更輕鬆地接住。
  tags: [validation, self_first]

- id: q-visibility-107
  text: 今天只想把作品收在抽屜裡，也是照顧它的一種方式。
  tags: [sharing, self_first]

- id: q-visibility-108
  text: 一句誤解不會定義你，除非你允許它。
  tags: [criticism, reception]

- id: q-visibility-109
  text: 你先相信自己在做的事，別人才有機會相信。
  tags: [self_first, validation]

- id: q-visibility-110
  text: 被看見會帶來聲音，記得留一格給自己的。
  tags: [visibility, self_first]

- id: q-visibility-111
  text: 回饋是別人的視角，決定權還是你的。
  tags: [feedback, self_first]

- id: q-visibility-112
  text: 對的人少沒關係，深就好。
  tags: [audience, reception]

- id: q-visibility-113
  text: 分享出去的緊張，是你認真的證據。
  tags: [sharing, self_first]

- id: q-visibility-114
  text: 有人批評，代表你做的事真的存在於世界上。
  tags: [criticism, reception]

- id: q-visibility-115
  text: 你的價值不隨最新一則留言起落。
  tags: [validation, self_first]

- id: q-visibility-116
  text: 不被看見的練習，也在偷偷讓你變強。
  tags: [visibility, self_first]

- id: q-visibility-117
  text: 收回饋不是義務，那是你給自己的成長機會。
  tags: [feedback, self_first]

- id: q-visibility-118
  text: 你可以只做給懂的人，其他人路過就好。
  tags: [audience, reception]

- id: q-visibility-119
  text: 讚會消失，你在過程裡學到的不會。
  tags: [validation, self_first]

- id: q-visibility-120
  text: 把作品放出去，是給未來的觀眾留一扇門。
  tags: [sharing, audience]

- id: q-visibility-121
  text: 面對難聽的話，先分清楚：這是事實還是情緒。
  tags: [criticism, feedback]

- id: q-visibility-122
  text: 你不必為了被喜歡而稀釋自己。
  tags: [audience, self_first]

- id: q-visibility-123
  text: 被理解的那一刻，會讓之前的孤單都有了意義。
  tags: [reception, validation]

- id: q-visibility-124
  text: 今天不發表也很好，作品不會因為晚一天而遜色。
  tags: [sharing, self_first]

- id: q-visibility-125
  text: 你選擇聽進去的聲音，會慢慢變成你的樣子。
  tags: [feedback, self_first]

- id: q-visibility-126
  text: 沒被看見，只是還沒被對的人看見。
  tags: [visibility, audience]

- id: q-visibility-127
  text: 讚美收下，批評過濾，剩下的還給世界。
  tags: [criticism, feedback]

- id: q-visibility-128
  text: 你先成為自己的觀眾，這場戲才撐得住。
  tags: [self_first, audience]

- id: q-visibility-129
  text: 分享是把心事說出口，不是把自己交出去評分。
  tags: [sharing, validation]

- id: q-visibility-130
  text: 對的回饋讓你更像自己，錯的讓你更像別人。
  tags: [feedback, self_first]

- id: q-visibility-131
  text: 你不必為冷清的一天道歉。
  tags: [reception, self_first]

- id: q-visibility-132
  text: 被看見的渴望很正常，只是別讓它替你做決定。
  tags: [visibility, self_first]

- id: q-visibility-133
  text: 真正的觀眾，會等你走完自己的節奏。
  tags: [audience, reception]

- id: q-visibility-134
  text: 一句尖銳評論的重量，不該壓過你整段努力。
  tags: [criticism, self_first]

- id: q-visibility-135
  text: 你喜歡自己的作品，這件事別人搶不走。
  tags: [self_first, validation]

- id: q-visibility-136
  text: 分享的意義，有時只是讓某個人知道「原來我不孤單」。
  tags: [sharing, reception]

- id: q-visibility-137
  text: 收到讚時別急著懷疑，你允許自己被喜歡吧。
  tags: [validation, reception]

- id: q-visibility-138
  text: 不是每個意見都要採納，但每個都可以先聽聽。
  tags: [feedback, criticism]

- id: q-visibility-139
  text: 你的作品在對的人眼裡，會發出你自己都沒看見的光。
  tags: [audience, reception]

- id: q-visibility-140
  text: 被看見有風險，不被看見也有代價，你可以慢慢選。
  tags: [visibility, sharing]

- id: q-visibility-141
  text: 別人怎麼解讀是他的自由，你怎麼創作是你的。
  tags: [reception, self_first]

- id: q-visibility-142
  text: 回饋像鏡子，照出的是角度，不一定是全部。
  tags: [feedback, criticism]

- id: q-visibility-143
  text: 你可以一邊在乎作品，一邊不那麼在乎數字。
  tags: [validation, self_first]

- id: q-visibility-144
  text: 對的觀眾不會要你變成別人。
  tags: [audience, self_first]

- id: q-visibility-145
  text: 分享是一種信任，先信任你自己值得被看見。
  tags: [sharing, self_first]

- id: q-visibility-146
  text: 難聽的話過濾掉情緒，剩下的往往很短。
  tags: [criticism, feedback]

- id: q-visibility-147
  text: 你今天做的，不必解釋，也不必被誰批准。
  tags: [self_first, validation]

- id: q-visibility-148
  text: 沒有觀眾的排練，也是真實的表演。
  tags: [visibility, self_first]

- id: q-visibility-149
  text: 一個懂你的回饋，能讓十個誤解都變得無所謂。
  tags: [feedback, reception]

- id: q-visibility-150
  text: 你可以把作品給世界，同時把喜歡留給自己。
  tags: [sharing, self_first]

- id: q-visibility-151
  text: 被討厭不是你的失敗，是你們剛好不合。
  tags: [audience, criticism]

- id: q-visibility-152
  text: 讚數少的日子，作品的品質沒有跟著變少。
  tags: [validation, self_first]

- id: q-visibility-153
  text: 你有權對某些回饋說「謝謝，但我想這樣做」。
  tags: [feedback, self_first]

- id: q-visibility-154
  text: 被看見那一刻很短，喜歡自己在做的事很長。
  tags: [visibility, self_first]

- id: q-visibility-155
  text: 對的人會在你安靜時，替你記得你的好。
  tags: [audience, reception]

- id: q-visibility-156
  text: 分享不是為了證明什麼，是為了不再獨自收著。
  tags: [sharing, self_first]

- id: q-visibility-157
  text: 批評若讓你更清楚，就留下；若只讓你退縮，就放下。
  tags: [criticism, feedback]

- id: q-visibility-158
  text: 你不需要活成別人留言區裡的樣子。
  tags: [reception, self_first]

- id: q-visibility-159
  text: 真心的回饋不常有，遇到了值得好好道謝。
  tags: [feedback, reception]

- id: q-visibility-160
  text: 你先看見自己，別人才知道要看向哪裡。
  tags: [self_first, visibility]

- id: q-visibility-161
  text: 對的觀眾像慢慢煮的湯，急不得，但會濃。
  tags: [audience, reception]

- id: q-visibility-162
  text: 不為讚而做，你才做得久。
  tags: [validation, self_first]

- id: q-visibility-163
  text: 分享出去被冷落，不會讓你剛才的用心失效。
  tags: [sharing, reception]

- id: q-visibility-164
  text: 面對評論，你可以先站在自己這邊。
  tags: [criticism, self_first]

- id: q-visibility-165
  text: 被少數對的人看見，已經足夠讓創作有意義。
  tags: [audience, validation]

- id: q-visibility-166
  text: 你的作品不必替每一種心情負責。
  tags: [reception, self_first]

- id: q-visibility-167
  text: 回饋收與不收，都是你在為作品做主。
  tags: [feedback, self_first]

- id: q-visibility-168
  text: 沒被看見的今天，你還是完成了一件真實的事。
  tags: [visibility, self_first]

- id: q-visibility-169
  text: 讚是別人的一秒，你的用心是好幾個小時。
  tags: [validation, self_first]

- id: q-visibility-170
  text: 對的人會欣賞你不完美的地方。
  tags: [audience, reception]

- id: q-visibility-171
  text: 分享時的害怕，和被理解時的暖，是同一件事的兩端。
  tags: [sharing, reception]

- id: q-visibility-172
  text: 你可以聽見所有聲音，但只讓幾個住進來。
  tags: [feedback, criticism]

- id: q-visibility-173
  text: 先喜歡自己做的這一件，下一件才有底氣。
  tags: [self_first, validation]

- id: q-visibility-174
  text: 被看見不是終點，是你和世界的一次握手。
  tags: [visibility, reception]

- id: q-visibility-175
  text: 對的觀眾不會催你，他們會陪你。
  tags: [audience, reception]

- id: q-visibility-176
  text: 你交出去的是作品，不是自己整個人的價值。
  tags: [sharing, validation]

- id: q-visibility-177
  text: 面對難聽的話，你可以選擇不接那顆球。
  tags: [criticism, self_first]

- id: q-visibility-178
  text: 沒有回饋的作品，也在替你練習下一件。
  tags: [feedback, self_first]

- id: q-visibility-179
  text: 你今天願意被看見，這份勇氣就記在自己名下。
  tags: [visibility, self_first]

- id: q-visibility-180
  text: 讓自己先滿意，是對作品最溫柔的尊重。
  tags: [self_first, validation]
