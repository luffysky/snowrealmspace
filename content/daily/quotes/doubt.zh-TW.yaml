  text: 懷疑不會取消你已經走過的距離。
  tags: [self_doubt, trust]

- id: q-doubt-153
  text: 沒把握的東西，往往最後最像你自己。
  tags: [self_doubt, trust]

- id: q-doubt-154
  text: 今天做不動，就答應自己明天再回來一次。
  tags: [stuck, continuing]

- id: q-doubt-155
  text: 不知道對不對，就把它交給一次小小的嘗試。
  tags: [doubt, direction]

- id: q-doubt-156
  text: 你可以在霧裡慢慢走，不必先看到出口。
  tags: [uncertainty, continuing]

- id: q-doubt-157
  text: 猶豫這麼久，是因為你真的很想做好它。
  tags: [self_doubt, doubt]

- id: q-doubt-158
  text: 卡住的時候，回頭看看已經完成的那些。
  tags: [stuck, trust]

- id: q-doubt-159
  text: 不確定的未來，一次只需要應付今天。
  tags: [uncertainty, continuing]

- id: q-doubt-160
  text: 你走的每一步，都在幫方向慢慢對焦。
  tags: [direction, continuing]

- id: q-doubt-161
  text: 灰色地帶，是允許你還沒想清楚的地方。
  tags: [grey_area, uncertainty]

- id: q-doubt-162
  text: 今天只想小小地存在，也完全可以。
  tags: [stuck, continuing]

- id: q-doubt-163
  text: 你不用馬上原諒自己的不確定，慢慢來。
  tags: [self_doubt, trust]

- id: q-doubt-164
  text: 做到一半的東西，不代表半途而廢。
  tags: [doubt, continuing]

- id: q-doubt-165
  text: 不知道往哪走，就先別往回頭路退。
  tags: [direction, continuing]

- id: q-doubt-166
  text: 你的懷疑，是在替你的作品把關，不是拆台。
  tags: [self_doubt, trust]

- id: q-doubt-167
  text: 不確定也沒關係，答案本來就不急著今天到。
  tags: [uncertainty, continuing]

- id: q-doubt-168
  text: 卡住太久了，允許自己換個題目喘口氣。
  tags: [stuck, continuing]

- id: q-doubt-169
  text: 你今天願意懷疑，也代表你還沒麻木。
  tags: [doubt, trust]

- id: q-doubt-170
  text: 灰色的日子過去了，你也還在這裡。
  tags: [grey_area, continuing]

- id: q-doubt-171
  text: 不必先確定路對，才准踏出第一步。
  tags: [direction, doubt]

- id: q-doubt-172
  text: 你比自己以為的，還要更能撐一點點。
  tags: [self_doubt, continuing]

- id: q-doubt-173
  text: 想不清楚的時候，就先把心情寫下來。
  tags: [uncertainty, continuing]

- id: q-doubt-174
  text: 卡住的今天，也是你在乎它的證明。
  tags: [stuck, trust]

- id: q-doubt-175
  text: 不確定要不要繼續的人，通常已經走了很遠。
  tags: [doubt, continuing]

- id: q-doubt-176
  text: 你可以先不喜歡結果，但別否定過程。
  tags: [self_doubt, trust]

- id: q-doubt-177
  text: 方向會在你不斷微調裡，慢慢變清楚。
  tags: [direction, continuing]

- id: q-doubt-178
  text: 今天只要沒有離開，就還在往前的隊伍裡。
  tags: [stuck, continuing]

- id: q-doubt-179
  text: 不確定的重量，肩膀會慢慢學會扛。
  tags: [uncertainty, trust]

- id: q-doubt-180
  text: 你懷疑的那個自己，其實一直很努力。
  tags: [self_doubt, trust]
