- id: q-meaning-157
  text: 你今天的用心，會悄悄留在你做的東西裡。
  tags: [intention, legacy]
- id: q-meaning-158
  text: 創作是替情緒找一個不傷人的出口。
  tags: [expression, self]
- id: q-meaning-159
  text: 你當初想做的理由，比放棄的理由更值得聽。
  tags: [intention, why]
- id: q-meaning-160
  text: 不必逼自己有產出，休息也是創作的一部分。
  tags: [self, intention]
- id: q-meaning-161
  text: 你留下的痕跡，會替你記得曾走過這裡。
  tags: [legacy, self]
- id: q-meaning-162
  text: 做這件事讓你更像自己，就別問值不值得。
  tags: [self, meaning]
- id: q-meaning-163
  text: 為自己而創作，是最不會後悔的那一種。
  tags: [self, purpose]
- id: q-meaning-164
  text: 喜歡一件事本身，就已經是很好的答案。
  tags: [love, why]
- id: q-meaning-165
  text: 你想表達的，不必等到成熟才配被說出來。
  tags: [expression, self]
- id: q-meaning-166
  text: 意義藏在你願意重來一次的那份耐心裡。
  tags: [meaning, intention]
- id: q-meaning-167
  text: 為在乎的人留一件小東西，勝過千言萬語。
  tags: [love, legacy]
- id: q-meaning-168
  text: 你今天願意來，就已經替明天鋪了一塊路。
  tags: [self, intention]
- id: q-meaning-169
  text: 創作是把一閃而過的你，留成看得見的你。
  tags: [expression, legacy]
- id: q-meaning-170
  text: 你最初的心動，值得你替它做點什麼。
  tags: [intention, love]
- id: q-meaning-171
  text: 不為結果做事，反而最接近做事的快樂。
  tags: [why, meaning]
- id: q-meaning-172
  text: 你留下的，不必被理解，只要曾經真實。
  tags: [legacy, self]
- id: q-meaning-173
  text: 做這件事的時候，你和自己好好相處了一會。
  tags: [self, meaning]
- id: q-meaning-174
  text: 為自己創作，是把喜歡活成日常的樣子。
  tags: [self, love]
- id: q-meaning-175
  text: 喜歡就是理由，不需要更長的句子解釋。
  tags: [love, why]
- id: q-meaning-176
  text: 你做的東西會替你，把今天好好收藏起來。
  tags: [legacy, self]
- id: q-meaning-177
  text: 意義是你回頭時，願意對自己點頭的那一刻。
  tags: [meaning, self]
- id: q-meaning-178
  text: 不必每天有意義，有你在做就已經很好。
  tags: [self, intention]
