# 每日語錄 — 完成與放手
# 主題：結束一個作品、知道何時停、接受夠好、交出去、不再改
# tags: finishing, letting_go, done, enough, shipping, closure, stopping, release

- id: q-finishing-001
  text: 完成不是做到完美，是願意讓它離開你的手。
  tags: [finishing, letting_go]
- id: q-finishing-002
  text: 你可以再改一百次，但有一次你得決定，這一版就是它了。
  tags: [finishing, done]
- id: q-finishing-003
  text: 作品交出去的那一刻，它就開始有自己的人生了。
  tags: [release, letting_go]
- id: q-finishing-004
  text: 夠好，有時候比更好更誠實。
  tags: [enough, done]
- id: q-finishing-005
  text: 今天沒力氣收尾也沒關係，它會在原地等你。
  tags: [finishing, stopping]
- id: q-finishing-006
  text: 停下來不是放棄，是你終於聽見自己說：可以了。
  tags: [stopping, enough]
- id: q-finishing-007
  text: 沒有一個作品是完成的，只有被你溫柔放下的。
  tags: [finishing, letting_go]
- id: q-finishing-008
  text: 交出去會怕，那份怕正說明你認真過。
  tags: [shipping, closure]
- id: q-finishing-009
  text: 你不需要愛上成品，只需要願意讓別人看見它。
  tags: [shipping, release]
- id: q-finishing-010
  text: 最後那百分之十的完美，常常花掉你一半的命。
  tags: [enough, stopping]
- id: q-finishing-011
  text: 把它印出來，貼上去，寄出去。改不完的，就留給下一件。
  tags: [shipping, done]
- id: q-finishing-012
  text: 不再改，不是因為它完美，是因為你長大了。
  tags: [closure, letting_go]
- id: q-finishing-013
  text: 有些收尾只需要一句：先這樣。
  tags: [done, stopping]
- id: q-finishing-014
  text: 你以為的未完成，別人看見的可能剛剛好。
  tags: [enough, finishing]
- id: q-finishing-015
  text: 讓作品呼吸的方式，是你先鬆開手指。
  tags: [release, letting_go]
- id: q-finishing-016
  text: 完成一件小事，也算完成。今天這樣就好。
  tags: [done, enough]
- id: q-finishing-017
  text: 你不是在放手，你是在給它一個出發的機會。
  tags: [letting_go, release]
- id: q-finishing-018
  text: 一直修，是怕面對它已經好了。
  tags: [stopping, enough]
- id: q-finishing-019
  text: 收工的燈關上時，別忘了看一眼今天做出來的東西。
  tags: [closure, done]
- id: q-finishing-020
  text: 交件之後的空，是你努力過的形狀。
  tags: [shipping, closure]
- id: q-finishing-021
  text: 把「還不夠」放下一天，明天它可能就變成「其實可以」。
  tags: [enough, stopping]
- id: q-finishing-022
  text: 不是每個結尾都要漂亮，能結束就已經很好。
  tags: [closure, done]
- id: q-finishing-023
  text: 你允許它有瑕疵，它才有機會被人記得。
  tags: [enough, release]
- id: q-finishing-024
  text: 手放開的瞬間會抖，那是完成的心跳。
  tags: [letting_go, finishing]
- id: q-finishing-025
  text: 沒收好的線頭，有時是作品最真的地方。
  tags: [enough, done]
- id: q-finishing-026
  text: 今天只想看著它，不想動它，那也是一種尊重。
  tags: [stopping, letting_go]
- id: q-finishing-027
  text: 送出去以後，它是不是完美，已經不歸你管了。
  tags: [release, shipping]
- id: q-finishing-028
  text: 你花的每一分鐘都算數，就算它看起來還沒好。
  tags: [finishing, enough]
- id: q-finishing-029
  text: 結束一個作品，是為了空出手，接住下一個。
  tags: [closure, release]
- id: q-finishing-030
  text: 按下送出鍵之前深呼吸，然後就按下去。
  tags: [shipping, done]
- id: q-finishing-031
  text: 完美主義最常做的事，是讓好作品永遠見不到光。
  tags: [enough, shipping]
- id: q-finishing-032
  text: 你不欠這個作品無止境的修改，你只欠它一個結束。
  tags: [closure, stopping]
- id: q-finishing-033
  text: 今天做不動，就把工具收好，這也是照顧作品。
  tags: [stopping, letting_go]
- id: q-finishing-034
  text: 有時候「完成」只是換一種方式繼續愛它。
  tags: [finishing, letting_go]
- id: q-finishing-035
  text: 你怕它不夠好，但世界正需要一件真實的東西。
  tags: [enough, release]
- id: q-finishing-036
  text: 把最後一筆畫上，剩下的交給時間去說。
  tags: [done, closure]
- id: q-finishing-037
  text: 不再回去改，是給過去的自己一個信任。
  tags: [letting_go, closure]
- id: q-finishing-038
  text: 你不需要全部想清楚才能結束，結束本身會告訴你答案。
  tags: [closure, done]
- id: q-finishing-039
  text: 作品離手那天，記得謝謝自己撐到這裡。
  tags: [release, finishing]
- id: q-finishing-040
  text: 沒有人在等一個完美的版本，他們在等你的那一個。
  tags: [shipping, enough]
- id: q-finishing-041
  text: 停在夠好的地方，是一種很難學會的溫柔。
  tags: [enough, stopping]
- id: q-finishing-042
  text: 你可以留著遺憾，但別讓它擋住結束的門。
  tags: [closure, letting_go]
- id: q-finishing-043
  text: 完成的定義由你決定，不是由那個永不滿意的聲音。
  tags: [done, enough]
- id: q-finishing-044
  text: 交出去像放小船下水，你只能推它一把。
  tags: [release, shipping]
- id: q-finishing-045
  text: 今天能寫下最後一行，就已經走得很遠了。
  tags: [finishing, done]
- id: q-finishing-046
  text: 不完美的完成，勝過完美的永遠沒做完。
  tags: [enough, done]
- id: q-finishing-047
  text: 有些作品不是被寫完的，是被作者放過的。
  tags: [letting_go, stopping]
- id: q-finishing-048
  text: 你把它做出來了，這件事本身就值得被看見。
  tags: [finishing, release]
- id: q-finishing-049
  text: 收尾的力氣不夠時，就只做一件小事，然後休息。
  tags: [stopping, enough]
- id: q-finishing-050
  text: 讓它出門吧，穿得不夠體面也沒關係。
  tags: [shipping, release]
- id: q-finishing-051
  text: 不再修改的自由，比多修一次的安心更珍貴。
  tags: [letting_go, done]
- id: q-finishing-052
  text: 每個結束都藏著一個你沒察覺的成長。
  tags: [closure, finishing]
- id: q-finishing-053
  text: 你不是要它完美，你是要它終於真的存在。
  tags: [shipping, enough]
- id: q-finishing-054
  text: 把作品交給世界，也把焦慮一起交出去。
  tags: [release, closure]
- id: q-finishing-055
  text: 今天不想面對它，就先走開，你們都需要空間。
  tags: [stopping, letting_go]
- id: q-finishing-056
  text: 完成是一種決定，不是一種感覺。
  tags: [done, finishing]
- id: q-finishing-057
  text: 你已經給得夠多了，剩下的它自己會長。
  tags: [enough, release]
- id: q-finishing-058
  text: 結尾寫不好也沒關係，先結束再說。
  tags: [closure, done]
- id: q-finishing-059
  text: 放手不是切斷，是換一種更遠的守望。
  tags: [letting_go, release]
- id: q-finishing-060
  text: 你不必等到準備好，準備好常常是完成之後的事。
  tags: [shipping, done]
- id: q-finishing-061
  text: 把「再一下下」的手停住，那一下下往往永無止境。
  tags: [stopping, enough]
- id: q-finishing-062
  text: 完成一件事，是對明天的自己最好的交代。
  tags: [done, finishing]
- id: q-finishing-063
  text: 作品有瑕疵，正好留一個位置給未來的你。
  tags: [enough, letting_go]
- id: q-finishing-064
  text: 交出去之後別急著看反應，先為自己鼓一次掌。
  tags: [shipping, closure]
- id: q-finishing-065
  text: 有些日子只能收拾桌面，那也是在往完成靠近。
  tags: [stopping, finishing]
- id: q-finishing-066
  text: 你怕交出去，是因為它終於變得重要了。
  tags: [shipping, release]
- id: q-finishing-067
  text: 停筆不是句號，是讓讀者接手的省略號。
  tags: [stopping, letting_go]
- id: q-finishing-068
  text: 夠好是一個座標，不是一種妥協。
  tags: [enough, done]
- id: q-finishing-069
  text: 讓它去吧，你已經在它身上留下了自己。
  tags: [release, letting_go]
- id: q-finishing-070
  text: 完成不會讓你變空，它會讓你變輕。
  tags: [finishing, closure]
- id: q-finishing-071
  text: 今天沒完成也是一天，明天再牽起那條線。
  tags: [stopping, enough]
- id: q-finishing-072
  text: 你不需要對每個細節負責一輩子，交出去就是交棒。
  tags: [release, closure]
- id: q-finishing-073
  text: 把最後的猶豫收進抽屜，讓作品先出門。
  tags: [shipping, done]
- id: q-finishing-074
  text: 有時候放下一個作品，是為了不背著它走下去。
  tags: [letting_go, closure]
- id: q-finishing-075
  text: 完成的感覺很淡，但那份淡裡有踏實。
  tags: [finishing, done]
- id: q-finishing-076
  text: 你可以捨不得，同時還是把它送出去。
  tags: [release, letting_go]
- id: q-finishing-077
  text: 不再改的那一刻，你也放過了自己。
  tags: [stopping, closure]
- id: q-finishing-078
  text: 做完比做好先來到，做好會在做完之後慢慢長。
  tags: [done, enough]
- id: q-finishing-079
  text: 今天力氣只夠存檔，那就存檔，然後閉上眼。
  tags: [stopping, finishing]
- id: q-finishing-080
  text: 交出去的作品，會替你去到你到不了的地方。
  tags: [shipping, release]
- id: q-finishing-081
  text: 你不是在丟掉它，你是在讓它變成別人的收穫。
  tags: [release, letting_go]
- id: q-finishing-082
  text: 結束一件事需要勇氣，那份勇氣你今天有。
  tags: [closure, done]
- id: q-finishing-083
  text: 別讓一個小瑕疵，綁架整件已經很好的作品。
  tags: [enough, shipping]
- id: q-finishing-084
  text: 完成是把「還沒好」翻譯成「就到這裡」。
  tags: [done, stopping]
- id: q-finishing-085
  text: 放手那天，天不會塌，作品反而站起來了。
  tags: [letting_go, release]
- id: q-finishing-086
  text: 你今天只想放空，作品也允許你這樣。
  tags: [stopping, enough]
- id: q-finishing-087
  text: 有些線頭剪掉就好，不必每一條都打成蝴蝶結。
  tags: [enough, done]
- id: q-finishing-088
  text: 交出去以後，你會發現自己比想像中更完整。
  tags: [shipping, closure]
- id: q-finishing-089
  text: 完成不是抵達終點，是願意在某個地方停下。
  tags: [stopping, finishing]
- id: q-finishing-090
  text: 把作品放走，不代表你停止在乎它。
  tags: [release, letting_go]
- id: q-finishing-091
  text: 今天做到這裡就好，明天的你會接得住。
  tags: [stopping, done]
- id: q-finishing-092
  text: 你以為還缺一塊，其實那塊叫做結束。
  tags: [closure, enough]
- id: q-finishing-093
  text: 送作品上路，記得也給自己一段休息的路。
  tags: [shipping, stopping]
- id: q-finishing-094
  text: 不完美地完成，是最誠實的一種完整。
  tags: [enough, finishing]
- id: q-finishing-095
  text: 你握著它太久，它就飛不起來了。
  tags: [letting_go, release]
- id: q-finishing-096
  text: 收尾的儀式可以很小，一杯茶，一句：辛苦了。
  tags: [closure, done]
- id: q-finishing-097
  text: 完成的作品會回頭教你，怎麼開始下一個。
  tags: [finishing, closure]
- id: q-finishing-098
  text: 今天沒動它，它沒有變壞，你也沒有。
  tags: [stopping, enough]
- id: q-finishing-099
  text: 讓它離手，是你能給作品最大的信任。
  tags: [release, letting_go]
- id: q-finishing-100
  text: 你不欠完美，你只欠自己一個乾淨的結束。
  tags: [closure, stopping]
- id: q-finishing-101
  text: 把「應該更好」換成「已經做到」，就能睡個好覺。
  tags: [enough, done]
- id: q-finishing-102
  text: 交出去的那一刻，作品才真正開始長大。
  tags: [shipping, release]
- id: q-finishing-103
  text: 有些故事在你停筆的地方，剛好留白得漂亮。
  tags: [stopping, letting_go]
- id: q-finishing-104
  text: 完成一件低能量的小事，也是一種了不起。
  tags: [done, enough]
- id: q-finishing-105
  text: 你不是逃避結束，你是在學習怎麼結束。
  tags: [closure, finishing]
- id: q-finishing-106
  text: 把作品送出門，也把心裡那塊石頭放下。
  tags: [release, shipping]
- id: q-finishing-107
  text: 不再改的決定，會讓你重新愛上創作本身。
  tags: [letting_go, done]
- id: q-finishing-108
  text: 今天只能看不能做，那就好好地看它。
  tags: [stopping, enough]
- id: q-finishing-109
  text: 完成是承認：我已經把當下的自己都給它了。
  tags: [finishing, closure]
- id: q-finishing-110
  text: 你怕放手之後空落落，但空是為了裝下新的。
  tags: [letting_go, release]
- id: q-finishing-111
  text: 交件不是考試，沒有滿分，只有你的那一份。
  tags: [shipping, enough]
- id: q-finishing-112
  text: 讓它結束，你才聽得見下一個作品在敲門。
  tags: [closure, release]
- id: q-finishing-113
  text: 今天力氣只有一分，就用那一分寫下結尾。
  tags: [stopping, done]
- id: q-finishing-114
  text: 你不必把每個念頭都塞進去，留白也是內容。
  tags: [enough, letting_go]
- id: q-finishing-115
  text: 完成後的疲憊，是一種被填滿過的證明。
  tags: [finishing, closure]
- id: q-finishing-116
  text: 把作品交給時間，它會替你判斷值不值得。
  tags: [release, done]
- id: q-finishing-117
  text: 你可以害怕，然後依然按下發表。
  tags: [shipping, letting_go]
- id: q-finishing-118
  text: 停下來的勇氣，和開始一樣稀有。
  tags: [stopping, enough]
- id: q-finishing-119
  text: 有瑕疵的成品，比完美的空白更靠近真實。
  tags: [enough, shipping]
- id: q-finishing-120
  text: 完成是給自己的一個小小的畢業典禮。
  tags: [finishing, closure]
- id: q-finishing-121
  text: 放手那天，你不是失去它，是把它借給世界。
  tags: [release, letting_go]
- id: q-finishing-122
  text: 今天做不完也沒關係，你不是機器。
  tags: [stopping, enough]
- id: q-finishing-123
  text: 交出去以後，別急著檢討，先允許自己高興一下。
  tags: [shipping, closure]
- id: q-finishing-124
  text: 有時候最好的修改，是決定不再修改。
  tags: [letting_go, done]
- id: q-finishing-125
  text: 完成的門檻，該由你設，不是由恐懼設。
  tags: [enough, finishing]
- id: q-finishing-126
  text: 把它放走，你會發現自己還在，而且更輕了。
  tags: [release, letting_go]
- id: q-finishing-127
  text: 收尾像關窗，不是把風景關掉，是讓屋裡安靜。
  tags: [closure, stopping]
- id: q-finishing-128
  text: 你做出來的，已經比躺在腦中的它勇敢一百倍。
  tags: [shipping, done]
- id: q-finishing-129
  text: 今天只想坐著，什麼都不做，作品會理解。
  tags: [stopping, letting_go]
- id: q-finishing-130
  text: 夠好的意思是：它可以帶著缺點被愛。
  tags: [enough, release]
- id: q-finishing-131
  text: 完成不是句點，是你替它畫上的一道地平線。
  tags: [finishing, closure]
- id: q-finishing-132
  text: 交出去會冷靜下來，你會慶幸自己沒再拖。
  tags: [shipping, done]
- id: q-finishing-133
  text: 放下作品，也放下那個一定要它完美的自己。
  tags: [letting_go, enough]
- id: q-finishing-134
  text: 今天的收尾只做百分之一，剩下留給有力氣的明天。
  tags: [stopping, finishing]
- id: q-finishing-135
  text: 你不是半途而廢，你是懂得在哪裡停下。
  tags: [stopping, closure]
- id: q-finishing-136
  text: 把作品送走，就像放晴後晾乾的衣服，該收了。
  tags: [release, done]
- id: q-finishing-137
  text: 完成的祕密，是接受它永遠可以更好，然後放手。
  tags: [enough, letting_go]
- id: q-finishing-138
  text: 你今天願意面對結尾，這件事本身就很勇敢。
  tags: [closure, finishing]
- id: q-finishing-139
  text: 交出去以後的忐忑，會被時間慢慢撫平。
  tags: [shipping, release]
- id: q-finishing-140
  text: 有些作品需要的不是更多，是你終於停手。
  tags: [stopping, enough]
- id: q-finishing-141
  text: 完成一件事，是你送給疲憊的自己的禮物。
  tags: [done, finishing]
- id: q-finishing-142
  text: 放手不是不負責，是相信它已經站得穩了。
  tags: [letting_go, release]
- id: q-finishing-143
  text: 今天沒有靈感也沒關係，把昨天的收好就好。
  tags: [stopping, done]
- id: q-finishing-144
  text: 你設的那條「完美線」，其實一直在往後退。
  tags: [enough, letting_go]
- id: q-finishing-145
  text: 交件之後的安靜，是努力落地的聲音。
  tags: [shipping, closure]
- id: q-finishing-146
  text: 完成是對作品說：謝謝你陪我走到這裡。
  tags: [finishing, closure]
- id: q-finishing-147
  text: 把它交出去，你就不必再一個人扛著它了。
  tags: [release, shipping]
- id: q-finishing-148
  text: 今天只想關掉檔案，那就關掉，不必內疚。
  tags: [stopping, letting_go]
- id: q-finishing-149
  text: 夠好，是你對自己的一種寬容。
  tags: [enough, done]
- id: q-finishing-150
  text: 結束一個作品，也是在練習跟過去溫柔道別。
  tags: [closure, letting_go]
- id: q-finishing-151
  text: 你不需要它完美，只需要它是你此刻的真話。
  tags: [enough, finishing]
- id: q-finishing-152
  text: 送出去以後，作品的命運不再是你的重擔。
  tags: [release, shipping]
- id: q-finishing-153
  text: 完成常常沒有慶祝，只有一句悄悄的：好了。
  tags: [done, closure]
- id: q-finishing-154
  text: 今天低能量，就讓作品也休息一天。
  tags: [stopping, enough]
- id: q-finishing-155
  text: 放開手指的那一秒，你完成的不只是作品。
  tags: [letting_go, finishing]
- id: q-finishing-156
  text: 你可以捨不得，但捨不得不該變成拖延。
  tags: [stopping, done]
- id: q-finishing-157
  text: 交出去，是讓別人也有機會愛上它。
  tags: [shipping, release]
- id: q-finishing-158
  text: 有些完美只存在腦中，做出來的才叫作品。
  tags: [enough, done]
- id: q-finishing-159
  text: 收尾那刻，別忘了對自己說一句：做得好。
  tags: [closure, finishing]
- id: q-finishing-160
  text: 放手之後，你才有雙手去做新的夢。
  tags: [release, letting_go]
- id: q-finishing-161
  text: 今天只想蓋上筆蓋，那就蓋上，明天再開。
  tags: [stopping, done]
- id: q-finishing-162
  text: 完成不是失去它，是讓它成為完成過的你。
  tags: [finishing, closure]
- id: q-finishing-163
  text: 你交出的每一件，都在教你更相信自己。
  tags: [shipping, enough]
- id: q-finishing-164
  text: 停在夠好，是把力氣留給下一個開始。
  tags: [enough, stopping]
- id: q-finishing-165
  text: 讓作品離開你，它才能屬於更多人。
  tags: [release, letting_go]
- id: q-finishing-166
  text: 今天無法收尾，就寫下一句：待續，然後安心睡。
  tags: [stopping, closure]
- id: q-finishing-167
  text: 完美是遠方的燈，完成是你腳下的路。
  tags: [enough, finishing]
- id: q-finishing-168
  text: 交出去以後，你會重新變回一個空杯，等著被裝滿。
  tags: [release, closure]
- id: q-finishing-169
  text: 不再改的作品，是你送給未來自己的一封信。
  tags: [letting_go, done]
- id: q-finishing-170
  text: 今天的完成很小，小到只有你知道，但它算數。
  tags: [done, enough]
- id: q-finishing-171
  text: 放手需要練習，你不必一次就學會。
  tags: [letting_go, stopping]
- id: q-finishing-172
  text: 把作品交出去，也把「一定要更好」的鞭子放下。
  tags: [shipping, enough]
- id: q-finishing-173
  text: 完成是一種選擇，你今天可以選它。
  tags: [done, finishing]
- id: q-finishing-174
  text: 結束不是斷掉，是把線收成一個溫柔的結。
  tags: [closure, letting_go]
- id: q-finishing-175
  text: 讓它走吧，你已經把最好的自己留在裡面了。
  tags: [release, finishing]
- id: q-finishing-176
  text: 今天不想碰它，明天再愛它，這都算數。
  tags: [stopping, letting_go]
- id: q-finishing-177
  text: 你不是在放棄完美，你是在選擇真實地完成。
  tags: [enough, done]
- id: q-finishing-178
  text: 交出去那一刻的緊張，會慢慢變成一種驕傲。
  tags: [shipping, closure]
- id: q-finishing-179
  text: 收好工具，關上燈，你今天已經走得夠遠。
  tags: [stopping, done]
- id: q-finishing-180
  text: 完成與放手，是同一個動作的兩個名字。
  tags: [finishing, letting_go]
