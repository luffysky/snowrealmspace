- id: q-tools-014
  text: 你的手記得的，比你的腦以為的多。
  tags: [hands, skill]
- id: q-tools-015
  text: 一把鈍刀用久了，你會知道怎麼順著它。
  tags: [tools, mastery]
- id: q-tools-016
  text: 不必等到工具齊全，齊全那天永遠不會到。
  tags: [tools, simplicity]
- id: q-tools-017
  text: 換工具是為了走更遠，不是為了逃更快。
  tags: [tools, craft]
- id: q-tools-018
  text: 把功能關掉一半，你會更清楚自己要什麼。
  tags: [constraint, simplicity]
- id: q-tools-019
  text: 慢慢用一樣東西，它會慢慢變成你的一部分。
  tags: [mastery, hands]
- id: q-tools-020
  text: 低能量的日子，讓工具替你多扛一點。
  tags: [tools, simplicity]
- id: q-tools-021
  text: 好用不是因為它厲害，是因為你懂它。
