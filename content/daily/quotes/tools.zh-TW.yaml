  tags: [tools, mastery]
- id: q-tools-163
  text: 手的技藝，是慢慢堆起來的，堆過就不會塌。
  tags: [hands, skill]
- id: q-tools-164
  text: 越簡單的工具，越給你發揮的空間。
  tags: [simplicity, craft]
- id: q-tools-165
  text: 別讓工具替你決定風格，那該是你的。
  tags: [tools, craft]
- id: q-tools-166
  text: 一件趁手的工具，會安靜地替你頂住難處。
  tags: [mastery, tools]
- id: q-tools-167
  text: 今天畫一條線就好，手需要熱身。
  tags: [hands, simplicity]
- id: q-tools-168
  text: 限制逼你認識自己真正想要的。
  tags: [constraint, craft]
- id: q-tools-169
  text: 工具是手的延伸，不是想像力的替代。
  tags: [tools, hands]
- id: q-tools-170
  text: 熟了，才知道一樣工具能陪你走多遠。
  tags: [mastery, tools]
- id: q-tools-171
  text: 手多摸幾遍材料，它就會回你更多。
  tags: [hands, medium]
- id: q-tools-172
  text: 別在工具上追求完美，把完美留給作品的心意。
  tags: [tools, craft]
- id: q-tools-173
  text: 一支舊筆的手感，是花錢買不回的交情。
  tags: [mastery, hands]
- id: q-tools-174
  text: 今天沒靈感，就讓手先隨便動，別勉強腦子。
  tags: [hands, simplicity]
- id: q-tools-175
  text: 工具會換，手會老，但做東西的心可以一直新。
  tags: [craft, hands]
- id: q-tools-176
  text: 把一樣工具用到爛熟，就是一種踏實的自由。
  tags: [mastery, tools]
- id: q-tools-177
  text: 限制少了選擇的焦慮，多了動手的痛快。
  tags: [constraint, craft]
- id: q-tools-178
  text: 手感回來的那一刻，你自己會第一個知道。
  tags: [hands, skill]
- id: q-tools-179
  text: 工具幫你記住，但感受得由你親手放進去。
  tags: [tools, craft]
- id: q-tools-180
  text: 今天不必厲害，順手做一點，就夠了。
  tags: [simplicity, hands]
