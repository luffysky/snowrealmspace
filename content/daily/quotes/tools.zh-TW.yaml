# 每日語錄 — 工具與手感
# 主題：工具不是重點、熟悉工具、限制工具、手比工具重要、換工具的意義、不被工具綁架
- id: q-tools-001
  text: 工具再好，也代替不了你想說的話。
  tags: [tools, craft]
- id: q-tools-002
  text: 先把手弄髒，再去挑更順手的傢伙。
  tags: [hands, craft]
- id: q-tools-003
  text: 一支用熟的舊筆，勝過十支還在猶豫的新筆。
  tags: [tools, mastery]
- id: q-tools-004
  text: 你不是缺工具，只是還沒開始。
  tags: [tools, craft]
- id: q-tools-005
  text: 換軟體不會換掉你的卡關，但會換掉你的今天下午。
  tags: [tools, medium]
- id: q-tools-006
  text: 限制少一點選擇，反而多一點動手。
  tags: [constraint, craft]
- id: q-tools-007
  text: 手感是練出來的，不是買出來的。
  tags: [hands, skill]
- id: q-tools-008
  text: 最好的工具，是你閉著眼也知道它在哪的那一個。
