# 每日語錄 — 主題：勇氣與冒險
# 給創作者的溫柔提醒。允許低能量的日子，不說教、不勒索。
- id: q-courage-001
  text: 把作品給別人看，本身就是一件勇敢的事。
  tags: [courage, sharing]
- id: q-courage-002
  text: 你不必準備到完美才開始，開始本身就會教你剩下的。
  tags: [trying, courage]
- id: q-courage-003
  text: 會失敗的嘗試，往往才是真正的嘗試。
  tags: [risk, trying]
- id: q-courage-004
  text: 按下發布鍵前手會抖，那是你在乎的證據。
  tags: [sharing, vulnerability]
- id: q-courage-005
  text: 走出熟悉的路，才會遇到還沒認識的自己。
  tags: [comfort_zone, courage]
- id: q-courage-006
  text: 今天沒力氣冒險也沒關係，好好休息也是一種照顧。
