- id: q-courage-017
  text: 把「萬一很爛」換成「先看看會怎樣」。
  tags: [trying, risk]
- id: q-courage-018
  text: 願意被看見不完美，是很成熟的勇敢。
  tags: [vulnerability, brave]
- id: q-courage-019
  text: 今天只前進一公分也算數。
  tags: [trying, courage]
- id: q-courage-020
  text: 你怕的不是那件事，是那件事之後別人的眼光。而眼光會過去。
