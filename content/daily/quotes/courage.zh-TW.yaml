- id: q-courage-011
  text: 承認自己想被看見，並不軟弱。
  tags: [vulnerability, brave]
- id: q-courage-012
  text: 一個小小的公開，也是往世界伸出的一隻手。
  tags: [sharing, courage]
- id: q-courage-013
  text: 你不是在證明什麼，你只是在做你想做的事。
