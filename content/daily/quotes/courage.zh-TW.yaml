  tags: [sharing, courage]
- id: q-courage-151
  text: 今天很難，就把標準降到「有起床就好」。
  tags: [comfort_zone, trying]
- id: q-courage-152
  text: 你願意再試，就代表你還相信會更好。
  tags: [trying, courage]
- id: q-courage-153
  text: 敢暴露不會的地方，才有人能教你會的方法。
  tags: [vulnerability, trying]
- id: q-courage-154
  text: 走出去的害怕，會被走出去的收穫慢慢還清。
  tags: [comfort_zone, risk]
- id: q-courage-155
  text: 面對評價前，先記得你為什麼開始。
  tags: [facing, courage]
- id: q-courage-156
  text: 你的作品替你說了你說不出口的話。
  tags: [sharing, vulnerability]
- id: q-courage-157
  text: 敢把不完美端上桌，才有人願意一起吃。
  tags: [sharing, brave]
- id: q-courage-158
  text: 今天只想做觀眾，那就好好當一天觀眾。
  tags: [comfort_zone, trying]
- id: q-courage-159
  text: 冒險是給未來的你，一個可以回味的故事。
  tags: [risk, courage]
- id: q-courage-160
  text: 你怕被笑，但真正在做事的人不會笑你。
  tags: [facing, vulnerability]
- id: q-courage-161
  text: 走出熟悉，你才會發現熟悉不是唯一的家。
  tags: [comfort_zone, brave]
- id: q-courage-162
  text: 把作品發出去，就是替它爭取被喜歡的機會。
  tags: [sharing, courage]
- id: q-courage-163
  text: 承擔，是願意說「這個決定我負責」。
  tags: [brave, risk]
- id: q-courage-164
  text: 你不必假裝堅強，脆弱說出來也很有力量。
  tags: [vulnerability, facing]
- id: q-courage-165
  text: 今天沒創作，也不代表你不是創作者。
  tags: [comfort_zone, trying]
- id: q-courage-166
  text: 敢做別人沒做過的，才會有你的第一。
  tags: [risk, brave]
- id: q-courage-167
  text: 讓人看見未修飾的你，是一種罕見的誠實。
  tags: [vulnerability, sharing]
- id: q-courage-168
  text: 面對困難時，先把它切成今天能咬的一口。
  tags: [facing, trying]
- id: q-courage-169
  text: 你今天願意開始，明天就有東西可以修改。
  tags: [trying, courage]
- id: q-courage-170
  text: 走出舒適圈不必一次到位，一步一步也算走。
  tags: [comfort_zone, courage]
- id: q-courage-171
  text: 把作品交出去的勇氣，會回頭讓你更相信自己。
  tags: [sharing, brave]
- id: q-courage-172
  text: 你可以承認害怕，然後溫柔地帶自己往前。
  tags: [facing, vulnerability]
- id: q-courage-173
  text: 冒一次險，讓「我做過」取代「我本來可以」。
  tags: [risk, trying]
- id: q-courage-174
  text: 今天允許自己什麼都不做，這不是退步，是喘息。
  tags: [comfort_zone, courage]
- id: q-courage-175
  text: 你敢被看見的每一次，都是在替自己撐腰。
  tags: [sharing, brave]
- id: q-courage-176
  text: 面對空白的頁面，寫下一個字就打破了它。
  tags: [facing, trying]
- id: q-courage-177
  text: 勇敢是允許自己重新開始，不管第幾次。
  tags: [courage, trying]
- id: q-courage-178
  text: 你不必等到不害怕，害怕的時候一樣可以出發。
  tags: [risk, brave]
