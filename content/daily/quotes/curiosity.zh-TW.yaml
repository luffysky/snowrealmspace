  tags: [openness, curiosity]
- id: q-curiosity-149
  text: 把一件熟悉的事講給外星人聽，你會重新看見它。
  tags: [cross_field, wonder]
- id: q-curiosity-150
  text: 一個你沒查過的字源，藏著一整段歷史。
  tags: [discovery, question]
- id: q-curiosity-151
  text: 試著問「最早是誰想到這個的」。
  tags: [question, discovery]
- id: q-curiosity-152
  text: 探索可以很小，小到只是換一條散步路線。
  tags: [exploration, openness]
- id: q-curiosity-153
  text: 你今天的好奇不必有成果，能享受就夠了。
  tags: [curiosity, openness]
- id: q-curiosity-154
  text: 一個別的領域的比賽，看它的規則也很有趣。
  tags: [cross_field, curiosity]
- id: q-curiosity-155
  text: 把一個你討厭的任務當成謎題，感覺會不一樣。
  tags: [openness, trying]
- id: q-curiosity-156
  text: 對一個你崇拜的人，問他最初是怎麼開始的。
  tags: [question, discovery]
- id: q-curiosity-157
  text: 一種你沒用過的顏色，值得你今天試一筆。
  tags: [trying, exploration]
- id: q-curiosity-158
  text: 你眼裡的世界越大，你就越自由。
  tags: [wonder, openness]
- id: q-curiosity-159
  text: 一個「我怎麼從沒想過」的瞬間，就是探索的獎賞。
  tags: [discovery, wonder]
- id: q-curiosity-160
  text: 把兩種你都懂一點的東西湊在一起，看看發生什麼。
  tags: [cross_field, trying]
- id: q-curiosity-161
  text: 問一句「這背後的原理是什麼」，門就開了一條縫。
  tags: [question, curiosity]
- id: q-curiosity-162
  text: 你不需要走很遠，才能發現新的東西。
  tags: [exploration, discovery]
- id: q-curiosity-163
  text: 今天只想閉眼休息，那就聽聽周圍的聲音。
  tags: [wonder, openness]
- id: q-curiosity-164
  text: 一個你以為只有一種答案的問題，其實有很多種。
  tags: [question, openness]
- id: q-curiosity-165
  text: 試著用陌生的方式，做一件你很熟的事。
  tags: [trying, discovery]
- id: q-curiosity-166
  text: 一顆石頭的紋路裡，也有幾百萬年的故事。
  tags: [wonder, discovery]
- id: q-curiosity-167
  text: 你可以對答案好奇，也可以對問題本身著迷。
  tags: [question, curiosity]
- id: q-curiosity-168
  text: 換一個你不熟的節目看看，別人在關心什麼。
  tags: [cross_field, curiosity]
- id: q-curiosity-169
  text: 一個小小的「咦」，就是好奇心在敲門。
  tags: [wonder, curiosity]
- id: q-curiosity-170
  text: 探索不是要征服未知，是願意跟它做朋友。
  tags: [exploration, openness]
- id: q-curiosity-171
  text: 你今天做的一次小嘗試，會偷偷改變往後的路。
  tags: [trying, discovery]
- id: q-curiosity-172
  text: 對一個習慣問「我是什麼時候開始這樣的」。
  tags: [question, wonder]
- id: q-curiosity-173
  text: 一個新工具的說明書，偶爾也藏著驚喜。
  tags: [discovery, trying]
- id: q-curiosity-174
  text: 你保持著好奇，世界就一直對你敞開。
  tags: [curiosity, openness]
- id: q-curiosity-175
  text: 把一個難題翻譯成別的領域的話，它常會鬆動。
  tags: [cross_field, question]
- id: q-curiosity-176
  text: 一次隨手的塗鴉，也可能長成一個新想法。
  tags: [trying, discovery]
- id: q-curiosity-177
  text: 今天只想安靜地看世界轉，那也是一種參與。
  tags: [wonder, openness]
- id: q-curiosity-178
  text: 對眼前的普通事物問一句「它其實很神奇吧」。
  tags: [wonder, curiosity]
- id: q-curiosity-179
  text: 一個你還沒去過的方向，永遠為你留著。
  tags: [exploration, openness]
- id: q-curiosity-180
  text: 帶著問題過生活，日子就不會只是重複。
  tags: [question, curiosity]
