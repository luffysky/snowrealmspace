- id: q-craft-163
  text: 質感是設計在低聲說：這是用心做的。
  tags: [texture, craft]
- id: q-craft-164
  text: 顏色越純，越需要留白來襯它。
  tags: [color, whitespace]
- id: q-craft-165
  text: 對齊的秩序，是一種安靜的專業。
  tags: [layout, simplicity]
- id: q-craft-166
  text: 好設計不搶功勞，它讓內容成為主角。
  tags: [design, simplicity]
- id: q-craft-167
  text: 一個好的間距，讓緊湊也能顯得從容。
  tags: [whitespace, layout]
- id: q-craft-168
  text: 字型的灰度，決定整頁的第一印象。
  tags: [typography, contrast]
- id: q-craft-169
  text: 材質與顏色一起看，才知道對不對味。
  tags: [texture, color]
- id: q-craft-170
  text: 構圖不用滿，留一角給想像。
  tags: [composition, whitespace]
- id: q-craft-171
  text: 細節是慢慢累積的信任。
  tags: [detail, craft]
- id: q-craft-172
  text: 對比讓弱的更弱，強的地方才真的亮。
  tags: [contrast, composition]
- id: q-craft-173
  text: 今天只想微調，那就把一個顏色調到滿意。
  tags: [color, craft]
- id: q-craft-174
  text: 留白是你替眼睛準備的一張椅子。
  tags: [whitespace, design]
- id: q-craft-175
  text: 好排版，是讓人讀完卻沒察覺被引導過。
  tags: [typography, layout]
