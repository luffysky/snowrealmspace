  tags: [envy, own_path]

- id: q-selfpace-156
  text: 今天做不到最好，做到還可以就好。
  tags: [acceptance, self_pace]

- id: q-selfpace-157
  text: 你不必和世界一樣快，你只要和自己同步。
  tags: [self_pace, rhythm]

- id: q-selfpace-158
  text: 別人的量產不代表品質，你的慢不代表停滯。
  tags: [comparison, self_pace]

- id: q-selfpace-159
  text: 你今天存在著，就已經在你的路上。
  tags: [own_path, acceptance]

- id: q-selfpace-160
  text: 少比較一點，你會多喜歡自己一點。
  tags: [comparison, acceptance]

- id: q-selfpace-161
  text: 你的創作沒有標準答案，因為它是你寫的。
  tags: [individuality, own_path]

- id: q-selfpace-162
  text: 別人發光的時候，你也在悄悄積蓄。
  tags: [social, self_pace]

- id: q-selfpace-163
  text: 慢慢來，才能把想法好好地放進作品裡。
  tags: [self_pace, rhythm]

- id: q-selfpace-164
  text: 你不用擁有別人的節奏，才配擁有自己的路。
  tags: [rhythm, own_path]

- id: q-selfpace-165
  text: 今天只想躺著，那就好好躺著，這也是照顧。
  tags: [acceptance, self_pace]

- id: q-selfpace-166
  text: 別人的終點線，不會是衡量你的尺。
  tags: [comparison, individuality]

- id: q-selfpace-167
  text: 你的獨特，是別人模仿不來的優勢。
  tags: [individuality, own_path]

- id: q-selfpace-168
  text: 把手機翻面，這一刻只屬於你和你的桌子。
  tags: [social, rhythm]

- id: q-selfpace-169
  text: 你可以今天什麼都沒完成，明天重新開始。
  tags: [self_pace, acceptance]

- id: q-selfpace-170
  text: 每一條自己的路，剛開始都看起來很孤單。
  tags: [own_path, acceptance]

- id: q-selfpace-171
  text: 你不需要更像別人，你需要更像自己。
  tags: [individuality, comparison]

- id: q-selfpace-172
  text: 羨慕過後，把那份心動留給自己的下一件作品。
  tags: [envy, own_path]

- id: q-selfpace-173
  text: 你的節奏慢，是因為你在意做好，不是不在意。
  tags: [self_pace, rhythm]

- id: q-selfpace-174
  text: 別人的熱度會退，你慢慢建的東西會留下。
  tags: [social, self_pace]

- id: q-selfpace-175
  text: 你今天願意對自己溫柔一點，就已經很勇敢。
  tags: [acceptance, individuality]

- id: q-selfpace-176
  text: 不用追上潮流，潮流本來就會退。
  tags: [social, own_path]

- id: q-selfpace-177
  text: 你走你的節奏，時間自然會替你排好順序。
  tags: [rhythm, self_pace]

- id: q-selfpace-178
  text: 別人的花園再美，也不必拔掉自己的草。
  tags: [comparison, individuality]

- id: q-selfpace-179
  text: 今天沒做出東西，但你把自己顧好了，這也是產出。
  tags: [acceptance, self_pace]

- id: q-selfpace-180
  text: 你的路是慢慢走出來的，不是抄來的。
  tags: [own_path, individuality]
