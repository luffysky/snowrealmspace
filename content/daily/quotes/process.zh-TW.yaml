# 每日語錄 · 主題：過程與迭代
# 全繁體中文（台灣用語）。每一則獨一無二。
- id: q-process-001
  text: 草稿的意義就是可以很醜。
  tags: [draft, imperfection]
- id: q-process-002
  text: 改到第五版才對，不代表前四版是白做的。
  tags: [iteration, revisit]
- id: q-process-003
  text: 重做一次，你會發現第一次其實學到很多。
  tags: [refinement, learning]
- id: q-process-004
  text: 先寫完，再寫好，這兩件事不必同一天做。
  tags: [draft, process]
- id: q-process-005
  text: 你今天卡住的地方，就是明天會變厲害的地方。
  tags: [practice, learning]
- id: q-process-006
  text: 刪掉的那三百字，教會你留下的那五十字。
  tags: [refinement, revisit]
- id: q-process-007
  text: 有些段落要放兩天，才知道它其實不需要。
  tags: [revisit, refinement]
- id: q-process-008
  text: 重來一次不是退步，是你終於看得懂哪裡不對。
  tags: [iteration, learning]
- id: q-process-009
  text: 慢不是問題，停下來才需要看一眼發生什麼事。
  tags: [process, practice]
- id: q-process-010
  text: 第一筆總是最歪的，後面才慢慢站直。
  tags: [draft, iteration]
- id: q-process-011
  text: 練習不會讓事情變簡單，只是讓你變得更能承接它。
  tags: [practice, learning]
- id: q-process-012
  text: 昨天覺得完美的，今天想改，這叫進步而不是善變。
  tags: [revisit, refinement]
- id: q-process-013
  text: 累積是安靜的，你常常在很久以後才聽見它的聲音。
  tags: [accumulation, process]
- id: q-process-014
  text: 失敗的版本會留在你手上，變成下一版的地基。
  tags: [failure, iteration]
- id: q-process-015
  text: 不完美的成品，還是比完美的空白多做了一件事。
  tags: [imperfection, process]
- id: q-process-016
  text: 你可以先讓它存在，再慢慢讓它變好。
  tags: [draft, refinement]
- id: q-process-017
  text: 每一次重畫，手都記得多一點點。
  tags: [practice, accumulation]
- id: q-process-018
  text: 卡住的時候，先做壞的那一版也算前進。
  tags: [draft, process]
- id: q-process-019
  text: 有些技巧要你先做錯十次，才肯讓你學會。
  tags: [failure, learning]
- id: q-process-020
  text: 修稿是一種溫柔，你在給過去的自己補上想說的話。
  tags: [revisit, refinement]
- id: q-process-021
  text: 進度慢的日子，也是進度。
  tags: [process, accumulation]
- id: q-process-022
  text: 你不是在原地打轉，你是在把同一個地方挖深。
  tags: [practice, iteration]
- id: q-process-023
  text: 初稿負責誠實，修稿負責禮貌。
  tags: [draft, refinement]
- id: q-process-024
  text: 那個你想丟掉的版本，其實幫你排除了一條錯路。
  tags: [failure, iteration]
- id: q-process-025
  text: 熟練不是天分，是你重複到不必再想的那一刻。
  tags: [practice, refinement]
- id: q-process-026
  text: 今天只想改一個字，那就改那一個字。
  tags: [refinement, process]
- id: q-process-027
  text: 作品會等你長大，再回來把它完成。
  tags: [revisit, accumulation]
- id: q-process-028
  text: 好東西很少一次到位，多半是慢慢對焦出來的。
  tags: [iteration, refinement]
- id: q-process-029
  text: 你留下的每個壞句子，都在幫你認出好句子。
  tags: [draft, learning]
- id: q-process-030
  text: 打掉重練不丟臉，硬撐一個歪掉的地基才辛苦。
  tags: [iteration, failure]
- id: q-process-031
  text: 練習的重點不是次數，是你有沒有在其中發現什麼。
  tags: [practice, learning]
- id: q-process-032
  text: 有時候作品需要的不是加東西，是拿掉一點。
  tags: [refinement, imperfection]
- id: q-process-033
  text: 你此刻的粗糙，是完成品必經的樣子。
  tags: [imperfection, process]
- id: q-process-034
  text: 隔一週再看，你會知道當初哪裡太用力。
  tags: [revisit, refinement]
- id: q-process-035
  text: 每天做一點點，久了會變成一個你認不出的厚度。
  tags: [accumulation, practice]
- id: q-process-036
  text: 廢稿資料夾其實是你最誠實的成長紀錄。
  tags: [draft, accumulation]
- id: q-process-037
  text: 不會的東西，就是還沒練夠而已。
  tags: [practice, learning]
- id: q-process-038
  text: 允許自己交出一個「還可以更好」的版本。
  tags: [imperfection, process]
- id: q-process-039
  text: 迭代的意思是，你不必一次背負所有版本。
  tags: [iteration, process]
- id: q-process-040
  text: 你改的不是作品，是你對它的理解。
  tags: [revisit, refinement]
- id: q-process-041
  text: 卡關那幾天，其實你的眼睛在偷偷變好。
  tags: [learning, process]
- id: q-process-042
  text: 最初的版本負責發現問題，不負責解決問題。
  tags: [draft, iteration]
- id: q-process-043
  text: 慢慢變好，是唯一真的會發生的變好。
  tags: [refinement, accumulation]
- id: q-process-044
  text: 你不需要一次寫對，你只需要願意再看一次。
  tags: [revisit, iteration]
- id: q-process-045
  text: 有些錯要犯過才記得住，這種記憶最牢。
  tags: [failure, learning]
- id: q-process-046
  text: 重畫十遍的那條線，最後會變成你的手感。
  tags: [practice, refinement]
- id: q-process-047
  text: 完成度不是一次給滿的，是一層一層疊上去的。
  tags: [accumulation, iteration]
- id: q-process-048
  text: 難看的初稿是勇敢的，它先站出來讓你有東西可改。
  tags: [draft, imperfection]
- id: q-process-049
  text: 你可以今天只是把檔案打開，這也是在工作。
  tags: [process, practice]
- id: q-process-050
  text: 每個作品都有一段醜的中途，撐過去它才好看。
  tags: [imperfection, process]
- id: q-process-051
  text: 修不完美的，就先讓它不完美地存在。
  tags: [imperfection, refinement]
- id: q-process-052
  text: 你退回上一步，不是失去，是換了一條更近的路。
  tags: [iteration, revisit]
- id: q-process-053
  text: 練久了你會發現，難的地方悄悄變成順手的地方。
  tags: [practice, accumulation]
- id: q-process-054
  text: 一稿寫給自己看，二稿才開始寫給別人看。
  tags: [draft, refinement]
- id: q-process-055
  text: 那些你重做的次數，別人看不到，但作品記得。
  tags: [iteration, accumulation]
- id: q-process-056
  text: 失敗只是資料，你收集夠了就會看出方向。
  tags: [failure, learning]
- id: q-process-057
  text: 今天的手比昨天穩一點點，就足夠了。
  tags: [practice, process]
- id: q-process-058
  text: 好的修改往往是把三句話變成一句。
  tags: [refinement, iteration]
- id: q-process-059
  text: 你不是還沒開始，你是還在暖身。
  tags: [process, practice]
- id: q-process-060
  text: 放著沒完成的東西，有時是在等你變得能完成它。
  tags: [revisit, accumulation]
- id: q-process-061
  text: 每一版都往同一個方向挪一公分，也會走很遠。
  tags: [iteration, accumulation]
- id: q-process-062
  text: 你討厭的那個舊作，證明你的眼光已經往前走了。
  tags: [revisit, learning]
- id: q-process-063
  text: 練習是把「勉強做到」變成「自然做到」。
  tags: [practice, refinement]
- id: q-process-064
  text: 先求有，再求好，不必倒過來為難自己。
  tags: [draft, process]
- id: q-process-065
  text: 刪除鍵也是創作工具，用它不代表你失敗。
  tags: [refinement, iteration]
- id: q-process-066
  text: 你此刻覺得爛的，可能只是還沒改到的。
  tags: [imperfection, revisit]
- id: q-process-067
  text: 累積不需要你相信它，它自己會發生。
  tags: [accumulation, process]
- id: q-process-068
  text: 卡住時，把「做好」暫時換成「做完」。
  tags: [draft, process]
- id: q-process-069
  text: 你重寫的不是段落，是你這段時間的成長。
  tags: [iteration, learning]
- id: q-process-070
  text: 最後版本的乾淨，是靠很多凌亂的版本換來的。
  tags: [refinement, draft]
- id: q-process-071
  text: 慢工不一定出細活，但急著交常常出後悔。
  tags: [process, refinement]
- id: q-process-072
  text: 你可以在原地站久一點，觀察也是進度。
  tags: [process, learning]
- id: q-process-073
  text: 每一次修改都是一次小小的變好，別小看它。
  tags: [refinement, accumulation]
- id: q-process-074
  text: 練了很久卻沒感覺，那是進步藏得比較深而已。
  tags: [practice, accumulation]
- id: q-process-075
  text: 半成品不是失敗品，它只是還在半路上。
  tags: [imperfection, process]
- id: q-process-076
  text: 你不需要證明給誰看，只要比上一版誠實一點。
  tags: [iteration, refinement]
- id: q-process-077
  text: 有些作品要放回抽屜，過陣子它會自己說要怎麼改。
  tags: [revisit, refinement]
- id: q-process-078
  text: 錯的筆觸也留在紙上，它讓對的那筆有對照。
  tags: [failure, practice]
- id: q-process-079
  text: 你今天能改動的最小單位，就是今天的全部意義。
  tags: [refinement, process]
- id: q-process-080
  text: 重做一遍，你不是回到起點，是回到更懂的起點。
  tags: [iteration, learning]
- id: q-process-081
  text: 累積的日子看起來都一樣，直到某天忽然不一樣。
  tags: [accumulation, practice]
- id: q-process-082
  text: 初稿允許你胡說八道，這是它最珍貴的地方。
  tags: [draft, imperfection]
- id: q-process-083
  text: 你不必喜歡現在的樣子，只要願意再動它一下。
  tags: [iteration, process]
- id: q-process-084
  text: 好看的成果背後，都是一疊被放棄的嘗試。
  tags: [failure, accumulation]
- id: q-process-085
  text: 練習的日子沉默，成果的日子才發聲。
  tags: [practice, accumulation]
- id: q-process-086
  text: 你改稿時的猶豫，是品味正在長出來的樣子。
  tags: [refinement, learning]
- id: q-process-087
  text: 別急著蓋房子，先讓地基醜醜地打好。
  tags: [draft, process]
- id: q-process-088
  text: 每個「重來」前面，都藏著一個你剛學會的東西。
  tags: [iteration, learning]
- id: q-process-089
  text: 不完美地完成，勝過完美地拖延。
  tags: [imperfection, process]
- id: q-process-090
  text: 你留下的失敗紀錄，是未來的你會感謝的線索。
  tags: [failure, accumulation]
- id: q-process-091
  text: 修一句話修了半天，那半天你也在變厲害。
  tags: [refinement, practice]
- id: q-process-092
  text: 過程沒有白走的，只有還沒看出用途的。
  tags: [process, learning]
- id: q-process-093
  text: 你可以先接受它是草稿，再期待它變成作品。
  tags: [draft, refinement]
- id: q-process-094
  text: 反覆調同一個顏色，你在訓練自己的眼睛。
  tags: [practice, refinement]
- id: q-process-095
  text: 卡住的那一刻，通常正好是要學新東西的時候。
  tags: [learning, process]
- id: q-process-096
  text: 版本越多，離你心裡那個樣子就越近一點。
  tags: [iteration, refinement]
- id: q-process-097
  text: 你不是走得慢，是走在只有你能走的路上。
  tags: [process, practice]
- id: q-process-098
  text: 最初的醜，是完成的必經之路，不是它的失敗。
  tags: [imperfection, draft]
- id: q-process-099
  text: 改掉自己寫的東西，需要的勇氣不比寫出來時少。
  tags: [refinement, revisit]
- id: q-process-100
  text: 你今天只做得動一點點，那一點點也真的做了。
  tags: [process, accumulation]
- id: q-process-101
  text: 練習的意義，是讓困難的事變得普通。
  tags: [practice, learning]
- id: q-process-102
  text: 每一次推翻，都讓你更確定自己要什麼。
  tags: [iteration, learning]
- id: q-process-103
  text: 你手上這個粗糙的東西，是精緻品唯一的來源。
  tags: [draft, refinement]
- id: q-process-104
  text: 過了一陣子再回頭，你會替當初的自己補完。
  tags: [revisit, iteration]
- id: q-process-105
  text: 慢慢累積的東西，別人拿不走，也複製不來。
  tags: [accumulation, practice]
- id: q-process-106
  text: 交出不夠好的一版，也好過永遠留在腦裡。
  tags: [imperfection, process]
- id: q-process-107
  text: 你刪掉的，不是浪費，是替讀者省下的力氣。
  tags: [refinement, revisit]
- id: q-process-108
  text: 失敗的那次，其實幫你把地圖畫得更清楚。
  tags: [failure, learning]
- id: q-process-109
  text: 一筆一筆慢慢加，總有一天會湊成整幅。
  tags: [accumulation, practice]
- id: q-process-110
  text: 你不必今天就懂，練著練著它會自己浮現。
  tags: [practice, learning]
- id: q-process-111
  text: 初稿的任務只有一個：讓你有東西可以改。
  tags: [draft, iteration]
- id: q-process-112
  text: 每次回頭修，你都比上次多懂一點自己。
  tags: [revisit, refinement]
- id: q-process-113
  text: 沒做完的作品不是債，是還在發酵的東西。
  tags: [process, accumulation]
- id: q-process-114
  text: 你重畫的那條線，最後會變成別人羨慕的線。
  tags: [practice, refinement]
- id: q-process-115
  text: 好的迭代不是推翻昨天，是接住昨天再往前。
  tags: [iteration, accumulation]
- id: q-process-116
  text: 允許今天的版本只是「暫時這樣」。
  tags: [imperfection, process]
- id: q-process-117
  text: 你練習時的笨拙，是熟練唯一的入口。
  tags: [practice, learning]
- id: q-process-118
  text: 修到後來你會發現，減法比加法更需要功力。
  tags: [refinement, practice]
- id: q-process-119
  text: 那些看似重複的日子，其實每天都疊了一層。
  tags: [accumulation, practice]
- id: q-process-120
  text: 你可以害怕它不夠好，同時還是把它做出來。
  tags: [imperfection, process]
- id: q-process-121
  text: 重來的次數，是你在乎它的證明。
  tags: [iteration, revisit]
- id: q-process-122
  text: 練習不會辜負你，只是它給回饋的速度很慢。
  tags: [practice, accumulation]
- id: q-process-123
  text: 初稿寫得越自由，改稿時能玩的空間越大。
  tags: [draft, refinement]
- id: q-process-124
  text: 你今天做壞的部分，明天可以只改那部分。
  tags: [iteration, process]
- id: q-process-125
  text: 每個成熟的作品，都曾經是難以直視的草圖。
  tags: [draft, imperfection]
- id: q-process-126
  text: 你不是在浪費時間，你在把感覺磨出形狀。
  tags: [practice, refinement]
- id: q-process-127
  text: 放下再拿起，你會看見上次沒看見的地方。
  tags: [revisit, learning]
- id: q-process-128
  text: 一個版本解決一個問題，這樣就夠了。
  tags: [iteration, process]
- id: q-process-129
  text: 失敗過的地方，下次你會自然地繞開。
  tags: [failure, learning]
- id: q-process-130
  text: 慢慢變好，中間一定會經過看不出變好的階段。
  tags: [accumulation, process]
- id: q-process-131
  text: 你手邊那份粗胚，比腦中完美的想像更有價值。
  tags: [draft, process]
- id: q-process-132
  text: 改稿是把「我懂了」翻譯成「別人也懂」。
  tags: [refinement, revisit]
- id: q-process-133
  text: 每天練一點，是對未來的自己最實在的溫柔。
  tags: [practice, accumulation]
- id: q-process-134
  text: 你可以先做出來，再決定它值不值得留。
  tags: [draft, iteration]
- id: q-process-135
  text: 那個你想藏起來的舊版本，其實走得很勇敢。
  tags: [imperfection, revisit]
- id: q-process-136
  text: 進步常常是回頭看才發現的，當下沒什麼感覺。
  tags: [learning, accumulation]
- id: q-process-137
  text: 你不必一次到位，你只要一次比一次靠近。
  tags: [iteration, refinement]
- id: q-process-138
  text: 廢掉的三種做法，替你確認了第四種可行。
  tags: [failure, iteration]
- id: q-process-139
  text: 練習的日子不好看，成果的樣子才好看。
  tags: [practice, process]
- id: q-process-140
  text: 你今天願意再看它一眼，它就多了一次變好的機會。
  tags: [revisit, refinement]
- id: q-process-141
  text: 累積是複利，前期安靜，後期才顯出厚度。
  tags: [accumulation, practice]
- id: q-process-142
  text: 初稿越早交給自己，離作品就越近。
  tags: [draft, process]
- id: q-process-143
  text: 你改的每一版，都是在對自己解釋你真正想要什麼。
  tags: [iteration, learning]
- id: q-process-144
  text: 不完美但誠實，通常比完美但空洞好看。
  tags: [imperfection, refinement]
- id: q-process-145
  text: 卡住不是牆，是提醒你該換個角度看。
  tags: [process, learning]
- id: q-process-146
  text: 練到某個時刻，難的地方會忽然變得理所當然。
  tags: [practice, accumulation]
- id: q-process-147
  text: 你留下的那些嘗試，日後會變成你的手法。
  tags: [accumulation, practice]
- id: q-process-148
  text: 修稿的溫柔，是不急著讓它一次變成最好。
  tags: [refinement, revisit]
- id: q-process-149
  text: 你今天只想改標題，那改標題就是今天的作品。
  tags: [refinement, process]
- id: q-process-150
  text: 每一個重來，都幫你把想法過濾得更乾淨。
  tags: [iteration, refinement]
- id: q-process-151
  text: 草圖不需要為誰負責，它只對可能性負責。
  tags: [draft, imperfection]
- id: q-process-152
  text: 你走過的錯路，都會變成之後選路的直覺。
  tags: [failure, learning]
- id: q-process-153
  text: 沒靈感的日子，就把上一版拿出來擦一擦。
  tags: [revisit, refinement]
- id: q-process-154
  text: 累積不喧嘩，它在你沒注意時默默長高。
  tags: [accumulation, process]
- id: q-process-155
  text: 你不必今天完成，只要今天沒有離開它。
  tags: [process, practice]
- id: q-process-156
  text: 一版比一版少一點多餘，這就是變好。
  tags: [refinement, iteration]
- id: q-process-157
  text: 練習的價值，是讓你在關鍵時刻不必用力想。
  tags: [practice, refinement]
- id: q-process-158
  text: 你手上的爛草稿，是全世界最靠近成品的東西。
  tags: [draft, process]
- id: q-process-159
  text: 過了幾個月再改，你會感謝當初有先寫下來。
  tags: [revisit, accumulation]
- id: q-process-160
  text: 失敗給的資訊，往往比成功還清楚。
  tags: [failure, learning]
- id: q-process-161
  text: 你不是還不夠好，你是還在半路上做得很認真。
  tags: [imperfection, process]
- id: q-process-162
  text: 每天挪一點點，累積起來會嚇到未來的自己。
  tags: [accumulation, practice]
- id: q-process-163
  text: 重寫一次，通常比修補十次還乾脆。
  tags: [iteration, refinement]
- id: q-process-164
  text: 你允許它先醜，它才有機會慢慢變美。
  tags: [imperfection, refinement]
- id: q-process-165
  text: 練習不是為了不出錯，是為了更快從錯裡回來。
  tags: [practice, failure]
- id: q-process-166
  text: 你這版沒做好的，正是下一版最想解決的。
  tags: [iteration, revisit]
- id: q-process-167
  text: 慢慢來，比較的對象只有昨天的自己。
  tags: [process, accumulation]
- id: q-process-168
  text: 初稿的粗糙，是你敢動手的證據。
  tags: [draft, imperfection]
- id: q-process-169
  text: 你改不完的東西，可以先標記，明天再回來。
  tags: [revisit, process]
- id: q-process-170
  text: 每一次練習都在你身上留下一點看不見的東西。
  tags: [practice, accumulation]
- id: q-process-171
  text: 作品的好，藏在你反覆調整的那些細節裡。
  tags: [refinement, iteration]
- id: q-process-172
  text: 你不必愛上過程，只要願意繼續待在裡面。
  tags: [process, practice]
- id: q-process-173
  text: 丟掉的那一版，替你保住了方向感。
  tags: [failure, iteration]
- id: q-process-174
  text: 學新東西時笨手笨腳，是身體正在重新學走路。
  tags: [learning, practice]
- id: q-process-175
  text: 你今天累了，就讓作品也休息一天，它等得起。
  tags: [process, revisit]
- id: q-process-176
  text: 累積到一定程度，難的東西會開始自己讓路。
  tags: [accumulation, learning]
- id: q-process-177
  text: 每一版都不是最終版，這正是你能一直變好的原因。
  tags: [iteration, refinement]
- id: q-process-178
  text: 粗糙的開始，好過精緻的沒開始。
  tags: [draft, imperfection]
