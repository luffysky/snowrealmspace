# 驚喜盒內容 —— common（常見）與 uncommon（少見）
# 使用者偶爾會在雪境裡發現一個可以打開的盒子。
# label：盒子外觀文字（2-24 中文字）
# text：打開後看到的內容（4-200 中文字）
# tags：2-3 個，取自 warm/discovery/playful/reflection/gift/gentle/curious/surprise/small_joy/question

# ===== common（常見）：溫暖的小句子、小觀察、小鼓勵 =====

- id: s-common-001
