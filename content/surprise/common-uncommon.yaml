  label: 一點小光
  text: 你不必成為誰的太陽，當自己的一盞小夜燈就夠了。
  tags: [gentle, warm]

- id: s-common-115
  label: 給你的一秒鐘
  text: 閉上眼睛數到三再睜開，這一秒是全新的，剛剛好給你。
  tags: [gentle, small_joy]

- id: s-common-116
  label: 小小發現
  text: 你打開這盒子的時間，其實藏著你今天的節奏。
  tags: [discovery, curious]

- id: s-common-117
  label: 一句真的
  text: 你不用讓所有人都懂你，懂你的人會慢慢走到你身邊。
  tags: [warm, reflection]

- id: s-common-118
  label: 給你的小毯
  text: 冷了就把這條看不見的小毯往上拉一點，蓋到心口。
  tags: [gift, warm]

- id: s-common-119
  label: 今天的一點暖
  text: 記得今天有一個瞬間是舒服的，把它收好，別弄丟。
  tags: [warm, small_joy]

- id: s-common-120
  label: 一封短短的信
  text: 沒有大道理，就是想說：你在這裡，真好。
  tags: [warm, gentle]

- id: s-common-121
  label: 小小的鼓勵
  text: 事情堆很高的時候，先搬走最上面那一件就好。
  tags: [gentle, warm]

- id: s-common-122
  label: 給你的暖光
  text: 這裡把最柔的那盞燈調給你，看東西不刺眼，看心也是。
  tags: [warm, gentle]

- id: s-common-123
  label: 一則小觀察
  text: 你其實很會安慰別人，記得留一份同樣的話給自己。
  tags: [warm, reflection]

- id: s-common-124
  label: 今天的小雪
  text: 這片雪落在你手心不會化，因為它是為了陪你才來的。
  tags: [surprise, gentle]

# ===== uncommon（少見）：小提議、有趣的話、值得停下來想的問題 =====

- id: s-uncommon-001
  label: 一個問題
  text: 如果今天只能留下一個顏色，你會留哪一個？
  tags: [reflection, playful]

- id: s-uncommon-002
  label: 一個小提議
  text: 找一件三年前的舊物出來看看，你會發現自己走了多遠。
  tags: [reflection, curious]

- id: s-uncommon-003
  label: 值得想一下
  text: 你上一次覺得時間過得剛剛好，是在做什麼的時候？
  tags: [reflection, question]

- id: s-uncommon-004
  label: 有趣的一句
  text: 據說每個人心裡都住著一個十歲的自己，你的那個今天想做什麼？
  tags: [playful, curious]

- id: s-uncommon-005
  label: 今天的小任務
  text: 待會兒對一個陌生人的小善意說聲謝謝，看看會發生什麼。
  tags: [playful, small_joy]

- id: s-uncommon-006
  label: 一個實驗
  text: 試著用你不慣用的那隻手寫下自己的名字，那也是你。
  tags: [curious, playful]

- id: s-uncommon-007
  label: 停下來想想
  text: 如果沒有人會知道，你今天最想做的一件事是什麼？
  tags: [reflection, question]

- id: s-uncommon-008
  label: 一個小發明
  text: 幫現在的心情取一個從來沒人用過的名字，它就歸你了。
  tags: [playful, curious]

- id: s-uncommon-009
  label: 換個角度
  text: 把你今天最煩的一件事，想像成十年後的一個小故事。
  tags: [reflection, curious]

- id: s-uncommon-010
  label: 一個提案
  text: 今晚睡前寫下三個明天想遇到的小事，越具體越好玩。
  tags: [playful, reflection]

- id: s-uncommon-011
  label: 一個問題
  text: 如果快樂可以存起來，你會想把哪一天的存下來？
  tags: [reflection, question]

- id: s-uncommon-012
  label: 有點意思
  text: 你有沒有一個從小到大都沒變過的習慣？它其實很珍貴。
  tags: [reflection, curious]

- id: s-uncommon-013
  label: 小小的挑戰
  text: 接下來一小時，只做一件事，不切換。試試看有多難。
  tags: [curious, playful]

- id: s-uncommon-014
  label: 一個想像
  text: 如果這個空間有味道，你希望它聞起來像什麼？
  tags: [curious, question]

- id: s-uncommon-015
  label: 值得停一下
  text: 你最近一次改變心意，是因為誰說的哪一句話？
  tags: [reflection, question]

- id: s-uncommon-016
  label: 一個邀請
  text: 找一首你以為早就忘記的歌，唱給只有自己聽的那個場合。
  tags: [playful, small_joy]

- id: s-uncommon-017
  label: 換句話說
  text: 把你今天說得最多的一句話收回來，換一句更溫柔的。
  tags: [reflection, gentle]

- id: s-uncommon-018
  label: 一個小發現
  text: 觀察一下你走路時的手，你會發現身體有它自己的習慣。
  tags: [discovery, curious]

- id: s-uncommon-019
  label: 一個問題
  text: 如果你可以請未來的自己吃一頓飯，你想問他哪一件事？
  tags: [reflection, question]

- id: s-uncommon-020
  label: 一點壞主意
  text: 今天允許自己把一件不重要的事，光明正大地拖到明天。
  tags: [playful, gentle]

- id: s-uncommon-021
  label: 小小提議
  text: 挑一個平常快步走過的地方，這次慢慢走，看看漏掉了什麼。
  tags: [discovery, reflection]

- id: s-uncommon-022
  label: 一個假設
  text: 假如今天多出一個小時，而且只能拿來浪費，你要怎麼浪費？
  tags: [playful, question]

- id: s-uncommon-023
  label: 想一想
  text: 你身上有一個別人常誇、你卻不當一回事的優點，是哪一個？
  tags: [reflection, question]

- id: s-uncommon-024
  label: 一個小任務
  text: 今天拍一張沒有目的的照片，只因為那一刻你想留下它。
  tags: [playful, discovery]

- id: s-uncommon-025
  label: 換個問法
  text: 與其問今天過得好不好，不如問：今天有沒有哪一刻是你的。
  tags: [reflection, question]

- id: s-uncommon-026
  label: 一個實驗
  text: 接下來十分鐘不看時間，靠感覺猜它過了多久，再對答案。
  tags: [curious, playful]

- id: s-uncommon-027
  label: 有趣的想法
  text: 如果情緒是天氣，你這一週的預報大概會怎麼寫？
  tags: [reflection, playful]

- id: s-uncommon-028
  label: 一個提議
  text: 給一位很久沒聯絡的人傳一句沒有目的的問候，就一句。
  tags: [warm, small_joy]

- id: s-uncommon-029
  label: 值得想想
  text: 你最想被記得的樣子，和你現在活著的樣子，差多遠？
  tags: [reflection, question]

- id: s-uncommon-030
  label: 一個小提案
  text: 把今天遇到的一件小麻煩，用一句話寫成笑話。
  tags: [playful, reflection]

- id: s-uncommon-031
  label: 一個問題
  text: 如果可以刪掉一個你常對自己說的負面句子，你會刪哪一句？
  tags: [reflection, question]

- id: s-uncommon-032
  label: 小小的觀察
  text: 留意一下今天第一個讓你放鬆下來的瞬間，那是你的開關。
  tags: [discovery, gentle]

- id: s-uncommon-033
  label: 一個提議
  text: 挑一樣你一直想學卻沒開始的事，今天只花五分鐘碰它一下。
  tags: [curious, playful]

- id: s-uncommon-034
  label: 換個角度看
  text: 你覺得麻煩的那個人，如果是一部電影的角色，會有幾個粉絲？
  tags: [playful, reflection]

- id: s-uncommon-035
  label: 一個假想
  text: 如果你的房間會說話，它今天最想跟你抱怨什麼？
  tags: [playful, curious]

- id: s-uncommon-036
  label: 停下來想
  text: 你上一次全心全意投入某件事，忘了看手機，是什麼時候？
  tags: [reflection, question]

- id: s-uncommon-037
  label: 一個小約定
  text: 跟自己約好，今天要對一件小事說出真正的想法。
  tags: [reflection, gentle]

- id: s-uncommon-038
  label: 有趣的一題
  text: 如果你能給童年的自己寄一樣東西，你會寄什麼過去？
  tags: [reflection, question]

- id: s-uncommon-039
  label: 一個小實驗
  text: 今天故意選一條沒走過的路回家，繞一點沒關係。
  tags: [curious, discovery]

- id: s-uncommon-040
  label: 換句話問
  text: 別問還缺什麼，先問：你手上已經有的，哪一樣最捨不得？
  tags: [reflection, question]

- id: s-uncommon-041
  label: 一個提議
  text: 把喜歡的一句歌詞抄在紙上，貼在你每天會看到的地方。
  tags: [playful, small_joy]

- id: s-uncommon-042
  label: 一個問題
  text: 如果安靜也有顏色，你此刻的安靜是什麼顏色？
  tags: [reflection, curious]

- id: s-uncommon-043
  label: 小小挑戰
  text: 今天試著把一句想說的抱怨，改寫成一個具體的請求。
  tags: [reflection, gentle]

- id: s-uncommon-044
  label: 一個想像
  text: 如果你可以替今天命名，像替一本書取名那樣，你會叫它什麼？
  tags: [playful, reflection]

- id: s-uncommon-045
  label: 值得停一下
  text: 你最近做的哪一個決定，是為了自己，而不是為了別人的眼光？
  tags: [reflection, question]

- id: s-uncommon-046
  label: 一個小發現
  text: 觀察你桌上待最久沒動的東西，它可能在提醒你某件事。
  tags: [discovery, curious]

- id: s-uncommon-047
  label: 一個提案
  text: 今天記下一個讓你會心一笑的瞬間，越小越好，越具體越棒。
  tags: [small_joy, reflection]

- id: s-uncommon-048
  label: 換個玩法
  text: 用三個名詞形容今天，不准用形容詞，看看會蹦出什麼。
  tags: [playful, curious]

- id: s-uncommon-049
  label: 一個問題
  text: 如果勇敢有份量，你今天做的哪件事最重？
  tags: [reflection, question]

- id: s-uncommon-050
  label: 小小的提議
  text: 找一個安靜的角落坐一分鐘，什麼都不查，只是坐著。
  tags: [gentle, reflection]

- id: s-uncommon-051
  label: 有意思的一題
  text: 你最想學會的一種能力，如果不能拿來賺錢，你還想學嗎？
  tags: [reflection, question]

- id: s-uncommon-052
  label: 一個小約定
  text: 今晚不帶著手機躺上床，讓最後的那段時間只屬於你自己。
  tags: [gentle, reflection]

- id: s-uncommon-053
  label: 換個視角
  text: 想像十年後的你回頭看今天，他會覺得你在擔心的事重要嗎？
  tags: [reflection, question]

- id: s-uncommon-054
  label: 一個實驗
  text: 今天對一件小事說好，一件你平常會習慣性拒絕的小事。
  tags: [curious, playful]

- id: s-uncommon-055
  label: 一個問題
  text: 如果你的一天可以重播一段，你想再看一次哪一段？
  tags: [reflection, question]

- id: s-uncommon-056
  label: 小小提案
  text: 找一樣你覺得理所當然的東西，認真謝謝它一次，比如熱水。
  tags: [reflection, small_joy]

- id: s-uncommon-057
  label: 有趣的想像
  text: 如果雪境是一間店，你希望它賣什麼，只賣給懂的人？
  tags: [playful, curious]

- id: s-uncommon-058
  label: 停下來問
  text: 你今天照顧了誰，那你自己，有被誰照顧到嗎？
  tags: [reflection, question]

- id: s-uncommon-059
  label: 一個小任務
  text: 今天用一分鐘寫下三件現在就能感謝的小事，不許重複。
  tags: [reflection, small_joy]

- id: s-uncommon-060
  label: 換個問題
  text: 別問要怎麼變更好，先問：現在的你，哪裡其實已經夠好了？
  tags: [reflection, question]

- id: s-uncommon-061
  label: 一個提議
  text: 挑一件今天想拖延的事，設三分鐘鬧鐘，只做到鬧鐘響。
  tags: [playful, curious]

- id: s-uncommon-062
  label: 一個假想
  text: 如果你可以把某種情緒裝進瓶子留著，你想留哪一種？
  tags: [reflection, curious]

- id: s-uncommon-063
  label: 值得想想
  text: 你最珍惜的一段關係，最初是怎麼開始的，還記得嗎？
  tags: [reflection, question]

- id: s-uncommon-064
  label: 一個小發現
  text: 留意今天讓你不自覺放慢腳步的那個東西，它在跟你說什麼。
  tags: [discovery, gentle]

- id: s-uncommon-065
  label: 換個玩法
  text: 今天做一件事的時候故意慢一倍，看看會不會發現新東西。
  tags: [curious, playful]

- id: s-uncommon-066
  label: 一個問題
  text: 如果你可以把今天的一個念頭種成一棵樹，你想種哪一個？
  tags: [reflection, curious]

- id: s-uncommon-067
  label: 小小的挑戰
  text: 接下來說的三句話，試著都以真心開頭，不客套。
  tags: [reflection, gentle]

- id: s-uncommon-068
  label: 一個提案
  text: 找一個你常忽略的日常聲音，專心聽它三十秒，比如冰箱。
  tags: [discovery, curious]

- id: s-uncommon-069
  label: 有趣的一句
  text: 據說在意細節的人容易累，但世界也是被他們慢慢變好的。
  tags: [reflection, warm]

- id: s-uncommon-070
  label: 停下來想
  text: 如果今天是一份禮物，你會把它送給誰，還是留給自己？
  tags: [reflection, gift]

- id: s-uncommon-071
  label: 一個小實驗
  text: 今天試著把一句想說的謝謝，說得比平常慢一點、認真一點。
  tags: [warm, gentle]

- id: s-uncommon-072
  label: 換個角度
  text: 你覺得自己不夠好的那一點，會不會其實是別人羨慕的？
  tags: [reflection, question]

- id: s-uncommon-073
  label: 一個問題
  text: 如果你能重新命名一種你常有的情緒，你想叫它什麼？
  tags: [reflection, curious]

- id: s-uncommon-074
  label: 小小提議
  text: 今天替一個平凡的時刻拍照，等以後才發現它其實不平凡。
  tags: [playful, discovery]

- id: s-uncommon-075
  label: 一個假設
  text: 假如你只能保留今天記憶裡的一個畫面，你會挑哪一個？
  tags: [reflection, question]

- id: s-uncommon-076
  label: 一個提案
  text: 把一件你覺得理所當然的能力，今天當成第一次擁有那樣用它。
  tags: [reflection, gentle]

- id: s-uncommon-077
  label: 有意思的想像
  text: 如果煩惱可以外借，你今天最想把哪一個借給別人保管一下？
  tags: [playful, reflection]

- id: s-uncommon-078
  label: 停下來看
  text: 你最近笑得最開心的一次，旁邊有誰，或者只有你自己？
  tags: [reflection, question]

- id: s-uncommon-079
  label: 一個小約定
  text: 今天答應自己一件事，然後真的做到，哪怕它非常小。
  tags: [reflection, gentle]

- id: s-uncommon-080
  label: 換句話問
  text: 別問今天為什麼這麼累，問問：哪一刻其實是值得的？
  tags: [reflection, question]

- id: s-uncommon-081
  label: 一個提議
  text: 找一樣童年很愛的零食買來吃，看看味覺記不記得那個你。
  tags: [playful, small_joy]

- id: s-uncommon-082
  label: 一個問題
  text: 如果你可以送給明天的自己一句話，你想寫什麼？
  tags: [reflection, gift]

- id: s-uncommon-083
  label: 小小的觀察
  text: 注意今天第一個讓你嘴角上揚的東西，那可能是你的解藥。
  tags: [discovery, small_joy]

- id: s-uncommon-084
  label: 換個玩法
  text: 用一個顏色、一種聲音、一種溫度，來形容此刻的自己。
  tags: [playful, reflection]

- id: s-uncommon-085
  label: 一個提案
  text: 今天做完一件事後，先別急著開始下一件，空著那三十秒。
  tags: [gentle, reflection]
