- id: chain-birthday-00
  chainIndex: 0
  title: 生日快樂
  text: |
    生日快樂，Nami。

    這個空間是為了你做的。不是一張賀卡，翻過就過去了；是一個房間，會一直空著等你回來，也會隨你放進來的東西慢慢改變。

    今天它還很乾淨、很安靜，幾乎什麼都沒有。這是故意的。我沒有先幫你把牆貼滿，因為這裡不該一開始就像別人替你決定好的樣子。它現在像一張還沒下筆的紙——而你最懂那種面對空白的感覺。

    你不用今天就做什麼。只是想讓你知道：這裡有一個地方，是你的。慢慢來。它會等。
  availableFrom: immediately
- id: chain-birthday-01
  chainIndex: 1
  title: 第一個選擇
  text: |
    你剛剛換了主題。

    這是這個空間第一次因為你而變得不一樣。也許你只是隨手挑了個順眼的顏色，沒想太多——但對這裡來說，這是它第一次知道「你」是什麼樣子。

    做創作的人大概都懂：一件東西開始像自己，往往就是從一個很小的選擇開始的。一個顏色、一種留白、一個你說不上來為什麼但就是對的細節。

    這個空間不會替你決定它該長什麼樣。它只負責記住你的每一次選擇，然後慢慢變成你會想待著的地方。剛剛那一下，是第一次。
  availableFrom: after_first_theme
- id: chain-birthday-02
  chainIndex: 2
  title: 你放進來的第一件東西
  text: |
    你上傳了第一個作品。

    我知道把自己做的東西放到一個地方，哪怕沒有別人會看，都不是完全無所謂的事。那是你花了時間、動了心思、可能還跟自己拉扯過好幾回才留下來的東西。

    創作大部分時候是安靜的、一個人的。沒有人在旁邊看著你反覆修那一個地方，也沒有人知道你刪掉了多少才留下這一個版本。這個空間不會假裝它懂你今天做這件東西時在想什麼——但它會好好把它收著，不會弄丟，不會替你評分。

    這裡不是要你交出成品的地方。是你可以把還沒完成、還不確定、只是想留著的東西，安心放下的地方。第一件已經在了。
  availableFrom: after_first_upload
- id: chain-birthday-03
  chainIndex: 3
  title: 第七天
  text: |
    你已經來這裡七天了。

    七天不長，但足夠讓一個地方從「新的」變成「有點熟的」。你大概已經知道東西放在哪、習慣從哪裡進來、哪個角落是你會多待一會兒的。

    我沒有辦法知道這七天你過得如何——有沒有做出滿意的東西，有沒有卡住，有沒有哪天其實不太想打開它。這些我都不會假裝知道。我只知道：你回來了，好幾次。

    對一個會長期陪你的空間來說，重要的從來不是你每天都精神奕奕地創作，而是它在你想回來的時候一直都在。不催、不空、不會因為你幾天沒來就變了樣。第七天了，它還在原地，也還是你的。
  availableFrom: after_7_days
- id: chain-birthday-04
  chainIndex: 4
  title: 一年之後
  text: |
    一年了，Nami。

    如果你正在讀這一段，代表這個空間陪你走過了一整年。它已經不是生日那天那個乾淨、安靜、幾乎空著的房間了。

    這一年裡，你換過的主題、放進來的作品、待過的那些夜晚，都留了下來。你可以往回翻，看看一年前的自己在做什麼、在意什麼、把什麼東西當成寶。有些你現在大概會想重做，有些你會慶幸自己留了下來。那些變化不是這個空間變的，是你——它只是誠實地把過程記著。

    當初做這裡時，心裡有一個問題：一年之後，這個空間會不會更像它的主人？現在你手上就是答案。它不會替你回答做得好不好、走得夠不夠遠——那從來不是重點。重點是這一年是真的，累積是真的，而你還在做你的東西。

    這裡會繼續在。下一年，換你把它填成你想要的樣子。生日快樂。
  availableFrom: after_1_year
