name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 本機 Supabase stack 的固定測試金鑰。不是機密 —— 每個 supabase start 都一樣。
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  R2_ACCOUNT_ID: local
  R2_ACCESS_KEY_ID: 625729a08b95bf1b7ff351a663f3a23c
  R2_SECRET_ACCESS_KEY: 850181e4652dd023b7a98c58ae0d2d34bd487ee0cc3254aed6eda37307425907
  R2_BUCKET: snowrealm-dev
  R2_ENDPOINT: http://127.0.0.1:54321/storage/v1/s3
  R2_REGION: local
  R2_FORCE_PATH_STYLE: 'true'
  AI_KEY_ENCRYPTION_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  TOKEN_ENCRYPTION_SECRET: BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=
  CRON_SECRET: ci-cron-secret-at-least-32-characters-long

jobs:
  # ── 靜態檢查：不需要資料庫，最快失敗 ────────────────────
  quality:
    name: Lint / Typecheck / 架構
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: 分層規則（11-engineering-setup.md §1）
        run: pnpm check:deps

      - name: 機密未洩漏到 client bundle
        run: pnpm check:secrets

  # ── 單元測試與覆蓋率門檻 ───────────────────────────────
  unit:
    name: 單元測試 + 覆蓋率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 測試（覆蓋率門檻未達即失敗）
        run: pnpm test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 資料庫：RLS 是多租戶唯一的實質保證，不可跳過 ────────
  database:
    name: Migration + RLS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 啟動 Supabase
        run: pnpm exec supabase start -x studio,imgproxy,pooler,realtime,vector

      - name: 套用 migration
        run: pnpm db:migrate

      - name: Migration 可重複執行（冪等）
        run: pnpm db:migrate

      - name: 完整 reset 後可重跑
        run: pnpm db:reset

      - name: Seed
        run: pnpm db:seed

      - name: 每張帶 space_id 的表都有 RLS policy
        run: pnpm check:rls

      - name: RLS 跨 space 隔離測試
        run: pnpm test:rls

      - name: 產生的型別與 schema 一致
        run: |
          pnpm exec supabase gen types typescript --local --schema public \
            > /tmp/database.generated.ts
          if ! diff -q /tmp/database.generated.ts packages/shared-types/src/database.generated.ts; then
            echo "::error::database.generated.ts 與目前的 schema 不一致。"
            echo "請執行：pnpm exec supabase gen types typescript --local --schema public > packages/shared-types/src/database.generated.ts"
            diff /tmp/database.generated.ts packages/shared-types/src/database.generated.ts || true
            exit 1
          fi

  # ── E2E + 無障礙 ──────────────────────────────────────
  e2e:
    name: E2E + 無障礙
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 安裝瀏覽器
        run: pnpm exec playwright install --with-deps chromium

      - name: 啟動 Supabase
        run: pnpm exec supabase start -x studio,imgproxy,pooler,realtime,vector

      - name: 準備資料庫
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: 建立儲存 bucket
        run: pnpm tsx scripts/ci-setup-bucket.ts

      - name: 寫入 apps/web 的公開環境變數
        # middleware 跑在 edge runtime，其變數是 build 時 inline 的，
        # 且 Next 只從 app 目錄讀 .env（見 90-build-log.md）
        run: |
          cat > apps/web/.env.local <<EOF
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          EOF

      - name: 寫入根目錄環境變數（供 dotenv-cli 注入）
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          DATABASE_URL=${DATABASE_URL}
          R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_REGION=${R2_REGION}
          R2_FORCE_PATH_STYLE=${R2_FORCE_PATH_STYLE}
          AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET}
          TOKEN_ENCRYPTION_SECRET=${TOKEN_ENCRYPTION_SECRET}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Build（正式產物）
        run: pnpm build

      # Playwright 的 webServer 會自行 build 並啟動 :3100（獨立 distDir），
      # 與 dev server 完全隔離。見 playwright.config.ts。
      - name: E2E（桌機）
        run: pnpm exec playwright test --project=chromium

      - name: E2E（行動裝置）
        run: pnpm exec playwright test --project=mobile

      - name: 閉環驗證
        run: |
          pnpm --filter @snowrealm/web start &
          pnpm exec wait-on http://localhost:3000/login -t 60000
          pnpm tsx scripts/verify-milestone-a.ts

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Worker 能啟動並消費 job ────────────────────────────
  worker:
    name: Queue 往返
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec supabase start -x studio,imgproxy,pooler,realtime,vector
      - run: pnpm db:migrate

      - name: 啟動 worker 並驗證 job 往返
        run: |
          pnpm --filter @snowrealm/worker dev &
          sleep 15
          pnpm tsx scripts/queue-ping.ts
